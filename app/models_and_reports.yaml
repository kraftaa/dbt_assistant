fct_orders:
  type: dbt_model
  path: ../dbt_project/target/compiled/dbt_project/models/gold/fct_orders.sql
  description: DBT model located at ../dbt_project/target/compiled/dbt_project/models/gold/fct_orders.sql
  columns:
  - order_id AS order_id
  - customer_id AS customer_id
  - order_date AS order_date
  - total_amount AS total_amount
  tables:
  - stg_orders
  conditions: []
  lineage_start: stg_orders
dim_date:
  type: dbt_model
  path: ../dbt_project/target/compiled/dbt_project/models/gold/dim_date.sql
  description: DBT model located at ../dbt_project/target/compiled/dbt_project/models/gold/dim_date.sql
  columns:
  - UNNEST(GENERATE_SERIES(CAST('2020-01-01' AS DATE), CAST('2030-01-01' AS DATE),
    INTERVAL '1' DAY)) AS date_day
  - date_day AS date_day
  - EXTRACT(YEAR FROM date_day) AS year
  - EXTRACT(MONTH FROM date_day) AS month
  - EXTRACT(DAY FROM date_day) AS day
  tables:
  - dates
  conditions: []
  lineage_start: dates
