dbt_models:
  v_all_suppliers:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/v1/views/v_all_suppliers.sql
    sql: "{{ config(\n  enabled=false,\n  materialized=\"view\",\n    indexes=[\n\
      \      {'columns': ['provider_id' ], 'unique': True},\n      {'columns': ['provider_slug'\
      \ ], 'unique': True},\n\n    ]\n\n)\n}}\n\nwith transformed_data as (\n    SELECT\
      \ all_dat.*,\n    case when rwe_signed_at is null then false else true end RWE_signed,\n\
      \    case when hbs_signed_at is null then false else true end HBS_signed,\n\
      \    case when rsa_signed_at is null then false else true end RSA_signed,\n\
      \    case when sa_signed_at is null then false else true end SA_signed,\n  \
      \  case when ca_signed_at is null then false else true end CA_signed\n    FROM\n\
      \      (\n       SELECT\n         providers.name provider_name\n       , providers.slug\
      \ provider_slug\n       , rfis.*\n      , sld.*\n      , published.No_of_marketplaces_published\n\
      \      , published.No_of_marketplaces_purchasable\n      , published.marketplaces_purchasable\n\
      \      , published.marketplaces_published\n--      , qg.discipline_names\n--\
      \      , qg.category_names\n      , qg.request_count\n      , qg.qw_count\n\
      \      , qg.cpo_count\n      , qg.por_count\n      ,   ssb.category_names\n\
      \      , ssb.discipline_names\n       from (\n          SELECT\n           \
      \ provider_id\n          , \"max\"(CASE WHEN slug = 'glp' THEN submitted_at\
      \ ELSE null END) glp_submitted_at\n          , \"max\"(CASE WHEN (slug = 'bmx')\
      \ THEN submitted_at ELSE null END) biomarker_submitted_at\n          , \"max\"\
      (CASE WHEN (slug = 'raw-materials-technical') THEN submitted_at ELSE null END)\
      \ raw_material_submitted_at\n          , \"max\"(CASE WHEN (slug = 'pdx') THEN\
      \ submitted_at ELSE null END) pdx_submitted_at\n    , \"concat_ws\"(', ',\n\
      \    \"max\"(submitted_at) filter (WHERE slug = 'rm'),\n    \"max\"(submitted_at)\
      \ filter (WHERE slug = 'raw-materials-technical'),\n    \"max\"(submitted_at)\
      \ filter (WHERE slug = 'drug-substance-drug-product-characterization-manufacturing'),\n\
      \    \"max\"(submitted_at) filter (WHERE slug = 'cmc-sm-site'),\n    \"max\"\
      (submitted_at) filter (WHERE slug = 'cmc-sm'),\n    \"max\"(submitted_at) filter\
      \ (WHERE slug = 'analytical-testing-services'),\n    \"max\"(submitted_at) filter\
      \ (WHERE slug = 'analytical-development-validation')) cmc_submitted_at\n   \
      \       , \"max\"(CASE WHEN slug = 'in-vivo-services' THEN submitted_at ELSE\
      \ null END) in_vivo_submitted_at\n     , \"concat_ws\"(', ',\n     \"max\"(submitted_at)\
      \ filter (where slug = 'hbs'),\n     \"max\"(submitted_at) filter (where slug\
      \ = 'human-biological-samples-v2')) hbs_submitted_at\n          , concat(\n\
      \          max(submitted_at) FILTER (WHERE slug = 'hbs' AND submitted_at IS\
      \ NOT NULL),\n          ', ',\n          max(submitted_at) FILTER (WHERE slug\
      \ = 'human-biological-samples-v2' AND submitted_at IS NOT NULL)\n    ) hbs_submitted_at_test\n\
      \          , \"max\"(CASE WHEN (slug = 'rwe') THEN submitted_at ELSE null END)\
      \ rwe_submitted_at\n          , \"max\"(CASE WHEN (slug = 'commercial-due-diligence')\
      \ THEN submitted_at ELSE null END) cdd_submitted_at\n          , \"concat_ws\"\
      (', ',\n          \"max\"(submitted_at) filter (where slug = 'aw'),\n      \
      \    \"max\"(submitted_at) filter (where slug = 'aw-provider-site')) aw_submitted_at\n\
      \          , \"max\"(CASE WHEN (slug = 'glp') THEN submitted_by_name ELSE null\
      \ END) glp_submitted_by\n          , \"max\"(CASE WHEN (slug = 'bmx') THEN submitted_by_name\
      \ ELSE null END) biomarker_submitted_by\n          , \"max\"(CASE WHEN (slug\
      \ = 'raw-materials-technical') THEN submitted_by_name ELSE null END) raw_material_submitted_by\n\
      \          , \"max\"(CASE WHEN (slug = 'pdx') THEN submitted_by_name ELSE null\
      \ END) pdx_submitted_by\n          , \"concat_ws\"(', ',\n          \"max\"\
      (submitted_by_name) filter (where slug = 'rm'),\n          \"max\"(submitted_by_name)\
      \ filter (where slug = 'raw-materials-technical') ,\n          \"max\"(submitted_by_name)\
      \ filter (where slug =  'drug-substance-drug-product-characterization-manufacturing')\
      \ ,\n          \"max\"(submitted_by_name) filter (where slug = 'cmc-sm-site'),\n\
      \          \"max\"(submitted_by_name) filter (where slug = 'cmc-sm'),\n    \
      \      \"max\"(submitted_by_name) filter (where slug = 'analytical-testing-services'),\n\
      \          \"max\"(submitted_by_name) filter (where slug = 'analytical-development-validation')\n\
      \          ) cmc_submitted_by\n          , \"max\"(CASE WHEN (slug = 'in-vivo-services')\
      \ THEN submitted_by_name ELSE null END) in_vivo_submitted_by\n          , \"\
      concat_ws\"(', ',\n          \"max\"(submitted_by_name) filter (where slug =\
      \ 'hbs'),\n          \"max\"(submitted_by_name) filter (where slug = 'human-biological-samples-v2'))\
      \ hbs_submitted_by\n\n          , \"max\"(CASE WHEN (slug = 'rwe') THEN submitted_by_name\
      \ ELSE null END) rwe_submitted_by\n          , \"max\"(CASE WHEN (slug = 'commercial-due-diligence')\
      \ THEN submitted_by_name ELSE null END) cdd_submitted_by\n          , \"concat_ws\"\
      (', ',\n          \"max\"(submitted_by_name) filter (where slug = 'aw') ,\n\
      \          \"max\"(submitted_by_name) filter (where slug = 'aw-provider-site'))\
      \ aw_submitted_by\n          , \"max\"(CASE WHEN (slug = 'glp') THEN submitted_by_email\
      \ ELSE null END) glp_submitted_by_email\n          , \"max\"(CASE WHEN (slug\
      \ = 'bmx') THEN submitted_by_email ELSE null END) biomarker_submitted_by_email\n\
      \          , \"max\"(CASE WHEN (slug = 'raw-materials-technical') THEN submitted_by_email\
      \ ELSE null END) raw_material_submitted_by_email\n          , \"max\"(CASE WHEN\
      \ (slug = 'pdx') THEN submitted_by_email ELSE null END) pdx_submitted_by_email\n\
      \          , \"concat_ws\"(', ',\n          \"max\"(submitted_by_email) filter\
      \ (where slug = 'rm'),\n          \"max\"(submitted_by_email) filter (where\
      \ slug = 'raw-materials-technical'),\n          \"max\"(submitted_by_email)\
      \  filter (where slug = 'drug-substance-drug-product-characterization-manufacturing'),\n\
      \          \"max\"(submitted_by_email)  filter (where slug = 'cmc-sm-site'),\n\
      \          \"max\"(submitted_by_email) filter (where slug = 'cmc-sm'),\n   \
      \       \"max\"(submitted_by_email) filter (where slug = 'analytical-testing-services')\
      \ ,\n          \"max\"(submitted_by_email)  filter (where slug = 'analytical-development-validation'))\
      \ cmc_submitted_by_email\n          , \"max\"(CASE WHEN (slug = 'in-vivo-services')\
      \ THEN submitted_by_email ELSE null END) in_vivo_submitted_by_email\n      \
      \    , \"concat_ws\"(', ',\n          \"max\"(submitted_by_email)  filter (where\
      \ slug = 'hbs' ),\n          \"max\"(submitted_by_email)  filter (where slug\
      \ = 'human-biological-samples-v2' )) hbs_submitted_by_email\n             ,\
      \ \"concat_ws\"(', ',\n          \"max\"(submitted_by_email) filter (where slug\
      \ = 'hbs'),\n          \"max\"(submitted_by_email) filter (where slug = 'human-biological-samples-v2'))\
      \ submitted_by_email\n\n          , \"max\"(CASE WHEN slug = 'rwe' THEN submitted_by_email\
      \ ELSE Null END) rwe_submitted_by_email\n          , \"max\"(CASE WHEN (slug\
      \ = 'commercial-due-diligence') THEN submitted_by_email ELSE null END) cdd_submitted_by_email\n\
      \          , \"concat_ws\"(', ',\n          \"max\"(submitted_by_email) filter\
      \ (where slug = 'aw'),\n          \"max\"(submitted_by_email)  filter (where\
      \ slug = 'aw-provider-site' )) aw_submitted_by_email\n          , \"max\"(CASE\
      \ WHEN (slug = 'glp') THEN status ELSE null END) glp_status\n          , \"\
      max\"(CASE WHEN (slug = 'bmx') THEN status ELSE null END) biomarker_status\n\
      \          , \"max\"(CASE WHEN (slug = 'raw-materials-technical') THEN status\
      \ ELSE null END) raw_material_status\n          , \"max\"(CASE WHEN (slug =\
      \ 'pdx') THEN status ELSE null END) pdx_status\n          , \"concat_ws\"(',\
      \ ',\n          \"max\"(status) filter (where  slug = 'rm'),\n          \"max\"\
      (status) filter (where slug = 'raw-materials-technical'),\n          \"max\"\
      (status) filter (where slug = 'drug-substance-drug-product-characterization-manufacturing'),\n\
      \          \"max\"(status) filter (where slug = 'cmc-sm-site'),\n          \"\
      max\"(status) filter (where slug = 'cmc-sm'),\n          \"max\"(status) filter\
      \ (where  slug = 'analytical-testing-services'),\n          \"max\"(status)\
      \ filter (where  slug = 'analytical-development-validation')) cmc_status\n \
      \         , \"max\"(CASE WHEN (slug = 'in-vivo-services') THEN status ELSE null\
      \ END) in_vivo_status\n          , \"concat_ws\"(', ',\n          \"max\"(status)\
      \ filter (where  slug = 'hbs'),\n          \"max\"(status) filter (where  slug\
      \ = 'human-biological-samples-v2')) hbs_status\n\n          , \"max\"(CASE WHEN\
      \ (slug = 'rwe') THEN status ELSE null END) rwe_status\n          , \"concat_ws\"\
      (', ',\n          \"max\"(status) filter (where  slug = 'aw'),\n          \"\
      max\"(status) filter (where  slug = 'aw-provider-site')) aw_status\n       \
      \   , \"max\"(CASE WHEN (slug = 'commercial-due-diligence') THEN status ELSE\
      \ null END) cdd_status\n          , \"max\"(CASE WHEN (slug = 'commercial-due-diligence')\
      \ THEN expired_at ELSE null END) cdd_expired_at\n          , \"array_agg\"(slug)\
      \ FILTER (WHERE (slug IN ('rm', 'raw-materials-technical', 'drug-substance-drug-product-characterization-manufacturing',\
      \ 'cmc-sm-site', 'cmc-sm', 'analytical-testing-services', 'analytical-development-validation')))\
      \ cmc_rfi_slugs\n          , array_agg(distinct type) type\n          from (\n\
      \n          SELECT\n             provider_id\n             , slug\n        \
      \     ,array_agg(submitted_at) FILTER (WHERE submitted_at IS NOT NULL)  submitted_at\n\
      \             ,array_remove(array_agg(submitted_by_name) FILTER (WHERE submitted_by_name\
      \ IS NOT NULL) , ' ') submitted_by_name\n             ,array_remove(array_agg(submitted_by_email)\
      \ FILTER (WHERE submitted_by_email IS NOT NULL), ' ')  submitted_by_email\n\
      \             ,array_agg(status) FILTER (WHERE status IS NOT NULL)  status\n\
      \             ,array_agg(evaluation_result) FILTER (WHERE evaluation_result\
      \ IS NOT NULL)  evaluation_result\n             ,array_agg(expired_at) FILTER\
      \ (WHERE expired_at IS NOT NULL)  expired_at\n             ,array_agg(distinct\
      \ type) FILTER (WHERE type IS NOT NULL)  type\n             FROM\n         \
      \       {{ ref('v_rfi_submitted') }}\n             WHERE slug IN ('glp', 'pdx',\
      \ 'bmx', 'raw-materials-technical', 'cmc-sm', 'in-vivo-services', 'hbs', 'human-biological-samples-v2',\
      \ 'rwe', 'commercial-due-diligence', 'aw', 'aw-provider-site', 'rm', 'raw-materials-technical',\
      \ 'drug-substance-drug-product-characterization-manufacturing', 'cmc-sm-site',\
      \ 'cmc-sm', 'analytical-testing-services', 'analytical-development-validation')\n\
      \             AND (status <> 'Obsoleted') AND (status <> 'Deleted') AND (type\
      \ <> 'VerifiReport')\n             GROUP BY provider_id, slug\n            \
      \ ORDER BY provider_id ASC, slug ASC\n             ) t1\n--             where\
      \ provider_id = 9\n            GROUP BY provider_id\n      )  rfis\n       LEFT\
      \ JOIN {{ source('public', 'providers') }} ON providers.id = rfis.provider_id\n\
      \      LEFT JOIN (\n          SELECT\n            signable_id\n          , \"\
      max\"(RSA_signed_at) RSA_signed_at\n          , \"max\"(HBS_signed_at) HBS_signed_at\n\
      \          , \"max\"(SA_signed_at) SA_signed_at\n          , \"max\"(RWE_signed_at)\
      \ RWE_signed_at\n          , \"max\"(CA_signed_at) CA_signed_at\n          FROM\n\
      \            (\n            SELECT\n              signable_id\n            ,\
      \ (CASE WHEN (legal_document_id = 6) THEN signed_at ELSE null END) RSA_signed_at\n\
      \            , (CASE WHEN (legal_document_id = 5) THEN signed_at ELSE null END)\
      \ HBS_signed_at\n            , (CASE WHEN (legal_document_id = 2) THEN signed_at\
      \ ELSE null END) SA_signed_at\n            , (CASE WHEN (legal_document_id =\
      \ 4) THEN signed_at ELSE null END) RWE_signed_at\n            , (CASE WHEN (legal_document_id\
      \ = 11) THEN signed_at ELSE null END) CA_signed_at\n                FROM\n \
      \                 {{ source('public', 'signed_legal_documents') }} sld\n   \
      \             WHERE signable_type = 'Pg::Provider' AND revoked_at IS NULL\n\
      \          ) sl1\n          -- where signable_id=9\n          GROUP BY signable_id\n\
      \n      )  sld ON sld.signable_id = rfis.provider_id\n      LEFT JOIN (\n  \
      \        SELECT\n            provider_id\n          ,  cardinality(array_agg(published)\
      \ FILTER (WHERE published)) No_of_marketplaces_published\n    ,  cardinality(array_agg(purchasable)\
      \ FILTER (WHERE purchasable)) No_of_marketplaces_purchasable\n    , array_agg(organizations.name)\
      \ FILTER (WHERE purchasable IS TRUE AND organizations.name IS NOT NULL) marketplaces_purchasable\n\
      \    , array_agg(organizations.name) FILTER (WHERE published IS TRUE AND organizations.name\
      \ IS NOT NULL) marketplaces_published\n            FROM\n              {{ source('public',\
      \ 'organization_providers') }} op\n            LEFT JOIN {{ source('public',\
      \ 'organizations') }} ON organizations.id = op.organization_id\n           \
      \ WHERE organization_id <> 175 AND organization_id <> 28 --and provider_id=9\n\
      \          GROUP BY provider_id\n      )  published ON published.provider_id\
      \ = rfis.provider_id\n      left join (\n      select\n        qw.provider_id\n\
      \    -- ,   ssb.category_names\n    -- , ssb.discipline_names\n--    , array_agg(distinct\
      \ ssb.discipline_names) filter(where discipline_names is not null)  discipline_names\n\
      --    , array_agg(distinct ssb.category_names)  filter(where category_names\
      \ is not null)  category_names\n    , count(DISTINCT pos.quote_group_pg_id)\
      \ request_count\n    , count(DISTINCT pos.quoted_ware_pg_id) qw_count\n    ,\
      \ count(pos.poc_id) cpo_count\n    , count(pos.por_id) por_count\n    , avg(pos.retail_total_price_usd)\
      \ avg_PO_usd\n    , sum(pos.retail_total_price_usd) sum_PO_usd\n     from {{\
      \ source('public', 'quote_groups') }} qg\n    left join {{ source('public',\
      \ 'quoted_wares') }} qw on qw.quote_group_id=qg.id\n\n--    left join transform.v_signed_suppliers_with_beacons\
      \ ssb on ssb.provider_id=qw.provider_id\n    -- where qw.provider_id=9 and not\
      \ qg.exclude_from_reporting\n    -- group by qw.provider_id\n    left join (\n\
      \    -- select count(por_id), count(poc_id), provider_pg_id from (\n    select\n\
      \    po.id  poc_id,\n    por.id por_id,\n    por.provider_pg_id,\n    por.customer_purchase_order_id,\n\
      \    cm.compliance_manifest_status,\n    po.retail_total_price_usd,\n    po.quote_group_pg_id,\n\
      \    por.quoted_ware_pg_id,\n    case\n    when po.obsoleted then 'Obsoleted'\n\
      \    when cm.compliance_manifest_status='Pending' then 'Pending Review'\n  \
      \  when po.completed then 'Completed'\n    when po.version_number >1 and po.referenced_po_id\
      \ is not null then 'Amended'\n    when po.created_at is null or po.po_number\
      \ is null then 'Awaiting PO'\n    when po.po_created_at is not null and po.po_number\
      \ is not null then 'Work in Progress'\n    else null ENd poc_status\n--    from\
      \ transform.purchase_orders_customers po\n    from {{ref('purchase_orders_customers')}}\
      \ po\n--    left join transform.m_compliance_manifests_statuses cm on cm.purchase_order_id=po.id\
      \ and cm.type = 'Pg::PurchaseComplianceManifest'\n    left join {{ref('m_compliance_manifests_statuses')}}\
      \ cm on cm.purchase_order_id=po.id and cm.type = 'Pg::PurchaseComplianceManifest'\n\
      --    left join transform.purchase_orders_providers por on por.customer_purchase_order_id=po.id\n\
      \    left join {{ref('purchase_orders_providers')}} por on por.customer_purchase_order_id=po.id\n\
      \    where extract(year from po.po_created_at) > 2014 and not po.obsoleted and\
      \ not po.rejected and\n    po.po_number is not null and po.po_created_at is\
      \ not null\n--    and po.provider_pg_id=9\n\n    ) pos on pos.quote_group_pg_id=qg.id\n\
      \    where\n--    qw.provider_id=9 and\n    not qg.exclude_from_reporting\n\
      \    group by qw.provider_id\n\n      )  qg ON qg.provider_id = rfis.provider_id\n\
      --   left join transform.v_signed_suppliers_with_beacons ssb on ssb.provider_id=qg.provider_id\n\
      \   left join {{ref('v_signed_suppliers_with_beacons')}} ssb on ssb.provider_id=qg.provider_id\n\
      \n    )  all_dat\n    WHERE provider_id != 177 AND provider_id != 571 AND provider_id\
      \ != 572 AND provider_id != 573 AND provider_id != 5159 AND provider_name !=\
      \ 'Demo Supplier'\n\n)\n\nselect * from transformed_data\n"
  v_merck_maur_approvals:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/v1/views/v_merck_maur_approvals.sql
    sql: "{{ config(\n  materialized=\"view\",\n  enabled =false,\n    indexes=[\n\
      \      {'columns': ['request_id' ], 'unique': False},\n      {'columns': ['provider_id'\
      \ ], 'unique': False},\n      {'columns': ['proposal_id' ], 'unique': False},\n\
      \      {'columns': ['proposal_identifier' ], 'unique': False},\n      {'columns':\
      \ ['cm_id' ], 'unique': False},\n      {'columns': ['status' ], 'unique': False},\n\
      \    ]\n\n)\n}}\n\nwith transformed_data as (\n    select\n        mmlv.request_id\n\
      \        , mmlv.request_identifier\n        , mmlv.request_status\n        ,\
      \ mmlv.request_year\n        , mmlv.request_created_at\n        , mmlv.requestor\n\
      \        , mmlv.requestor_email\n        , mmlv.request_url\n        , mmlv.proposal_id\n\
      \        , mmlv.cm_id\n        , mmlv.proposal_identifier\n        , mmlv.live_animals\n\
      \        , mmlv.organization_id\n        , mmlv.organization_name\n        ,\
      \ mmlv.submitted_at cm_submitted_at\n        , app.status\n        , app.status_reason\n\
      \        , app.approval_reason\n        , app.status_changed_at\n        , concat(users.first_name,\
      \ ' ', users.last_name) approver\n        , users.email approver_email\n   \
      \     , EXTRACT(DAY FROM (app.status_changed_at - submitted_at)) approval_time_days\n\
      \        , EXTRACT(EPOCH FROM (app.status_changed_at - submitted_at)) / 3600\
      \  approval_time_hours\n    from  {{ ref('m_merck_live_animal_proposal_compliance')\
      \ }} mmlv\n    INNER JOIN (\n       SELECT\n         id app_id\n       , approvable_id\n\
      \       , approvable_type\n       , approval_reason\n       , status\n     \
      \  , status_reason\n       , approval_markdown\n       , status_changed_at\n\
      \       , status_changed_by_id\n       FROM\n         {{ source('public', 'approvals')\
      \ }}\n       WHERE approvable_type = 'Pg::ComplianceManifest'\n    )  app ON\
      \ (app.approvable_id = mmlv.cm_id)\n    left join {{ source('public', 'users')\
      \ }} on users.id=app.status_changed_by_id\n)\n\nselect * from transformed_data"
  v_ratings_summary:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/v1/views/v_ratings_summary.sql
    sql: "{{ config(\n  materialized=\"view\",\n  enabled =false,\n    indexes=[\n\
      \      {'columns': ['provider_pg_id' ], 'unique': True},\n    ]\n\n  )\n}}\n\
      \nwith transform_data as (\n    WITH\n      table1 AS (\n       WITH promoter_counts\
      \ AS (\n           SELECT\n               provider_pg_id,\n               --\
      \ provider_name,\n               COUNT(value) AS promoter_count\n          \
      \ FROM\n               ratings\n           WHERE\n               net_promoter_category\
      \ = 'promoter'\n           GROUP BY\n               provider_pg_id --, provider_name\n\
      \       ),\n       passive_counts AS (\n           SELECT\n               provider_pg_id,\n\
      \               COUNT(value) AS passive_count\n           FROM\n           \
      \    ratings\n           WHERE\n               net_promoter_category = 'passive'\n\
      \           GROUP BY\n               provider_pg_id\n       ),\n       detractor_counts\
      \ AS (\n           SELECT\n               provider_pg_id,\n               COUNT(value)\
      \ AS detractor_count\n           FROM\n               ratings\n           WHERE\n\
      \               net_promoter_category = 'detractor'\n           GROUP BY\n \
      \              provider_pg_id\n       ),\n       total_counts AS (\n       \
      \    SELECT\n               provider_pg_id,\n               COUNT(value) AS\
      \ total_count\n           FROM\n               ratings\n           GROUP BY\n\
      \               provider_pg_id\n       ),\n       combined AS (\n          \
      \ SELECT\n               p.provider_pg_id,\n               -- p.provider_name,\n\
      \               COALESCE(p.promoter_count, 0) AS promoter_count,\n         \
      \      COALESCE(pa.passive_count, 0) AS passive_count,\n               COALESCE(d.detractor_count,\
      \ 0) AS detractor_count,\n               COALESCE(t.total_count, 0) AS total_count,\n\
      \               (COALESCE(p.promoter_count, 0) * 100.0 / COALESCE(t.total_count,\
      \ 1)) AS promoter_percentage,\n               (COALESCE(d.detractor_count, 0)\
      \ * 100.0 / COALESCE(t.total_count, 1)) AS detractor_percentage,\n         \
      \      (COALESCE(p.promoter_count, 0) * 100.0 / COALESCE(t.total_count, 1))\
      \ -\n               (COALESCE(d.detractor_count, 0) * 100.0 / COALESCE(t.total_count,\
      \ 1)) AS np_score\n           FROM\n               promoter_counts p\n     \
      \      LEFT JOIN\n               passive_counts pa ON p.provider_pg_id = pa.provider_pg_id\n\
      \           LEFT JOIN\n               detractor_counts d ON p.provider_pg_id\
      \ = d.provider_pg_id\n           LEFT JOIN\n               total_counts t ON\
      \ p.provider_pg_id = t.provider_pg_id\n       )\n       SELECT\n           provider_pg_id,\n\
      \           providers.name provider_name,\n           np_score,\n          \
      \ CASE\n               WHEN np_score >= 20 THEN 5\n               WHEN np_score\
      \ >= 10 THEN 4.5\n               WHEN np_score >= 0 THEN 4\n               WHEN\
      \ np_score >= -10 THEN 3.5\n               WHEN np_score >= -20 THEN 3\n   \
      \            WHEN np_score >= -35 THEN 2.5\n               WHEN np_score >=\
      \ -50 THEN 2\n               WHEN np_score >= -70 THEN 1.5\n               ELSE\
      \ 1\n           END AS stars,\n           promoter_percentage,\n           detractor_percentage,\n\
      \           promoter_count,\n           passive_count,\n           detractor_count,\n\
      \           total_count\n       FROM\n           combined\n       left join\
      \ (select id, name from {{ source('public', 'providers') }} ) providers on providers.id=combined.provider_pg_id\n\
