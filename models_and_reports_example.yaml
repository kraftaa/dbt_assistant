      \     dynamic_form_attachments.data  ->>  'site_biopharma_unit_data_and_ai_group'\
      \ AS site_biopharma_unit_data_and_ai_group,\n     dynamic_form_attachments.data\
      \  ->>  'site_oncology_tde_group' AS site_oncology_tde_group,\n     dynamic_form_attachments.data\
      \  ->>  'site_oncology_ica_group' AS site_oncology_ica_group,\n     dynamic_form_attachments.data\
      \  ->>  'site_oncology_haematology_group' AS site_oncology_haematology_group,\n\
      \     dynamic_form_attachments.data  ->>  'site_oncology_ordu_group' AS site_oncology_ordu_group,\n\
      \     dynamic_form_attachments.data ->  'hbs_subquestions' ->> 'hbs_request'\
      \  AS hbs_request,\n     dynamic_form_attachments.data  ->  'hbs_subquestions'\
      \ -> 'hbs_supply_comment' ->> 'reason'  AS hbs_supply_comment_reason,\n    \
      \ dynamic_form_attachments.data  ->  'hbs_subquestions' ->> 'hbs_supply_comment_2'\
      \  AS hbs_supply_comment_2,\n     dynamic_form_attachments.data  ->>  'shipping_samples'\
      \ AS shipping_samples,\n     dynamic_form_attachments.data  ->  'shipping_samples_comment'\
      \ ->> 'comment' AS shipping_samples_comment,\n     dynamic_form_attachments.data\
      \  ->>  'site_organization' AS site_organization,\n     dynamic_form_attachments.data\
      \  ->>  'site_organization_new' AS site_organization_new,\n     dynamic_form_attachments.data\
      \  ->>  'site_research' AS site_research,\n     dynamic_form_attachments.data\
      \  ->>  'budget_value' AS budget_value,\n     dynamic_form_attachments.data\
      \  ->>  'request_type' AS request_type,\n     CASE WHEN dynamic_form_attachments.data\
      \  ->> 'request_type'  LIKE '%Grant%' THEN TRUE ELSE FALSE END AS \"grant\"\
      ,\n     CASE WHEN (dynamic_form_attachments.data ->> 'request_type') = 'supported\
      \ by a Cost Center' THEN TRUE ELSE FALSE END AS cost_center\n  FROM {{ ref('bronze_compliance_manifests')}}\
