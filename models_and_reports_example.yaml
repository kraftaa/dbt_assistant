      \       rfi_submitted.status AS multipage_form_status,\n       rfi_submitted.evaluation_started_at\
      \ AS evaluation_started_at,\n       rfi_submitted.evaluated_at AS evaluated_at,\n\
      \       rfi_submitted.evaluation_result AS evaluation_result,\n       rfi_submitted.evaluated_by_user\
      \ AS evaluated_by_user,\n       rfi_submitted.provider_id AS provider_id,\n\
      \       rfi_submitted.supplier_name AS supplier_name,\n       rfi_submitted.days_until_expiration\
      \ AS days_until_expiration,\n       rfi_submitted.expired_at AS expired_at,\n\
      \       rfi_submitted.rfi_deleted_at AS rfi_deleted_at,\n       rfi_submitted.rfi_obsoleted_at\
      \ AS rfi_obsoleted_at,\n       rfi_submitted.multipage_form_builder_id AS multipage_form_builder_id,\n\
      \       rfi_submitted.multipage_form_uuid AS multipage_form_uuid,\n       rfi_submitted.form_id\
      \ AS form_id,\n       rfi_submitted.form_name AS form_name,\n       rfi_submitted.form_index\
      \ AS form_index,\n       formpage_form.form_data -> 'healthcare_organization_object'->'hco_or_hci'\
      \ AS \"Is your organization defined as a Healthcare Organization (HCO) or Healthcare\
      \ Institution (HCI)\",\n       formpage_form.form_data  -> 'healthcare_organization_object'->'hco_or_hci_details'\
      \ AS \"Please provide Employer Identification Number (EIN) or Tax Identification\
      \ Number (TIN)\",\n       formpage_form.form_data  -> 'healthcare_professional_object'->'employ_healthcare_professionals'\
      \ AS \"Do you employ individuals who would be defined as Healthcare Professionals\
