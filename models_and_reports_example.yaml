      \    subcategory.name AS primary_subcategory_name,\n    wares.created_at AS\
      \ created_at,\n    wares.updated_at AS updated_at\n  FROM {{ ref('bronze_wares')\
      \ }} AS wares\n  LEFT JOIN {{ ref('bronze_beacons') }} AS discipline\n    ON\
      \ discipline.id = wares.primary_discipline_id\n  LEFT JOIN {{ ref('bronze_beacons')\
      \ }} AS category\n    ON category.id = wares.primary_category_id\n  LEFT JOIN\
      \ {{ ref('bronze_beacons') }} AS subcategory\n    ON subcategory.id = wares.primary_subcategory_id\n\
      \n)\nSELECT * FROM transformed_data\n"
  silver_dynamic_form_attachments_compliance_manifests:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_dynamic_form_attachments_compliance_manifests.sql
    sql: "{{ config(\n  materialized = 'table',\n  indexes = [\n    {'columns': ['id']},\n\
      \    {'columns': ['dynamic_formable_id']},\n    {'columns': ['dynamic_formable_type']}\n\
      \  ]\n) }}\n\nWITH transformed_data AS (\n\n  WITH recursive json_tree AS (\n\
      \n    SELECT\n      dynamic_form_attachments.id,\n      dynamic_form_attachments.dynamic_formable_id,\n\
      \      dynamic_form_attachments.dynamic_formable_type,\n      dynamic_form_attachments.created_at,\n\
      \      dynamic_form_attachments.updated_at,\n      kv.key AS path_key,\n   \
      \   kv.value AS path_value,\n      kv.key AS full_key,\n      0 AS level\n \
      \   FROM {{ ref('bronze_dynamic_form_attachments') }} dynamic_form_attachments,\n\
      \         jsonb_each(dynamic_form_attachments.data::jsonb) kv\n    WHERE dynamic_form_attachments.dynamic_formable_type\
      \ = 'Pg::ComplianceManifest'\n\n    UNION ALL\n\n    -- Recursive: dive deeper\
      \ into nested objects\n    SELECT\n      jt.id,\n      jt.dynamic_formable_id,\n\
      \      jt.dynamic_formable_type,\n      jt.created_at,\n      jt.updated_at,\n\
      \      kv.key,\n      kv.value,\n      concat(jt.full_key, '->', kv.key) AS\
      \ full_key,\n      jt.level + 1\n    FROM json_tree jt,\n         jsonb_each(jt.path_value)\
      \ kv\n    WHERE jsonb_typeof(jt.path_value) = 'object'\n\n  )\n\n  SELECT DISTINCT\n\
      \    id,\n    dynamic_formable_id,\n    dynamic_formable_type,\n    created_at,\n\
      \    updated_at,\n    full_key,\n    REPLACE(full_key,' ','') AS cleaned_key,\n\
      \    path_value AS final_value\n  FROM json_tree\n  WHERE jsonb_typeof(path_value)\
      \ != 'object'\n  ORDER BY id, full_key\n\n)\n\nSELECT * FROM transformed_data\n"
  silver_provider_billing_documents:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_provider_billing_documents.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      id\"]},\n    {\"columns\": [\"purchase_order_id\"]}\n  ]\n)}}\n\nWITH invoice_currencies\
      \ AS (\n    select\n        exchangable_id AS invoice_id,\n        conversion_rate\n\
      \    from {{ ref('bronze_currencies') }}\n    where exchangable_type = 'Pg::ProviderBillingDocument'\n\
      ),\n\ninvoice_milestones AS (\n    select\n        milestones.itemizable_id\
      \ AS invoice_id,\n        sum(milestones.base_subtotal_price) AS subtotal_base_currency,\n\
      \        sum(milestones.base_subtotal_price/invoice_currencies.conversion_rate)\
      \ AS subtotal_usd,\n        sum(milestones.retail_subtotal_price) AS retail_subtotal_price,\n\
      \        sum(milestones.retail_subtotal_price/invoice_currencies.conversion_rate)\
      \ AS retail_subtotal_price_usd,\n        sum(milestones.wholesale_subtotal_price)\
      \ AS wholesale_subtotal_price,\n        sum(milestones.wholesale_subtotal_price/invoice_currencies.conversion_rate)\
      \ AS wholesale_subtotal_price_usd,\n        sum(milestones.list_subtotal_price)\
      \ AS list_subtotal_price,\n        sum(milestones.list_subtotal_price/invoice_currencies.conversion_rate)\
      \ AS list_subtotal_price_usd\n    FROM {{ ref('silver_milestones') }} AS milestones\n\
      \    left join invoice_currencies\n        on invoice_currencies.invoice_id\
      \ = milestones.itemizable_id\n    where milestones.itemizable_id is not null\n\
      \      and milestones.itemizable_type = 'Pg::ProviderBillingDocument'\n    group\
      \ by milestones.itemizable_id\n),\n\ninvoice_shipping AS (\n    select\n   \
      \     shippings.shipable_id AS invoice_id,\n        max(shippings.cost) AS shipping_cost,\n\
      \        max(shippings.cost / invoice_currencies.conversion_rate) AS shipping_cost_usd\n\
      \    FROM {{ ref('bronze_shippings') }} AS shippings\n    left join invoice_currencies\n\
      \        on invoice_currencies.invoice_id = shippings.shipable_id\n    where\
      \ shippings.shipable_type = 'Pg::ProviderBillingDocument'\n    group by shippings.shipable_id\n\
      ),\n\ninvoice_taxes AS (\n    select\n        taxes.taxable_id AS invoice_id,\n\
      \        sum(taxes.amount) AS tax_amount,\n        sum(taxes.amount / invoice_currencies.conversion_rate)\
      \ AS tax_amount_usd\n    FROM {{ ref('bronze_taxes') }} AS taxes\n    left join\
      \ invoice_currencies\n      on invoice_currencies.invoice_id = taxes.taxable_id\n\
      \    where taxes.taxable_type = 'Pg::ProviderBillingDocument'\n      and taxes.type\
      \ = 'Pg::RetailTax'\n      and taxes.category = 'sales'\n    group by taxes.taxable_id\n\
      )\n\nselect\n    invoices.id AS id,\n    invoices.purchase_order_id,\n    invoices.created_at,\n\
      \    invoices.updated_at,\n    invoices.status,\n    CASE WHEN type = 'Pg::ProviderCredit'\
      \ THEN -invoices.retail_total_price ELSE invoices.retail_total_price END AS\
      \ retail_total_price,\n    CASE WHEN type = 'Pg::ProviderCredit' THEN -invoices.retail_total_price/currencies.conversion_rate\
      \ ELSE invoices.retail_total_price/currencies.conversion_rate END AS retail_total_price_usd,\n\
      \    milestones.subtotal_base_currency,\n    milestones.subtotal_usd,\n    milestones.retail_subtotal_price,\n\
      \    milestones.retail_subtotal_price_usd,\n    milestones.wholesale_subtotal_price,\n\
      \    milestones.wholesale_subtotal_price_usd,\n    milestones.list_subtotal_price,\n\
      \    milestones.list_subtotal_price_usd,\n    COALESCE(shipping.shipping_cost,\
      \ 0) AS shipping_cost,\n    COALESCE(shipping.shipping_cost_usd, 0) AS shipping_cost_usd,\n\
      \    COALESCE(taxes.tax_amount, 0) AS tax_amount,\n    COALESCE(taxes.tax_amount_usd,\
      \ 0) AS tax_amount_usd\nFROM {{ ref('bronze_provider_billing_documents') }}\
      \ AS invoices\nLEFT JOIN invoice_milestones AS milestones ON invoices.id = milestones.invoice_id\n\
      LEFT JOIN invoice_shipping AS shipping ON invoices.id = shipping.invoice_id\n\
      LEFT JOIN invoice_taxes AS taxes ON invoices.id = taxes.invoice_id\nLEFT JOIN\
      \ invoice_currencies AS currencies ON invoices.id = currencies.invoice_id\n"
  silver_quote_groups:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_quote_groups.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      id\"]},\n    {\"columns\": [\"organization_id\"]},\n    {\"columns\": [\"name\"\
      ]},\n    {\"columns\": [\"primary_discipline_id\"]},\n    {\"columns\": [\"\
      primary_discipline_name\"]},\n    {\"columns\": [\"primary_category_id\"]},\n\
      \    {\"columns\": [\"primary_category_name\"]},\n    {\"columns\": [\"primary_subcategory_id\"\
      ]},\n    {\"columns\": [\"primary_subcategory_name\"]},\n    {\"columns\": [\"\
      ware_id\"]},\n    {\"columns\": [\"ware_name\"]},\n    {\"columns\": [\"status\"\
      ]},\n    {\"columns\": [\"user_id\"]},\n    {\"columns\": [\"user_email\"]}\n\
      \  ])\n}}\n\n-- Distinct provider proposals per quote group\nWITH distinct_provider_proposals\
      \ AS (\n  SELECT\n    quoted_wares.quote_group_id,\n    COUNT(DISTINCT proposals.provider_pg_id)\
      \ AS distinct_provider_proposals\n  FROM {{ ref('bronze_quoted_wares') }} AS\
      \ quoted_wares\n  JOIN {{ ref('bronze_proposals') }} AS proposals\n    ON proposals.quoted_ware_pg_id\
      \ = quoted_wares.id\n  WHERE\n    proposals.active = TRUE\n  GROUP BY quoted_wares.quote_group_id\n\
      ),\n\n-- Distinct SOW provider counts per quote group\ndistinct_sow_providers\
      \ AS (\n  SELECT\n    quoted_wares.quote_group_id,\n    COUNT(DISTINCT proposals.provider_pg_id)\
      \ AS distinct_provider_sows\n  FROM {{ ref('bronze_quoted_wares') }} AS quoted_wares\n\
      \  JOIN {{ ref('bronze_proposals') }} AS proposals\n    ON proposals.quoted_ware_pg_id\
      \ = quoted_wares.id\n  WHERE\n    proposals.active = TRUE\n    AND proposals.proposal_type\
      \ = 'SOW'\n  GROUP BY quoted_wares.quote_group_id\n),\n\n-- Customer purchase\
      \ order metrics per quote group\ncustomer_po_metrics AS (\n  SELECT\n    customer_purchase_orders.quote_group_pg_id\
      \ AS quote_group_id,\n    COUNT(DISTINCT customer_purchase_orders.id) AS distinct_customer_purchase_orders,\n\
      \    MIN(customer_purchase_orders.po_created_at) AS first_po_date\n  FROM {{\
      \ ref('bronze_customer_purchase_orders') }} AS customer_purchase_orders\n  WHERE\
      \ customer_purchase_orders.po_number IS NOT NULL\n    AND customer_purchase_orders.po_created_at\
      \ IS NOT NULL\n  GROUP BY customer_purchase_orders.quote_group_pg_id\n),\n\n\
      -- Quote metrics per quote group\nquote_metrics AS (\n  SELECT\n    quoted_wares.quote_group_id,\n\
      \    COUNT(DISTINCT proposals.id) AS number_of_quotes,\n    AVG(CASE\n     \
      \ WHEN NOT EXISTS (\n        SELECT 1 FROM {{ ref('bronze_provider_purchase_orders')\
      \ }} AS provider_purchase_orders\n        JOIN {{ ref('bronze_proposals') }}\
      \ AS selected_proposals ON provider_purchase_orders.proposal_id = selected_proposals.id\n\
      \        WHERE selected_proposals.provider_pg_id = proposals.provider_pg_id\n\
      \          AND selected_proposals.quoted_ware_pg_id = proposals.quoted_ware_pg_id\n\
      \      ) THEN (proposals.retail_total_price / currencies.conversion_rate)\n\
      \      ELSE NULL\n    END) AS avg_quote_price_usd_excluding_selected,\n    AVG(proposals.retail_total_price\
      \ / currencies.conversion_rate) AS avg_quote_price_usd_including_selected\n\
      \  FROM {{ ref('bronze_quoted_wares') }} AS quoted_wares\n  JOIN {{ ref('bronze_proposals')\
      \ }} AS proposals\n    ON proposals.quoted_ware_pg_id = quoted_wares.id\n  JOIN\
      \ {{ ref('bronze_currencies') }} AS currencies\n    ON currencies.exchangable_id\
      \ = proposals.id\n    AND currencies.exchangable_type = 'Pg::ProposalBase'\n\
      \  WHERE\n    proposals.active = TRUE\n    AND proposals.retail_total_price\
      \ IS NOT NULL\n  GROUP BY quoted_wares.quote_group_id\n),\n\ntransformed_data\
      \ AS (\n  SELECT\n    quote_groups.id AS id,\n    quote_groups.uuid AS uuid,\n\
      \    UPPER(RIGHT(COALESCE(quote_groups.couch_id, quote_groups.uuid::text), 6))\
      \ AS identifier,\n    quote_groups.organization_id AS organization_id,\n   \
      \ organizations.name AS organization_name,\n    organizations.subdomain AS organization_subdomain,\n\
      \    quote_groups.name AS name,\n    quote_groups.description AS description,\n\
      \    discipline.beacon_id AS primary_discipline_id,\n    discipline.beacon_name\
      \ AS primary_discipline_name,\n    category.beacon_id AS primary_category_id,\n\
      \    category.beacon_name AS primary_category_name,\n    subcategory.beacon_id\
      \ AS primary_subcategory_id,\n    subcategory.beacon_name AS primary_subcategory_name,\n\
      \    quote_groups.ware_id AS ware_id,\n    wares.name AS ware_name,\n    quote_groups.inventory_item_purchase\
      \ AS inventory_item_purchase,\n    quote_groups.last_computed_status AS status,\n\
      \    quote_groups.user_id AS user_id,\n    users.email AS user_email,\n    users.full_name\
      \ AS user_full_name,\n    quote_groups.multisourced AS multisourced,\n    quote_groups.filters\
      \ AS filters,\n    quote_groups.created_at AS created_at,\n    quote_groups.updated_at\
      \ AS updated_at,\n    quote_groups.last_computed_status AS last_computed_status,\n\
      \    quote_groups.project_code AS project_code,\n    quote_groups.site AS site,\n\
      \    CASE WHEN ROW_NUMBER() OVER(PARTITION BY quote_groups.user_id ORDER BY\
      \ quote_groups.created_at ASC) = 1 THEN TRUE ELSE FALSE END AS is_first_quote_group,\n\
      \    shipping_address.site_name AS shipping_site_name,\n    shipping_address.country\
      \ AS shipping_country,\n    shipping_address.organization_name AS shipping_organization_name,\n\
      \    billing_address.site_name AS billing_site_name,\n    organizations.url\
      \ || '/quote_groups/' || quote_groups.uuid AS storefront_url,\n    COALESCE(distinct_provider_proposals.distinct_provider_proposals,\
      \ 0) AS distinct_provider_proposals,\n    COALESCE(distinct_sow_providers.distinct_provider_sows,\
      \ 0) AS distinct_provider_sows,\n    COALESCE(customer_po_metrics.distinct_customer_purchase_orders,\
      \ 0) AS distinct_customer_purchase_orders,\n    customer_po_metrics.first_po_date\
      \ AS first_po_date,\n    -- Quote metrics\n    COALESCE(quote_metrics.number_of_quotes,\
      \ 0) AS number_of_quotes,\n    quote_metrics.avg_quote_price_usd_excluding_selected\
      \ AS avg_quote_price_usd_excluding_selected,\n    quote_metrics.avg_quote_price_usd_including_selected\
      \ AS avg_quote_price_usd_including_selected\n  FROM {{ ref('bronze_quote_groups')\
      \ }} AS quote_groups\n    LEFT JOIN {{ ref('silver_organizations') }} AS organizations\
      \ ON organizations.id = quote_groups.organization_id\n    LEFT JOIN {{ ref('silver_beacon_refs')\
      \ }} AS discipline\n        ON quote_groups.primary_discipline_id = discipline.ref_id\n\
      \    LEFT JOIN {{ ref('silver_beacon_refs') }} AS category\n        ON quote_groups.primary_category_id\
      \ = category.ref_id\n    LEFT JOIN {{ ref('silver_beacon_refs') }} AS subcategory\n\
      \        ON quote_groups.primary_subcategory_id = subcategory.ref_id\n    LEFT\
      \ JOIN {{ ref('bronze_wares') }} AS wares ON wares.id = quote_groups.ware_id\n\
      \    JOIN LATERAL (\n      SELECT *\n      FROM {{ ref('bronze_addresses') }}\
      \ AS shipping_address\n      WHERE shipping_address.addressable_id = quote_groups.id\n\
      \        AND shipping_address.addressable_type = 'Pg::QuoteGroup'\n        AND\
      \ shipping_address.type = 'Pg::ShippingAddress'\n        AND shipping_address.country\
      \ IS NOT NULL\n      LIMIT 1\n    ) AS shipping_address ON true\n    JOIN LATERAL\
      \ (\n      SELECT *\n      FROM {{ ref('bronze_addresses') }} AS billing_address\n\
      \      WHERE billing_address.addressable_id = quote_groups.id\n        AND billing_address.addressable_type\
      \ = 'Pg::QuoteGroup'\n        AND billing_address.type = 'Pg::BillingAddress'\n\
      \        AND billing_address.country IS NOT NULL\n      LIMIT 1\n    ) AS billing_address\
      \ ON true\n    LEFT JOIN {{ ref('bronze_users') }} AS users ON users.id = quote_groups.user_id\n\
      \    LEFT JOIN distinct_provider_proposals\n        ON quote_groups.id = distinct_provider_proposals.quote_group_id\n\
      \    LEFT JOIN distinct_sow_providers\n        ON quote_groups.id = distinct_sow_providers.quote_group_id\n\
      \    LEFT JOIN customer_po_metrics\n        ON quote_groups.id = customer_po_metrics.quote_group_id\n\
      \    LEFT JOIN quote_metrics\n        ON quote_groups.id = quote_metrics.quote_group_id\n\
      \  WHERE quote_groups.exclude_from_reporting is not true\n)\n\nSELECT * FROM\
      \ transformed_data\n"
  silver_transaction_fee_savings_calculated:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_transaction_fee_savings_calculated.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      provider_purchase_order_id\"]},\n  ]\n)\n}}\n\nWITH transaction_amounts AS (\n\
      \  SELECT\n    purchase_orders.id,\n    (customer_purchase_orders.retail_subtotal_price_usd\
      \ - purchase_orders.wholesale_subtotal_price_usd) AS total_fee,\n    CASE\n\
      \      WHEN purchase_orders.base_subtotal_price_usd IS NULL OR purchase_orders.base_subtotal_price_usd\
      \ = 0 THEN NULL\n      WHEN customer_purchase_orders.retail_subtotal_price_usd\
      \ IS NULL THEN NULL\n      WHEN purchase_orders.fee_cap_amount_usd > 0 \n  \
      \      AND (customer_purchase_orders.retail_subtotal_price_usd - purchase_orders.base_subtotal_price_usd)\
      \ > purchase_orders.fee_cap_amount_usd\n      THEN purchase_orders.fee_cap_amount_usd\n\
      \      ELSE (customer_purchase_orders.retail_subtotal_price_usd - purchase_orders.base_subtotal_price_usd)\n\
      \    END AS customer_tf_amount_usd,\n    CASE\n      WHEN purchase_orders.base_subtotal_price_usd\
      \ IS NULL OR purchase_orders.base_subtotal_price_usd = 0 THEN NULL\n      WHEN\
      \ purchase_orders.wholesale_subtotal_price_usd IS NULL THEN NULL\n      ELSE\
      \ (purchase_orders.base_subtotal_price_usd - purchase_orders.wholesale_subtotal_price_usd)\n\
      \    END AS provider_tf_amount_usd,\n    -- Local currency transaction fee amounts\n\
      \    (customer_purchase_orders.retail_subtotal_price - purchase_orders.wholesale_subtotal_price)\
      \ AS total_transaction_fee_amount,\n    CASE\n      WHEN purchase_orders.base_subtotal_price\
      \ IS NULL OR purchase_orders.base_subtotal_price = 0 THEN NULL\n      WHEN customer_purchase_orders.retail_subtotal_price\
      \ IS NULL THEN NULL\n      WHEN purchase_orders.fee_cap_amount_usd > 0 \n  \
      \      AND (customer_purchase_orders.retail_subtotal_price_usd - purchase_orders.base_subtotal_price_usd)\
      \ > purchase_orders.fee_cap_amount_usd\n      THEN (purchase_orders.fee_cap_amount_usd\
      \ * purchase_orders.conversion_rate)\n      ELSE (customer_purchase_orders.retail_subtotal_price\
      \ - purchase_orders.base_subtotal_price)\n    END AS customer_tf_amount,\n \
      \   CASE\n      WHEN purchase_orders.base_subtotal_price IS NULL OR purchase_orders.base_subtotal_price\
      \ = 0 THEN NULL\n      WHEN purchase_orders.wholesale_subtotal_price IS NULL\
      \ THEN NULL\n      ELSE (purchase_orders.base_subtotal_price - purchase_orders.wholesale_subtotal_price)\n\
      \    END AS provider_tf_amount,\n    customer_purchase_orders.retail_subtotal_price_usd\
      \ AS retail_subtotal_price_usd\n  FROM {{ ref('silver_provider_purchase_orders')\
      \ }} AS purchase_orders\n  JOIN {{ ref('silver_customer_purchase_orders') }}\
      \ AS customer_purchase_orders \n    ON purchase_orders.customer_purchase_order_id\
      \ = customer_purchase_orders.id\n),\n\ntransformed_data AS (\n  SELECT\n   \
      \ purchase_orders.id AS provider_purchase_order_id,\n    legal_documents.name\
      \ AS legal_document_name,\n    proposals.theoretical_transaction_rate AS theoretical_transaction_rate,\n\
      \    proposals.theoretical_fee_cap AS theoretical_fee_cap,\n    transaction_amounts.retail_subtotal_price_usd\
      \ AS retail_subtotal_price_usd,\n    purchase_orders.fee_cap_amount_usd AS fee_cap_amount_usd,\n\
      \    transaction_fee_assignments.customer_fee AS customer_fee,\n    transaction_fee_assignments.provider_fee\
      \ AS provider_fee,\n    transaction_amounts.customer_tf_amount_usd AS customer_tf_amount_usd,\n\
      \    transaction_amounts.provider_tf_amount_usd AS provider_tf_amount_usd,\n\
      \    transaction_amounts.total_fee AS total_transaction_fee_amount_usd,\n  \
      \  transaction_amounts.customer_tf_amount AS customer_tf_amount,\n    transaction_amounts.provider_tf_amount\
      \ AS provider_tf_amount,\n    transaction_amounts.total_transaction_fee_amount\
      \ AS total_transaction_fee_amount,\n    COALESCE(\n      purchase_orders.fee_cap_savings_override_usd,\n\
      \      purchase_orders.fee_cap_savings_computed_usd\n    ) AS fee_cap_savings_usd,\n\
      \    COALESCE(\n      purchase_orders.fee_assignment_savings_override_usd,\n\
      \      purchase_orders.fee_assignment_savings_computed_usd\n    ) AS fee_assignment_savings_usd,\n\
      \    purchase_orders.savings_updated_by_id AS savings_updated_by_id,\n    purchase_orders.savings_updated_at\
      \ AS savings_updated_at,\n    purchase_orders.savings_updated_reason AS savings_updated_reason\n\
      \  FROM {{ ref('silver_provider_purchase_orders') }} AS purchase_orders\n  JOIN\
      \ {{ ref('silver_proposals') }} AS proposals ON purchase_orders.proposal_id\
      \ = proposals.id\n  LEFT JOIN (\n    SELECT DISTINCT ON (assignable_id)\n  \
      \    assignable_id,\n      customer_fee,\n      provider_fee\n    FROM {{ ref('bronze_transaction_fee_assignments')}}\n\
      \    WHERE assignable_type = 'Pg::ProposalBase'\n    ORDER BY assignable_id,\
      \ created_at DESC\n  ) AS transaction_fee_assignments ON transaction_fee_assignments.assignable_id\
      \ = proposals.id\n  JOIN {{ ref('bronze_legal_documents') }} AS legal_documents\
      \ ON proposals.legal_document_id = legal_documents.id \n  JOIN transaction_amounts\
      \ ON purchase_orders.id = transaction_amounts.id\n)\n\n\nSELECT * FROM transformed_data\n"
  silver_organization_signed_legal_documents:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_organization_signed_legal_documents.sql
    sql: "{{ config(materialized=\"table\",\n    indexes=[\n        {\"columns\":\
      \ [\"organization_id\"]},\n    ])\n}}\n\nWITH transformed_data AS (\n    select\n\
      \    signable_id organization_id,\n    MAX(CASE WHEN legal_document_id = 2 \
      \ THEN 1 ELSE 0 END)::boolean AS \"supplier-agreement\",\n    MAX(CASE WHEN\
      \ legal_document_id = 3  THEN 1 ELSE 0 END)::boolean AS \"bio-scientist-marketplace-agreement\"\
      ,\n    MAX(CASE WHEN legal_document_id = 7  THEN 1 ELSE 0 END)::boolean AS \"\
      bia-scientist-com-marketplace-agreement\",\n    MAX(CASE WHEN legal_document_id\
      \ = 8  THEN 1 ELSE 0 END)::boolean AS \"legacy-marketplace-agreement\",\n  \
      \  MAX(CASE WHEN legal_document_id = 9  THEN 1 ELSE 0 END)::boolean AS \"marketplace-agreement\"\
      ,\n    MAX(CASE WHEN legal_document_id = 13 THEN 1 ELSE 0 END)::boolean AS \"\
      5am-scientist-com-marketplace-agreement\",\n    MAX(CASE WHEN legal_document_id\
      \ = 15 THEN 1 ELSE 0 END)::boolean AS \"personal-care-marketplace-agreement\"\
      ,\n    MAX(CASE WHEN legal_document_id = 16 THEN 1 ELSE 0 END)::boolean AS \"\
      indiana-biosciences-research-institute-inc-scientist-com-marketplace-agreement\"\
      \n    FROM {{ ref('bronze_signed_legal_documents') }} AS signed_legal_documents\
      \ WHERE signable_type = 'Pg::Organization' AND revoked_at IS NULL\n    AND signable_id\
      \ IS NOT NULL\n    GROUP BY signable_id\n)\n\nSELECT * FROM transformed_data"
  silver_feature_settings:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_feature_settings.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      organization_id\"]},\n    {\"columns\": [\"lft\"]},\n    {\"columns\": [\"rgt\"\
      ]}\n  ])\n}}\n\nSELECT\n  feature_settings.*,\n  organizations.lft,\n  organizations.rgt,\n\
