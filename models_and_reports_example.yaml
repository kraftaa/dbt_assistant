  silver_organizations:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_organizations.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      id\"]},\n    {\"columns\": [\"subdomain\"]},\n    {\"columns\": [\"created_at\"\
      ]},\n    {\"columns\": [\"updated_at\"]},\n    {\"columns\": [\"subdomain_default_organization_id\"\
      ]},\n    {\"columns\": [\"canonical_organization_id\"]}\n  ])\n}}\n\nWITH transformed_data\
      \ AS (\n  SELECT\n    organizations.id AS id,\n    organizations.subdomain AS\
      \ subdomain,\n    organizations.domain AS domain,\n    organizations.name AS\
      \ name,\n    organizations.subdomain_default,\n    organizations.canonical,\n\
      \    organizations.created_at AS created_at,\n    organizations.updated_at AS\
      \ updated_at,\n    'https://' || organizations.subdomain || '.' || organizations.domain\
      \ AS url,\n    (\n      SELECT subdomain_default_organizations.id\n      FROM\
      \ {{ ref('bronze_organizations') }} AS subdomain_default_organizations\n   \
      \   WHERE subdomain_default_organizations.subdomain_default = true\n       \
      \ AND subdomain_default_organizations.lft <= organizations.lft\n        AND\
      \ subdomain_default_organizations.rgt >= organizations.rgt\n      ORDER BY subdomain_default_organizations.lft\
      \ DESC\n      LIMIT 1\n    ) AS subdomain_default_organization_id,\n    (\n\
      \      SELECT canonical_organizations.id\n      FROM {{ ref('bronze_organizations')\
      \ }} AS canonical_organizations\n      WHERE canonical_organizations.canonical\
      \ = true\n        AND canonical_organizations.lft <= organizations.lft\n   \
      \     AND canonical_organizations.rgt >= organizations.rgt\n      ORDER BY canonical_organizations.lft\
      \ DESC\n      LIMIT 1\n    ) AS canonical_organization_id,\n    (\n      SELECT\
      \ legal_entities.companyname\n      FROM {{ ref('bronze_legal_entities') }}\
      \ AS legal_entities\n      WHERE legal_entities.scientist_entity_type = 'Pg::Organization'\n\
      \        AND legal_entities.scientist_entity_id = organizations.id\n      LIMIT\
      \ 1\n    ) AS legal_entity_name,\n    (\n      SELECT feature_settings.instaquote\n\
      \      FROM {{ ref('silver_feature_settings_inherited')}} AS feature_settings\n\
      \      WHERE feature_settings.organization_id = organizations.id\n        AND\
      \ feature_settings.is_demo <> TRUE\n      LIMIT 1\n    ) AS instaquote\n  FROM\
      \ {{ ref('bronze_organizations') }} AS organizations\n  WHERE organizations.subdomain\
      \ <> 'demo'\n)\n\nSELECT * FROM transformed_data"
  silver_provider_badges:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_provider_badges.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      organization_id\"]},\n    {\"columns\": [\"provider_id\"]}\n  ]\n)}}\n\n{% set\
      \ annotation_list = [\n    'AW', 'BIOA', 'BMX', 'CMC', 'DSX', 'EQIPD', 'GCP',\
      \ 'GLP',\n    'HBS', 'HCO/HCI', 'HCP', 'HEOR', 'PDX', 'RawMat', 'RWE'\n] %}\n\
      \nWITH rfi_annotations AS (\n    -- RFI badges as shown in annotation_list (these\
      \ are specific to organization and provider)\n    SELECT\n        provider_rfi_annotations.organization_id,\n\
      \        provider_rfi_annotations.provider_pg_id AS provider_id,\n        {%\
      \ for rfi in annotation_list %}\n        (provider_rfi_annotations.badge_type\
      \ = '{{ rfi }}')::int AS badge_{{ rfi | replace('/', '_') | lower }}{% if not\
      \ loop.last %},{% endif %}\n        {% endfor %}\n    FROM {{ ref('bronze_provider_rfi_annotations')\
      \ }} AS provider_rfi_annotations\n    WHERE provider_rfi_annotations.status\
      \ != 'Denied'\n),\n\npreferred AS (\n    -- Preferred provider badges (these\
      \ are specific to organization and provider)\n    SELECT\n        provider_annotation_collections.organization_id,\n\
      \        provider_annotation_collections.provider_pg_id AS provider_id,\n  \
      \      CASE WHEN provider_annotations.preferred_supplier = TRUE THEN 1 ELSE\
      \ 0 END AS badge_preferred\n    FROM {{ ref('bronze_provider_annotation_collections')\
      \ }} AS provider_annotation_collections\n    JOIN {{ ref('bronze_provider_annotation_collections_annotations')\
      \ }} AS provider_annotation_collections_annotations\n        ON provider_annotation_collections.id\
      \ = provider_annotation_collections_annotations.provider_annotation_collection_id\n\
      \    JOIN {{ ref('bronze_provider_annotations') }} AS provider_annotations\n\
      \        ON provider_annotation_collections_annotations.provider_annotation_id\
      \ = provider_annotations.id\n    WHERE provider_annotations.preferred_supplier\
      \ = TRUE\n),\n\nbuilt_in AS (\n    -- Built In Badges: Sustainability and Diversity\
      \ certifications (these are specific to providers)\n    SELECT\n        id as\
      \ provider_id,\n        CASE WHEN is_diverse = TRUE THEN 1 ELSE 0 END AS badge_div,\n\
      \        CASE WHEN is_sustainable = TRUE THEN 1 ELSE 0 END AS badge_sust\n \
      \   FROM {{ ref('silver_provider_certifications') }}\n),\n\ntransformed_data\
      \ AS (\n    SELECT\n        COALESCE(rfi_annotations.organization_id, preferred.organization_id)\
      \ AS organization_id,\n        COALESCE(rfi_annotations.provider_id, preferred.provider_id,\
      \ built_in.provider_id) AS provider_id,\n        MAX(preferred.badge_preferred)\
      \ AS badge_preferred,\n        MAX(built_in.badge_div) AS badge_div,\n     \
      \   MAX(built_in.badge_sust) AS badge_sust,\n        {% for rfi in annotation_list\
      \ %}\n        MAX(badge_{{ rfi | replace('/', '_') | lower }}) AS badge_{{ rfi\
      \ | replace('/', '_') | lower }}{% if not loop.last %},{% endif %}\n       \
      \ {% endfor %},\n        -- group these badges into 3 categories: preferred,\
      \ compli, built-in\n        CASE WHEN MAX(preferred.badge_preferred) = 1 THEN\
      \ TRUE ELSE FALSE END AS has_preferred_badge,\n        CASE WHEN MAX(built_in.badge_div)\
      \ = 1 OR MAX(built_in.badge_sust) = 1 THEN TRUE ELSE FALSE END AS has_built_in_badge,\n\
      \        CASE WHEN\n            {% for rfi in annotation_list %}\n         \
      \       MAX(badge_{{ rfi | replace('/', '_') | lower }}) = 1{% if not loop.last\
      \ %} OR {% endif %}\n            {% endfor %}\n        THEN TRUE ELSE FALSE\
      \ END AS has_compli_badge\n    FROM rfi_annotations\n    FULL OUTER JOIN preferred\n\
      \      ON rfi_annotations.organization_id = preferred.organization_id\n    \
      \  AND rfi_annotations.provider_id = preferred.provider_id\n    LEFT JOIN built_in\
      \ -- left join to exclude providers that are not associated with any organization\
      \ yet\n      ON COALESCE(rfi_annotations.provider_id, preferred.provider_id)\
      \ = built_in.provider_id\n    GROUP BY\n      COALESCE(rfi_annotations.organization_id,\
      \ preferred.organization_id),\n      COALESCE(rfi_annotations.provider_id, preferred.provider_id,\
      \ built_in.provider_id)\n)\n\nSELECT * FROM transformed_data\n"
  silver_feature_settings_inherited:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_feature_settings_inherited.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      organization_id\"]}\n  ])\n}}\n\n{% set features = [\n    \"address_verification\"\
      ,\n    \"advantage_program\",\n    \"ai_chatbot_sidebar\",\n    \"ai_overview_results\"\
      ,\n    \"allow_backoffice_pii_display_option\",\n    \"allow_skip_service_selection\"\
      ,\n    \"allows_registration\",\n    \"app_store\",\n    \"approve_for_payment\"\
      ,\n    \"auto_negotiation\",\n    \"can_view_technical_rfis\",\n    \"category_agroscience\"\
      ,\n    \"category_animal_health\",\n    \"category_consulting\",\n    \"category_personal_care\"\
      ,\n    \"category_ratings\",\n    \"category_value_evidence_access\",\n    \"\
      central_labs\",\n    \"centralized_buyer_enabled\",\n    \"certifications\"\
      ,\n    \"change_order_request\",\n    \"cir_enabled\",\n    \"create_site_step_in_onboarding\"\
      ,\n    \"cumulative_cost_per_supplier\",\n    \"customer_transaction_fees\"\
      ,\n    \"delegate_negotiation\",\n    \"disease_model_finder\",\n    \"disease_model_finder_public\"\
      ,\n    \"display_shared_ratings\",\n    \"download_rfis\",\n    \"favorite_categories_during_signup\"\
      ,\n    \"fcpa_annotations\",\n    \"finalize_order_workflow\",\n    \"goods_receipts\"\
      ,\n    \"guided_buying\",\n    \"hbs_sample_finder\",\n    \"hide_list_prices\"\
      ,\n    \"hide_popular_services\",\n    \"homepage_product_search\",\n    \"\
      instaquote\",\n    \"invoice_compliance\",\n    \"is_demo\",\n    \"manage_milestone_templates\"\
      ,\n    \"new_product_hub_search_page\",\n    \"no_invoice_ap_emails\",\n   \
      \ \"omic_qc_tool\",\n    \"one_to_many\",\n    \"open_ai_enabled\",\n    \"\
      organization_address_management\",\n    \"organization_legal_entity_creation\"\
      ,\n    \"partial_proforma_invoices\",\n    \"past_requests\",\n    \"pdx_models\"\
      ,\n    \"pdx_models_public\",\n    \"preferred_supplier\",\n    \"proceed_without_purchase_workflow\"\
      ,\n    \"product_credit_card_purchase\",\n    \"product_credit_card_purchase_pay_later\"\
      ,\n    \"product_currencies\",\n    \"product_hub_free_shipping\",\n    \"product_hub_use_list_price\"\
      ,\n    \"product_purchase_order_number_payment\",\n    \"product_standing_purchase_order_payment\"\
      ,\n    \"promo_codes\",\n    \"proposal_compliance_auto_submittable\",\n   \
      \ \"proposal_compliance_required\",\n    \"proposal_insights\",\n    \"proposals_show_cost_center\"\
      ,\n    \"proposals_show_order_identifier\",\n    \"protect_send_to_vendors\"\
      ,\n    \"public_products\",\n    \"public_services\",\n    \"public_suppliers\"\
      ,\n    \"punchout_enforced\",\n    \"purchase_order_projected_total\",\n   \
      \ \"request_approvals_enabled\",\n    \"request_compliance_required\",\n   \
      \ \"request_show_beacon_dropdown\",\n    \"require_request_title\",\n    \"\
      salesforce\",\n    \"sci_score\",\n    \"send_to_pots\",\n    \"share_files\"\
      ,\n    \"show_marketplace_agreement\",\n    \"show_proposal_negotiate_prompt\"\
      ,\n    \"show_tos\",\n    \"show_transaction_fee\",\n    \"sign_in_required\"\
      ,\n    \"store_shared_ratings\",\n    \"structure_search\",\n    \"superset_reports\"\
      ,\n    \"supplier_inventory\",\n    \"supplier_portal\",\n    \"supplier_selection_page_refresh\"\
      ,\n    \"tax_by_line_item\",\n    \"terms_of_service_inventory_access\",\n \
      \   \"third_party_buying\",\n    \"trial_insights\",\n    \"tumor_model_finder\"\
      ,\n    \"tumor_model_finder_public\",\n    \"unified_search\",\n    \"unified_sow_download\"\
      ,\n    \"username_required\",\n    \"verifi\",\n    \"view_catalogs\",\n   \
      \ \"vip\"\n] %}\n\nWITH ancestor_features AS (\n    SELECT\n        organizations.id\
      \ as organization_id,\n        feature_settings.depth,\n        {% for feature\
      \ in features %}\n        feature_settings.{{ feature }},\n        {% endfor\
      \ %}\n        ROW_NUMBER() OVER (\n            PARTITION BY organizations.id\n\
      \            ORDER BY feature_settings.depth DESC\n        ) as ancestor_rank\n\
      \    FROM {{ ref('bronze_organizations') }} AS organizations\n    JOIN {{ ref('silver_feature_settings')\
      \ }} AS feature_settings\n        ON feature_settings.lft <= organizations.lft\n\
      \        AND feature_settings.rgt >= organizations.rgt\n),\n\nresolved_features\
      \ AS (\n    SELECT\n        organization_id,\n        {% for feature in features\
      \ %}\n        COALESCE(\n            FIRST_VALUE(\n                CASE\n  \
      \                  WHEN {{ feature }} IS NOT NULL\n                    THEN\
      \ {{ feature }}\n                    ELSE NULL\n                END\n      \
      \      ) OVER (\n                PARTITION BY organization_id\n            \
      \    ORDER BY ancestor_rank\n                ROWS BETWEEN UNBOUNDED PRECEDING\
      \ AND UNBOUNDED FOLLOWING\n            ),\n            false\n        ) as {{\
      \ feature }}{% if not loop.last %},{% endif %}\n        {% endfor %}\n    FROM\
      \ ancestor_features\n)\n\nSELECT\n    resolved_features.organization_id,\n \
      \   {% for feature in features %}\n    resolved_features.{{ feature }}{% if\
      \ not loop.last %},{% endif %}\n    {% endfor %},\n    organizations.created_at,\n\
      \    organizations.updated_at\nFROM resolved_features AS resolved_features\n\
      JOIN {{ ref('bronze_organizations') }} AS organizations\n    ON organizations.id\
      \ = resolved_features.organization_id\n"
  silver_dynamic_form_attachments_proposal_form:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_dynamic_form_attachments_proposal_form.sql
    sql: "{{ config(\n  materialized = 'table',\n  indexes = [\n    {'columns': ['id']},\n\
      \    {'columns': ['dynamic_formable_id']},\n    {'columns': ['dynamic_formable_type']}\n\
      \  ]\n) }}\n\nWITH transformed_data AS (\n\n  WITH recursive json_tree AS (\n\
      \n    SELECT\n      dynamic_form_attachments.id,\n      dynamic_form_attachments.dynamic_formable_id,\n\
      \      dynamic_form_attachments.dynamic_formable_type,\n      dynamic_form_attachments.created_at,\n\
      \      dynamic_form_attachments.updated_at,\n      kv.key AS path_key,\n   \
      \   kv.value AS path_value,\n      kv.key AS full_key,\n      0 AS level\n \
      \   FROM {{ ref('bronze_dynamic_form_attachments') }} dynamic_form_attachments,\n\
      \         jsonb_each(dynamic_form_attachments.data::jsonb) kv\n    WHERE dynamic_form_attachments.dynamic_formable_type\
      \ = 'Pg::ProposalBase'\n\n    UNION ALL\n\n    -- Recursive: dive deeper into\
      \ nested objects\n    SELECT\n      jt.id,\n      jt.dynamic_formable_id,\n\
      \      jt.dynamic_formable_type,\n      jt.created_at,\n      jt.updated_at,\n\
      \      kv.key,\n      kv.value,\n      concat(jt.full_key, '->', kv.key) AS\
      \ full_key,\n      jt.level + 1\n    FROM json_tree jt,\n         jsonb_each(jt.path_value)\
      \ kv\n    WHERE jsonb_typeof(jt.path_value) = 'object'\n\n  )\n\n  SELECT DISTINCT\n\
      \    id,\n    dynamic_formable_id,\n    dynamic_formable_type,\n    created_at,\n\
      \    updated_at,\n    full_key,\n    REPLACE(full_key,' ','') AS cleaned_key,\n\
      \    path_value AS final_value\n  FROM json_tree\n  WHERE jsonb_typeof(path_value)\
      \ != 'object'\n  ORDER BY id, full_key\n\n)\n\nSELECT * FROM transformed_data\n"
  silver_instaquote_proposals:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_instaquote_proposals.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      proposal_id\"]}\n  ]\n)\n}}\n\n-- instaquotes are all 'Estimate' that can be\
      \ converted to 'SOW' for purchase\n-- this table contains all generated instaquotes\
      \ with their proposal_id\n-- instaquotes that were converted to SOWs have a\
      \ populated sow_id field\nWITH transformed_data AS (\n  SELECT\n    proposals.created_at\
      \ AS proposal_created_at,\n    proposals.id AS proposal_id,\n    proposals.instaquote_proposal_template_id\
      \ AS instaquote_proposal_template_id,\n    proposals.provider_pg_id AS provider_pg_id,\n\
      \    proposals.proposal_type AS proposal_type,\n    proposals.quoted_ware_pg_id\
      \ AS quoted_ware_pg_id,\n    organizations.id AS organization_id,\n    organizations.name\
      \ AS organization_name,\n    organizations.subdomain AS organization_subdomain,\n\
      \    quote_groups.billing_site_name AS quote_group_billing_site_name,\n    quote_groups.filters[1]\
      \ AS quote_group_filter1,\n    quote_groups.filters[2] AS quote_group_filter2,\n\
      \    quote_groups.filters[3] AS quote_group_filter3,\n    quote_groups.filters[4]\
      \ AS quote_group_filter4,\n    quote_groups.filters[5] AS quote_group_filter5,\n\
      \    quote_groups.id AS quote_group_id,\n    quote_groups.identifier AS quote_group_identifier,\n\
      \    quote_groups.inventory_item_purchase AS quote_group_inventory_item_purchase,\n\
      \    quote_groups.name AS quote_group_name,\n    quote_groups.primary_category_name\
      \ AS quote_group_primary_category_name,\n    quote_groups.primary_subcategory_name\
      \ AS quote_group_primary_subcategory_name,\n    quote_groups.shipping_country\
      \ AS quote_group_shipping_country,\n    quote_groups.shipping_site_name AS quote_group_shipping_site_name,\n\
      \    quoted_wares.spending_category AS quoted_ware_spending_category,\n    quote_groups.uuid\
      \ AS quote_group_uuid,\n    quoted_wares.id AS quoted_ware_id,\n    sows.id\
      \ AS sow_id,\n    sows.created_at AS sow_created_at,\n    sows.obsoleted AS\
      \ sow_obsoleted\n  FROM {{ ref('bronze_proposals') }} AS proposals\n  LEFT JOIN\
      \ {{ ref('bronze_proposals') }} as sows ON proposals.id = sows.parent_proposal_id\n\
      \  JOIN {{ ref('silver_quoted_wares') }} AS quoted_wares ON proposals.quoted_ware_pg_id\
      \ = quoted_wares.id  -- use JOIN to remove instaquotes with no requests\n  JOIN\
      \ {{ ref('silver_quote_groups') }} AS quote_groups ON quoted_wares.quote_group_id\
      \ = quote_groups.id\n  LEFT JOIN (SELECT id, name, subdomain FROM {{ ref('silver_organizations')\
      \ }}) AS organizations ON quote_groups.organization_id = organizations.id\n\
      \  WHERE proposals.instaquote_proposal_template_id IS NOT NULL\n)\n\nSELECT\
      \ * FROM transformed_data\n"
