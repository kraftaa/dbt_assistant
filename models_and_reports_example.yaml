      \    proposals.backoffice_status AS backoffice_status,\n    quote_groups.first_po_date\
      \ AS quote_group_first_po_date,\n    quote_groups.distinct_customer_purchase_orders\
      \ AS quote_group_customer_purchase_order_count,\n    customer_purchase_orders.id\
