      ,\n    dynamic_form_attachments.data -> 'ethical_approval' ->> 'ethical_approval_options'\
      \ AS  \"4_ethical_approval_options\",\n    dynamic_form_attachments.data ->\
      \ 'research_restrictions' ->> 'description' AS \"3_research_restrictions_description\"\
      ,\n    dynamic_form_attachments.data -> 'samples_anonymized' ->> 'description'\
      \ AS \"11_samples_anonymized_description\",\n    dynamic_form_attachments.data\
      \ -> 'source_access'->> 'description' AS  \"8_source_access_description\",\n\
      \    dynamic_form_attachments.data -> 'age_category' ->> 'age_category_options'\
      \ \"6_donor_age_category\",\n    dynamic_form_attachments.data -> 'post_mortem'\
      \ ->> 'post_mortem_options' \"7_post_mortem\",\n    dynamic_form_attachments.data\
      \ -> 'vulnerable_population' ->> 'vulnerable_population_options' \"9_vulnerable_population\"\
      ,\n    dynamic_form_attachments.data -> 'samples_tested' ->> 'samples_tested_options'\
      \ \"10_samples_tested\",\n    dynamic_form_attachments.data ->> 'licenced' AS\
