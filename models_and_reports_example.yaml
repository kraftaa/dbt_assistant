      \    dynamic_form_attachments.data ->> 'transfer_value' AS transfer_value,\n\
      \    CASE WHEN  (dynamic_form_attachments.data -> 'consent_template' ->> 'icf_template_file'\
      \  IS NOT NULL)\n    THEN concat('https://backoffice.scientist.com',  dynamic_form_attachments.data\
      \ -> 'consent_template' -> 'icf_template_file' -> 0 ->>  'url') ELSE null END\n\
      \     AS sow_icf_template_file_url,\n    dynamic_form_attachments.data -> 'consent_template'\
      \ -> 'icf_template_file' -> 0 ->> 'name' AS sow_icf_template_file_name,\n  \
      \  dynamic_form_attachments.data -> 'consent_template' -> 'icf_template_file'\
      \ AS sow_icf_template_file,\n    dynamic_form_attachments.data -> 'consent_template'\
      \ ->> 'description' AS consent_template_description,\n    dynamic_form_attachments.data\
      \ -> 'consent_template' ->> 'document_names' AS hbs_fri_document_names,\n  \
      \  dynamic_form_attachments.data -> 'consent_template' ->> 'additional_information'\
      \ AS icf_template_additional_information,\n    COALESCE(dynamic_form_attachments.data\
      \ -> 'research_restrictions' ->> 'comment',\n    dynamic_form_attachments.data\
      \ -> 'research_restrictions' ->> 'restrictions_comment') AS research_restrictions_comment,\n\
      \    dynamic_form_attachments.data -> 'research_restrictions' ->> 'restriction_of_use_info'\
      \ AS  restriction_of_use_info,\n    dynamic_form_attachments.data -> 'country_collection'\
      \ ->> 'comment' AS country_collection_comment,\n\n     -- hbs questions\n  \
      \  dynamic_form_attachments.data -> 'consent_status' ->> 'consent_options' AS\
      \ \"1_consent_status_consent_options\",\n    dynamic_form_attachments.data ->\
      \ 'consent_template' ->> 'description' AS \"2_consent_template_description\"\
      ,\n    dynamic_form_attachments.data -> 'consent_template' ->> 'comment' AS\
