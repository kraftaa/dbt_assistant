  silver_invoices:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_invoices.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      id\"]},\n    {\"columns\": [\"purchase_order_id\"]}\n  ]\n)}}\n\nWITH invoice_currencies\
      \ AS (\n    SELECT\n        exchangable_id AS invoice_id,\n        conversion_rate\n\
      \    FROM {{ ref('bronze_currencies') }}\n    WHERE exchangable_type = 'Pg::Invoice'\n\
      ),\n\ninvoice_shipping AS (\n    SELECT\n        shippings.shipable_id AS invoice_id,\n\
      \        MAX(shippings.cost) AS shipping_cost,\n        MAX(shippings.cost /\
      \ invoice_currencies.conversion_rate) AS shipping_cost_usd\n    FROM {{ ref('bronze_shippings')\
      \ }} AS shippings\n    LEFT JOIN invoice_currencies\n        ON invoice_currencies.invoice_id\
      \ = shippings.shipable_id\n    WHERE shippings.shipable_type = 'Pg::Invoice'\n\
      \    GROUP BY shippings.shipable_id\n),\n\ninvoice_taxes AS (\n    SELECT\n\
      \        taxes.taxable_id AS invoice_id,\n        SUM(taxes.amount) AS tax_amount,\n\
      \        SUM(taxes.amount / invoice_currencies.conversion_rate) AS tax_amount_usd\n\
      \    FROM {{ ref('bronze_taxes') }} AS taxes\n    LEFT JOIN invoice_currencies\n\
      \        ON invoice_currencies.invoice_id = taxes.taxable_id\n    WHERE taxes.taxable_type\
      \ = 'Pg::Invoice'\n        AND taxes.type = 'Pg::RetailTax'\n        AND taxes.category\
      \ = 'sales'\n    GROUP BY taxes.taxable_id\n)\n\nSELECT\n    invoices.id AS\
      \ id,\n    invoices.uuid AS uuid,\n    invoices.purchase_order_id,\n    invoices.document_type,\n\
      \    invoices.created_at,\n    invoices.updated_at,\n    invoices.cancelled,\n\
      \    CASE WHEN invoices.document_type = 'creditMemo' THEN -invoices.retail_total_price\
      \ ELSE invoices.retail_total_price END AS retail_total_price,\n    CASE WHEN\
      \ invoices.document_type = 'creditMemo' THEN -invoices.retail_total_price/currencies.conversion_rate\
      \ ELSE invoices.retail_total_price/currencies.conversion_rate END AS retail_total_price_usd,\n\
      \    CASE WHEN invoices.document_type = 'creditMemo' THEN -invoices.wholesale_total_price\
      \ ELSE invoices.wholesale_total_price END AS wholesale_total_price,\n    CASE\
      \ WHEN invoices.document_type = 'creditMemo' THEN -invoices.wholesale_total_price/currencies.conversion_rate\
      \ ELSE invoices.wholesale_total_price/currencies.conversion_rate END AS wholesale_total_price_usd,\n\
      \    CASE WHEN invoices.document_type = 'creditMemo' THEN -invoices.retail_subtotal_price\
      \ ELSE invoices.retail_subtotal_price END AS retail_subtotal_price,\n    CASE\
      \ WHEN invoices.document_type = 'creditMemo' THEN -invoices.retail_subtotal_price/currencies.conversion_rate\
      \ ELSE invoices.retail_subtotal_price/currencies.conversion_rate END AS retail_subtotal_price_usd,\n\
      \    CASE WHEN invoices.document_type = 'creditMemo' THEN -invoices.wholesale_subtotal_price\
      \ ELSE invoices.wholesale_subtotal_price END AS wholesale_subtotal_price,\n\
      \    CASE WHEN invoices.document_type = 'creditMemo' THEN -invoices.wholesale_subtotal_price/currencies.conversion_rate\
      \ ELSE invoices.wholesale_subtotal_price/currencies.conversion_rate END AS wholesale_subtotal_price_usd,\n\
      \    -- Use retail_subtotal as subtotal_usd for silver_customer_purchase_orders\n\
      \    CASE WHEN invoices.document_type = 'creditMemo' THEN -invoices.retail_subtotal_price/currencies.conversion_rate\
      \ ELSE invoices.retail_subtotal_price/currencies.conversion_rate END AS subtotal_usd,\n\
      \    CASE WHEN invoices.document_type = 'creditMemo' THEN -COALESCE(shipping.shipping_cost,\
      \ 0) ELSE COALESCE(shipping.shipping_cost, 0) END AS shipping_cost,\n    CASE\
      \ WHEN invoices.document_type = 'creditMemo' THEN -COALESCE(shipping.shipping_cost_usd,\
      \ 0) ELSE COALESCE(shipping.shipping_cost_usd, 0) END AS shipping_cost_usd,\n\
      \    CASE WHEN invoices.document_type = 'creditMemo' THEN -COALESCE(taxes.tax_amount,\
      \ 0) ELSE COALESCE(taxes.tax_amount, 0) END AS tax_amount,\n    CASE WHEN invoices.document_type\
      \ = 'creditMemo' THEN -COALESCE(taxes.tax_amount_usd, 0) ELSE COALESCE(taxes.tax_amount_usd,\
      \ 0) END AS tax_amount_usd\nFROM {{ ref('bronze_invoices') }} AS invoices\n\
      LEFT JOIN invoice_shipping AS shipping ON invoices.id = shipping.invoice_id\n\
      LEFT JOIN invoice_taxes AS taxes ON invoices.id = taxes.invoice_id\nLEFT JOIN\
      \ invoice_currencies AS currencies ON invoices.id = currencies.invoice_id\n"
