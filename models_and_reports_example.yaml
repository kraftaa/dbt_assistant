      \        silver_request_compliance_manifests.live_animals_subquestion_gem,\n\
      \        silver_request_compliance_manifests.live_animals_subquestion_sensitive,\n\
      \        silver_request_compliance_manifests.live_animals_subquestion_gem_breeding,\n\
      \        silver_request_compliance_manifests.live_animals_subquestion_exp_room,\n\
      \        silver_request_compliance_manifests.live_animals_subquestion_biospecimen,\n\
      \        silver_request_compliance_manifests.live_animals_subquestions_none_of_the_above,\n\
      \        silver_request_compliance_manifests.live_animals_subquestions_animal_biospecimen,\n\
      \        silver_request_compliance_manifests.live_animals_subquestions_shipped_for_in_vivo,\n\
      \        silver_request_compliance_manifests.live_animals_subquestions_transgenics_humanized,\n\
      \        silver_request_compliance_manifests.live_animals_subquestions_sensitive_higher_order_species\n\
      \nFROM {{ ref('gold_marketplace_report') }}  AS gold_marketplace_report\nLEFT\
      \ JOIN {{ ref('silver_proposal_form') }}  AS silver_proposal_form ON silver_proposal_form.dynamic_formable_id=gold_marketplace_report.proposal_id\n\
      LEFT JOIN {{ ref('silver_proposal_compliance_manifests') }} AS silver_proposal_compliance_manifests\
      \ ON silver_proposal_compliance_manifests.proposal_id=gold_marketplace_report.proposal_id\n\
      LEFT JOIN {{ ref('silver_request_compliance_manifests') }} AS silver_request_compliance_manifests\
      \ ON silver_request_compliance_manifests.quote_group_pg_id=gold_marketplace_report.quote_group_id\n\
      LEFT JOIN {{ ref('silver_request_form') }} AS silver_request_form ON silver_request_form.dynamic_formable_id=gold_marketplace_report.quote_group_id\n\
      LEFT JOIN {{ ref('silver_compliance_manifest_approvals') }} AS silver_compliance_manifest_approvals\
      \ ON silver_compliance_manifest_approvals.compliance_manifest_id=silver_proposal_compliance_manifests.compliance_manifest_id\n\
      WHERE quoted_ware_last_computed_status != 'Declined'\n)\n\nSELECT * FROM transformed_data"
reports:
  marketplace_report_v2:
