      \ currencies\non currencies.exchangable_id = cpo.id\nleft join {{ source('public',\
      \ 'providers') }} on providers.id = cpo.provider_pg_id\nleft join {{ source('public',\
      \ 'quoted_wares') }} on quoted_wares.id = cpo.quoted_ware_pg_id\nleft join (select\
      \ shipable_type, shipable_id, cost from {{ source('public', 'shippings') }}\
      \ where ( shipable_type='Pg::PurchaseOrderBase' or\nshipable_type='Pg::PurchaseOrderBaseInit'\
      \  ) )  shippings on shippings.shipable_id = cpo.id\nleft join (select taxable_type,\
