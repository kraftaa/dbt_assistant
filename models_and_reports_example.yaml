      \        dynamic_form_attachments_form.type AS type,\n        dynamic_form_attachments_form.full_key\
      \ AS full_key,\n        dynamic_form_attachments_form.answer AS answer,\n  \
      \      dynamic_form_attachments_form.key AS embedded_dynamic_forms_key,\n  \
      \      dynamic_form_attachments_form.full_title AS full_title,\n        dynamic_form_attachments_form.dynamic_form_attachment_id\
      \ AS dynamic_form_attachment_id\n    FROM gold_marketplace_report\n    JOIN\
      \ dynamic_form_attachments_form\n    ON dynamic_form_attachments_form.dynamic_formable_id\
      \ = gold_marketplace_report.quote_group_id\n),\n\ntransformed_data_compliance_manifest\
      \ AS (\n    SELECT\n        gold_marketplace_report.quote_group_id AS quote_group_id,\n\
      \        gold_marketplace_report.quote_group_uuid AS quote_group_uuid,\n   \
      \     gold_marketplace_report.quote_group_identifier AS quote_group_identifier,\n\
      \        gold_marketplace_report.quote_group_ware_name AS ware_name,\n     \
      \   gold_marketplace_report.discipline AS discipline,\n        gold_marketplace_report.category\
      \ AS category,\n        gold_marketplace_report.subcategory AS subcategory,\n\
      \        gold_marketplace_report.organization_id AS organization_id,\n     \
      \   gold_marketplace_report.organization_name AS organization_name,\n      \
      \  gold_marketplace_report.organization_subdomain AS organization_subdomain,\n\
      \        gold_marketplace_report.user_email AS user_email,\n        gold_marketplace_report.user_full_name\
      \ AS user_full_name,\n        gold_marketplace_report.quote_group_url AS quote_group_url,\n\
      \        gold_marketplace_report.quote_group_created_at AS quote_group_created_at,\n\
      \        gold_marketplace_report.quote_group_year AS quote_group_year,\n   \
      \     gold_marketplace_report.request_compliance_manifest_submitted_at AS request_compliance_manifest_submitted_at,\n\
      \        gold_marketplace_report.request_compliance_manifest_id AS request_compliance_manifest_id,\n\
      \        dynamic_form_attachments_compliance_manifests.type AS type,\n     \
      \   dynamic_form_attachments_compliance_manifests.full_key AS full_key,\n  \
      \      dynamic_form_attachments_compliance_manifests.answer AS answer,\n   \
      \     dynamic_form_attachments_compliance_manifests.key AS embedded_dynamic_forms_key,\n\
      \        dynamic_form_attachments_compliance_manifests.full_title AS full_title,\n\
      \        dynamic_form_attachments_compliance_manifests.dynamic_form_attachment_id\
      \ AS dynamic_form_attachment_id\n    FROM gold_marketplace_report\n    JOIN\
      \ dynamic_form_attachments_compliance_manifests\n    ON dynamic_form_attachments_compliance_manifests.dynamic_formable_id\
      \ = gold_marketplace_report.request_compliance_manifest_id\n),\n\ntransformed_data\
      \ AS (\n    SELECT * FROM transformed_data_form\n    UNION ALL\n    SELECT *\
      \ FROM transformed_data_compliance_manifest\n\n)\n\nSELECT * FROM transformed_data\n"
  gold_supplier_insights_report:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/gold/gold_supplier_insights_report.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      provider_id\"]},\n    {\"columns\": [\"organization_id\"]},\n    {\"columns\"\
      : [\"quote_group_id\"]},\n    {\"columns\": [\"proposal_id\"]},\n    {\"columns\"\
      : [\"quoted_ware_id\"]},\n    {\"columns\": [\"quote_group_created_at\"]},\n\
      \    {\"columns\": [\"backoffice_status\"]},\n  ])\n}}\n\n-- filter quoted_wares\
      \ with each QW having either selected proposal or the latest proposal depending\
      \ on whether `Selected for Work` exist\n-- (b/c 1 provider can provide multiple\
      \ proposals within 1 QW)\nWITH filtered_quoted_wares AS (\n  SELECT DISTINCT\
      \ ON (quoted_wares.id)\n    quoted_wares.*,\n    proposals.id AS proposal_id\n\
      \  FROM {{ ref('silver_quoted_wares') }} AS quoted_wares\n  JOIN {{ ref('silver_proposals')\
      \ }} AS proposals ON proposals.quoted_ware_id = quoted_wares.id\n  ORDER BY\n\
      \    quoted_wares.id,\n    (proposals.backoffice_status = 'Selected for Work')\
      \ DESC,   -- make `Selected for Work` come first\n    proposals.submitted_at\
      \ DESC                                 -- to pick the most recent proposal if\
      \ not `Selected for Work`\n),\n\n-- get over provider rating\nprovider_ratings\
      \ AS (\n  SELECT\n      provider_pg_id,\n      (DATE_TRUNC('month', created_at)\
      \ + INTERVAL '1 month - 1 day')::date AS rating_date,\n      AVG(value) AS monthly_overall_rating_average,\n\
      \      COUNT(CASE WHEN value IS NOT NULL THEN 1 ELSE 0 END) AS monthly_overall_rating_count\n\
      \  FROM {{ ref('bronze_ratings') }}\n  GROUP BY provider_pg_id, (DATE_TRUNC('month',\
      \ created_at) + INTERVAL '1 month - 1 day')\n),\n\n-- get provider rating by\
      \ each organization\nprovider_ratings_by_organization AS (\n  SELECT\n     \
      \ provider_pg_id,\n      organization_id,\n      (DATE_TRUNC('month', created_at)\
      \ + INTERVAL '1 month - 1 day')::date AS rating_date,\n      AVG(value) AS monthly_rating_average_by_org,\n\
      \      COUNT(CASE WHEN value IS NOT NULL THEN 1 ELSE 0 END) AS monthly_rating_count_by_org\n\
      \  FROM {{ ref('bronze_ratings') }}\n  GROUP BY provider_pg_id, organization_id,\
      \ (DATE_TRUNC('month', created_at) + INTERVAL '1 month - 1 day')\n),\n\n-- missed\
      \ opportunities: sum of all selected proposals\nmissed_opportunities AS (\n\
      \  SELECT\n    quote_groups.id AS quote_group_id,\n    SUM(proposals.retail_total_price_usd)\
      \ AS retail_total_price_usd\n  FROM {{ ref('silver_quote_groups') }} AS quote_groups\n\
      \  JOIN {{ ref('silver_proposals') }} AS proposals ON proposals.quote_group_id\
      \ = quote_groups.id\n  WHERE backoffice_status = 'Selected for Work'\n  GROUP\
      \ BY quote_groups.id\n),\n\ntransformed_data AS (\n  SELECT\n    -- ID fields\n\
      \    providers.id AS provider_id,\n    organizations.id AS organization_id,\n\
      \    quote_groups.id AS quote_group_id,\n    proposals.id AS proposal_id,\n\
      \    quoted_wares.id AS quoted_ware_id,\n    customer_purchase_orders.id AS\
      \ customer_purchase_order_id,\n\n    -- Prices\n    proposals.retail_subtotal_price\
      \ AS proposal_retail_subtotal_price,\n    proposals.retail_subtotal_price_usd\
      \ AS proposal_retail_subtotal_price_usd,\n    proposals.retail_total_price AS\
      \ proposal_retail_total_price,\n    proposals.retail_total_price_usd AS proposal_retail_total_price_usd,\n\
      \    customer_purchase_orders.retail_subtotal_price AS retail_subtotal_price,\n\
      \    customer_purchase_orders.retail_subtotal_price_usd AS retail_subtotal_price_usd,\n\
      \    customer_purchase_orders.retail_total_price AS retail_total_price,\n  \
      \  customer_purchase_orders.retail_total_price_usd AS retail_total_price_usd,\n\
      \n    -- Dates\n    quote_groups.created_at AS quote_group_created_at,\n   \
      \ proposals.submitted_at AS proposal_submitted_at,\n    customer_purchase_orders.po_created_at\
      \ AS po_created_at,\n\n    -- Chart Fields: Ratings\n    ai_rating_summaries.ai_rating_summary\
      \ AS ai_rating_summary,\n    ratings.monthly_overall_rating_average,\n    ratings.monthly_overall_rating_count,\n\
      \    ratings_by_org.monthly_rating_average_by_org,\n    ratings_by_org.monthly_rating_count_by_org,\n\
      \    missed_opportunities.retail_total_price_usd AS missed_opportunity_retail_total_price_usd,\n\
      \n    -- Status Fields\n    quote_groups.status AS quote_group_status,\n   \
      \ quoted_wares.status AS quoted_ware_status, -- Cancelled vs Completed (Not\
      \ selected QWs have cancelled status???)\n    proposals.backoffice_status AS\
      \ backoffice_status,\n    proposals.state AS proposal_state,\n\n    -- Other\
      \ Fields (not sure if its used)\n    quote_groups.multisourced,\n    quoted_wares.advantage_plan,\n\
      \    quoted_wares.preferred,\n    proposals.proposal_type,\n    quoted_wares.suppliers_contacted_by_quote_group,\n\
      \    quoted_wares.suppliers_contacted_by_organization,\n\n    -- Chart Fields:\
      \ Turnaround Times\n    proposals.request_to_proposal_business_hours,\n    proposals.proposal_to_ready_to_purchase_business_hours,\n\
      \    customer_purchase_orders.pr_to_po_business_hours,\n    customer_purchase_orders.request_to_po_business_hours,\n\
      \n    -- Chart Fields: Purchase Justification\n    customer_purchase_orders.cost_confidence,\n\
      \    customer_purchase_orders.time_confidence,\n    customer_purchase_orders.data_quality_and_access,\n\
      \    customer_purchase_orders.geographic_location,\n    customer_purchase_orders.innovative_solutions,\n\
      \    customer_purchase_orders.previous_relationship,\n    customer_purchase_orders.scientific_expertise,\n\
      \    customer_purchase_orders.service_quality,\n    customer_purchase_orders.sole_source,\n\
      \n    -- Filters\n    organizations.name AS organization_name,\n    organizations.subdomain\
      \ AS organization_subdomain,\n    providers.name AS provider_name,\n    customer_purchase_orders.cpo_price_threshold_usd\
      \ AS order_price_threshold,\n    customer_purchase_orders.completed AS completed,\n\
      \    quote_groups.billing_site_name AS billing_site_name,\n    quote_groups.filters[1]\
      \ AS quote_group_filter1,\n    quote_groups.filters[2] AS quote_group_filter2,\n\
      \    quote_groups.filters[3] AS quote_group_filter3,\n    quote_groups.filters[4]\
      \ AS quote_group_filter4,\n    quote_groups.filters[5] AS quote_group_filter5,\n\
      \    quote_groups.uuid AS quote_group_uuid,\n    quote_groups.inventory_item_purchase\
      \ AS inventory_item_purchase,\n    quote_groups.name AS quote_group_name,\n\
      \    quote_groups.shipping_country AS shipping_country,\n    quote_groups.shipping_site_name\
      \ AS shipping_site_name,\n    quote_groups.primary_category_name AS category,\n\
      \    quote_groups.primary_discipline_name AS discipline,\n    quote_groups.primary_subcategory_name\
      \ AS subcategory,\n    quoted_wares.spending_category AS spending_category,\n\
      \    quote_groups.identifier AS quote_group_identifier,\n    quote_groups.user_email\
      \ AS user_email,\n    quote_groups.user_full_name AS user_full_name,\n\n   \
      \ -- URL\n    CONCAT('https://', organizations.subdomain, '.scientist.com/quote_groups/',\
      \ quote_groups.uuid) AS request_url,\n\n    -- CASE WHEN fields\n    CASE WHEN\
      \ proposals.proposal_type = 'Amendment' THEN 1 ELSE 0 END AS has_amendment,\n\
      \    CASE WHEN quote_groups.multisourced = TRUE THEN 1 ELSE 0 END AS is_competitive,\n\
      \    CASE WHEN proposals.id IS NOT NULL AND proposals.state IS NULL THEN 1 ELSE\
      \ 0 END AS is_lost,\n    CASE WHEN proposals.id IS NOT NULL THEN 1 ELSE 0 END\
      \ AS is_opportunity,\n    CASE WHEN customer_purchase_orders.id IS NOT NULL\
      \ THEN 1 ELSE 0 END AS is_won,\n    CASE WHEN rate_card_milestones.purchase_order_id\
      \ IS NOT NULL THEN 1 ELSE 0 END AS is_rate_card,\n    CASE WHEN rate_card_milestones.purchase_order_id\
      \ IS NOT NULL THEN 'Rate Card' ELSE 'Non-Rate Card' END AS rate_card_status,\n\
      \    CASE WHEN quote_groups.multisourced = TRUE THEN 'Competitive' ELSE 'Non-Competitive'\
      \ END AS sourcing_type,\n    CASE\n        WHEN customer_purchase_orders.id\
      \ IS NOT NULL THEN COALESCE(customer_purchase_orders.retail_total_price_usd,\
      \ 0)\n        ELSE 0\n    END AS spend_amount_usd,\n    CASE\n        WHEN customer_purchase_orders.id\
      \ IS NOT NULL AND rate_card_milestones.purchase_order_id IS NOT NULL THEN COALESCE(customer_purchase_orders.retail_total_price_usd,\
      \ 0)\n        ELSE 0\n    END AS spend_on_rate_card_usd,\n    CASE\n       \
      \ WHEN customer_purchase_orders.id IS NOT NULL AND rate_card_milestones.purchase_order_id\
      \ IS NULL THEN COALESCE(customer_purchase_orders.retail_total_price_usd, 0)\n\
      \        ELSE 0\n    END AS spend_off_rate_card_usd,\n    CASE\n      WHEN proposals.backoffice_status\
      \ = 'Selected for Work'\n        OR customer_purchase_orders.id IS NOT NULL\
      \ -- a few proposals don't have backoffice_status but has po id\n        THEN\
      \ 'Won'\n      WHEN quote_groups.status IN ('Closed', 'Work Completed')\n  \
      \      AND proposals.backoffice_status != 'Selected for Work'\n        THEN\
      \ 'Lost'\n      WHEN proposals.state IN ('Awaiting PO', 'Awaiting SOW', 'SOW\
      \ Submitted')\n        AND quote_groups.status != 'Cancelled'\n        THEN\
      \ 'Pending'\n      ELSE 'Other'\n    END AS win_loss_status\n  FROM filtered_quoted_wares\
      \ AS quoted_wares\n  JOIN {{ ref('silver_quote_groups') }} AS quote_groups ON\
      \ quoted_wares.quote_group_id = quote_groups.id\n  JOIN {{ ref('silver_proposals')\
      \ }} AS proposals ON proposals.id = quoted_wares.proposal_id\n  JOIN {{ ref('silver_organizations')\
      \ }} AS organizations ON quote_groups.organization_id = organizations.id\n \
      \ JOIN {{ ref('silver_providers') }} AS providers ON quoted_wares.provider_id\
      \ = providers.id\n  LEFT JOIN {{ ref('silver_provider_purchase_orders') }} AS\
      \ provider_purchase_orders ON proposals.id = provider_purchase_orders.proposal_id\n\
      \  LEFT JOIN {{ ref('silver_customer_purchase_orders') }} AS customer_purchase_orders\
      \ ON provider_purchase_orders.customer_purchase_order_id = customer_purchase_orders.id\n\
      \  LEFT JOIN (\n    SELECT DISTINCT itemizable_id AS purchase_order_id\n   \
      \ FROM {{ ref('silver_milestones') }}\n    WHERE itemizable_type = 'Pg::PurchaseOrderBase'\n\
      \      AND preconfigured_milestone_id IS NOT NULL\n  ) AS rate_card_milestones\
      \ ON provider_purchase_orders.id = rate_card_milestones.purchase_order_id\n\
      \  LEFT JOIN {{ ref('bronze_ai_rating_summaries') }} AS ai_rating_summaries\
      \ ON providers.id = ai_rating_summaries.provider_id AND organizations.id = ai_rating_summaries.organization_id\n\
      \  LEFT JOIN provider_ratings AS ratings ON providers.id = ratings.provider_pg_id\n\
      \    AND (DATE_TRUNC('month', quote_groups.created_at) + INTERVAL '1 month -\
      \ 1 day') = ratings.rating_date -- join on the same months instead of exact\
      \ date\n  LEFT JOIN provider_ratings_by_organization AS ratings_by_org ON providers.id\
      \ = ratings_by_org.provider_pg_id\n    AND (DATE_TRUNC('month', quote_groups.created_at)\
      \ + INTERVAL '1 month - 1 day') = ratings_by_org.rating_date -- join on the\
      \ same months instead of exact date\n    AND ratings_by_org.organization_id\
      \ = quoted_wares.organization_id\n  LEFT JOIN missed_opportunities ON missed_opportunities.quote_group_id\
      \ = quote_groups.id\n)\n\nSELECT * FROM transformed_data\n"
  gold_purchase_order_itemizable_report:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/gold/gold_purchase_order_itemizable_report.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      organization_id\"]},\n    {\"columns\": [\"quote_group_id\"]},\n    {\"columns\"\
      : [\"provider_id\"]},\n    {\"columns\": [\"proposal_id\"]},\n    {\"columns\"\
      : [\"customer_purchase_order_id\"]}\n  ]\n  )\n}}\n\nWITH transformed_data AS\
      \ (\n    SELECT\n        gold_marketplace_report.organization_id,\n        gold_marketplace_report.organization_name,\n\
      \        gold_marketplace_report.quote_group_id,\n        gold_marketplace_report.discipline,\n\
      \        gold_marketplace_report.category,\n        gold_marketplace_report.subcategory,\n\
      \        gold_marketplace_report.quote_group_identifier,\n        gold_marketplace_report.quote_group_last_computed_status,\n\
      \        'https://' || organization_subdomain || '.scientist.com/quote_groups/'\
      \ || quote_group_uuid AS quote_group_url,\n        'https://' || organization_subdomain\
      \ || '.scientist.com/quote_groups/' || quote_group_uuid || '#proposal-' || proposal_uuid\
      \ AS proposal_storefront_url,\n        gold_marketplace_report.provider_id,\n\
      \        gold_marketplace_report.provider_name provider_name,\n        gold_marketplace_report.shipping_country\
      \ request_shipping_country,\n        gold_marketplace_report.shipping_site_name\
      \ request_shipping_site_name,\n        gold_marketplace_report.shipping_organization_name\
      \ request_shipping_organization_name,\n        gold_marketplace_report.user_email,\n\
      \        gold_marketplace_report.user_full_name,\n        gold_marketplace_report.quote_group_created_at,\n\
      \        EXTRACT(YEAR FROM gold_marketplace_report.quote_group_created_at) quote_group_year,\n\
      \        gold_marketplace_report.proposal_id,\n        gold_marketplace_report.proposal_identifier,\n\
      \        gold_marketplace_report.customer_purchase_order_id,\n        gold_marketplace_report.customer_purchase_order_po_number,\n\
      \        gold_marketplace_report.provider_purchase_order_id,\n        provider_shipping_address.provider_shipping_address,\n\
      \        provider_shipping_address.provider_shipping_country,\n        purchase_order_milestones.itemizable_id,\n\
      \        purchase_order_milestones.itemizable_type,\n        purchase_order_milestones.line_number,\n\
      \        purchase_order_milestones.quantity,\n        purchase_order_milestones.name,\n\
      \        purchase_order_milestones.state,\n        purchase_order_milestones.status,\n\
      \        purchase_order_milestones.type,\n        purchase_order_milestones.list_unit_price,\n\
      \        purchase_order_milestones.retail_unit_price ,\n        purchase_order_milestones.retail_subtotal_price,\n\
      \        purchase_order_milestones.sli_list_price,\n        purchase_order_milestones.sli_previous_rate_card_price,\n\
      \        purchase_order_milestones.sli_rate_card_price,\n        purchase_order_milestones.sli_scientist_price\n\
      \n        FROM {{ ref('gold_marketplace_report') }} gold_marketplace_report\n\
      \        LEFT JOIN (\n            SELECT itemizable_id,\n            itemizable_type,\n\
      \            line_number,\n            quantity,\n            name,\n      \
      \      state,\n            status,\n            type,\n            list_unit_price,\n\
      \            retail_unit_price ,\n            retail_subtotal_price,\n     \
      \       sli_list_price,\n            sli_previous_rate_card_price,\n       \
      \     sli_rate_card_price,\n            sli_scientist_price\n        FROM {{\
      \ ref('bronze_milestones') }} WHERE itemizable_type='Pg::PurchaseOrderBase'\n\
      \        ORDER BY itemizable_id, line_number ) purchase_order_milestones\n \
      \       ON purchase_order_milestones.itemizable_id=gold_marketplace_report.customer_purchase_order_id\n\
      \        LEFT JOIN {{ ref('silver_provider_purchase_order_shipping_address')\
      \ }} provider_shipping_address\n            ON provider_shipping_address.addressable_id\
      \ =  gold_marketplace_report.provider_purchase_order_id\n            AND provider_shipping_address.row_num\
      \ = 1\n        WHERE EXTRACT(YEAR FROM gold_marketplace_report.quote_group_created_at)\
      \ > 2022\n\n)\n\nSELECT * FROM transformed_data"
  gold_supplier_governance:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/gold/gold_supplier_governance.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      provider_id\"]},\n    {\"columns\": [\"organization_id\"]},\n    {\"columns\"\
      : [\"quote_group_id\"]},\n    {\"columns\": [\"category\"]},\n  ])\n}}\n\nSELECT\
      \ DISTINCT\n    quote_groups.identifier AS request_id,\n    EXTRACT(YEAR FROM\
      \ quote_groups.created_at) AS year_of_qw_created_at,\n    quote_groups.name\
      \ AS request_name,\n    quote_groups.last_computed_status AS qg_last_computed_status,\n\
      \    quote_groups.organization_name,\n    quote_groups.organization_id,\n  \
      \  quote_groups.id AS quote_group_id,\n    quoted_wares.provider_name,\n   \
      \ quoted_wares.provider_id,\n    quoted_wares.status AS qw_last_computed_status,\n\
      \    quote_groups.multisourced,\n    CASE\n        WHEN quoted_wares.sow_count\
      \ > 0 THEN 'Y'\n        ELSE 'N'\n    END AS sow_yn,\n    quote_groups.first_po_date\
      \ AS first_po_created_date,\n    COALESCE(pricing.sum_selected_proposal_retail_total_price,\
      \ 0) AS sum_selected_proposal_retail_total_price,\n    COALESCE(pricing.gmv_wholesale_usd,\
      \ 0) AS gmv_wholesale_usd,\n    CASE\n        WHEN quoted_wares.sow_count =\
      \ 0 THEN '1. Requests with no SOWs issued'\n        WHEN quoted_wares.sow_count\
      \ > 0\n             AND COALESCE(po_counts.po_count, 0) = 0 THEN '2. Requests\
      \ with SOWs issued but no POs'\n        WHEN COALESCE(po_counts.po_count, 0)\
      \ > 0\n             AND (COALESCE(purchase_orders.wholesale_total_price_usd,\
      \ 0) - COALESCE(purchase_orders.sum_invoice_wholesale_total_price_usd, 0)) >\
      \ 0 THEN '3. SOWs with POs not fully invoiced'\n        WHEN COALESCE(po_counts.po_count,\
      \ 0) > 0\n             AND (COALESCE(purchase_orders.wholesale_total_price_usd,\
      \ 0) - COALESCE(purchase_orders.sum_invoice_wholesale_total_price_usd, 0)) =\
      \ 0 THEN '4. SOWs completed and fully invoiced'\n        ELSE 'Other'\n    END\
      \ AS category,\n    \n    purchase_orders.ad_po_number,\n    COALESCE(purchase_orders.wholesale_total_price_usd,\
      \ 0) AS spend_usd,\n    COALESCE(purchase_orders.sum_invoice_wholesale_total_price_usd,\
      \ 0) AS invoice_usd,\n    (COALESCE(purchase_orders.wholesale_total_price_usd,\
      \ 0) - COALESCE(purchase_orders.sum_invoice_wholesale_total_price_usd, 0)) AS\
      \ balance,\n    \n    proposals.identifier AS sow_identifier,\n    proposals.backoffice_status\
      \ AS proposal_last_computed_status\n\nFROM {{ ref('silver_quote_groups') }}\
      \ AS quote_groups\nLEFT JOIN {{ ref('silver_quoted_wares') }} AS quoted_wares\n\
      \    ON quote_groups.id = quoted_wares.quote_group_id\nLEFT JOIN (\n    SELECT\n\
      \        quote_group_id,\n        provider_id,\n        SUM(retail_total_price_usd)\
      \ AS sum_selected_proposal_retail_total_price,\n        SUM(wholesale_total_price_usd)\
      \ AS gmv_wholesale_usd\n    FROM {{ ref('silver_proposals') }}\n    WHERE purchase_order_count\
      \ > 0\n    GROUP BY quote_group_id, provider_id\n) AS pricing\n    ON quoted_wares.quote_group_id\
      \ = pricing.quote_group_id\n    AND quoted_wares.provider_id = pricing.provider_id\n\
      LEFT JOIN {{ ref('silver_proposals') }} AS proposals\n    ON quoted_wares.id\
      \ = proposals.quoted_ware_id\nLEFT JOIN (\n    SELECT\n        quote_group_id,\n\
      \        proposal_id,\n        COUNT(DISTINCT id) AS po_count,\n        COUNT(DISTINCT\
      \ CASE WHEN last_computed_invoice_status = 'Fully Invoiced' THEN id END) AS\
      \ fully_invoiced_count\n    FROM {{ ref('silver_provider_purchase_orders') }}\n\
      \    GROUP BY quote_group_id, proposal_id\n) AS po_counts\n    ON quoted_wares.quote_group_id\
      \ = po_counts.quote_group_id\n    AND proposals.id = po_counts.proposal_id\n\
      LEFT JOIN {{ ref('silver_provider_purchase_orders') }} AS purchase_orders\n\
      \    ON proposals.id = purchase_orders.proposal_id"
  gold_revenue_recognition_model_inputs:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/gold/gold_revenue_recognition_model_inputs.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n        {\"columns\"\
      : [\"provider_purchase_order_id\"]}\n  ])\n}}\n\nWITH transformed_data AS (\n\
      SELECT\n    -- IDs/Numbers\n    customer_purchase_orders.id AS customer_purchase_order_id,\n\
      \    provider_purchase_orders.id AS provider_purchase_order_id,\n    customer_purchase_orders.ad_po_number\
      \ AS customer_purchase_order_ad_po_number, -- our internal po number\n\n   \
      \ -- Dates\n    quote_groups.created_at AS quote_group_created_at,\n    proposals.created_at\
      \ AS proposal_created_at,\n    proposals.submitted_at AS proposal_submitted_at,\n\
      \    customer_purchase_orders.po_created_at AS customer_purchase_order_po_created_at,\
      \ -- po_created_at is created by customer\n    customer_purchase_orders.first_invoice_created_at,\n\
      \    customer_purchase_orders.last_invoice_created_at,\n    customer_purchase_orders.fully_recognized_at\
      \ AS customer_purchase_order_fully_recognized_at, -- how does is show up in\
      \ rx?\n\n    -- Request/Quote Group Info\n    quote_groups.id AS quote_group_id,\n\
      \    quote_groups.uuid AS quote_group_uuid,\n    quote_groups.status AS quote_group_status,\n\
      \    quote_groups.user_id AS quote_group_user_id,\n    quote_groups.primary_discipline_name\
      \ AS discipline,\n    quote_groups.primary_category_name AS category,\n    quote_groups.primary_subcategory_name\
      \ AS subcategory,\n    quote_groups.multisourced AS quote_group_multisourced,\n\
      \n    -- Customer Info\n    customer_purchase_orders.uuid AS customer_purchase_order_uuid,\n\
      \    customer_purchase_orders.organization_id AS customer_organization_id,\n\
      \    customer_purchase_orders.organization_name AS customer_organization_name,\n\
      \    customer_purchase_orders.last_computed_invoice_status AS last_computed_invoice_status,\n\
      \    customer_purchase_orders.commission_rate AS customer_purchase_order_commission_rate,\n\
      \    customer_purchase_orders.customer_billing_country AS customer_billing_country,\n\
      \    customer_purchase_orders.customer_billing_state AS customer_billing_state,\n\
      \    customer_purchase_orders.customer_billing_city AS customer_billing_city,\n\
      \    customer_purchase_orders.customer_billing_zipcode AS customer_billing_zipcode,\n\
      \n    -- Provider Info\n    provider_purchase_orders.uuid AS provider_purhase_order_uuid,\n\
      \    provider_purchase_orders.provider_id AS provider_id,\n    provider_purchase_orders.provider_name\
      \ AS provider_name,\n    provider_purchase_orders.organization_id AS provider_organization_id,\n\
      \    provider_purchase_orders.organization_name AS provider_organization_name,\n\
      \    provider_purchase_orders.provider_billing_country AS provider_billing_country,\n\
      \    provider_purchase_orders.provider_billing_state AS provider_billing_state,\n\
      \    provider_purchase_orders.provider_billing_city AS provider_billing_city,\n\
      \    provider_purchase_orders.provider_billing_zipcode AS provider_billing_zipcode,\n\
      \    -- TODO: add line item count?\n\n    -- Proposal | Quoted Ware Info\n \
      \   proposals.id AS proposal_id,\n    proposals.identifier AS proposal_identifier,\n\
      \    proposals.proposal_type AS proposal_type,\n    quoted_wares.spending_category,\n\
      \n    -- Price Info\n    customer_purchase_orders.retail_total_price,\n    customer_purchase_orders.retail_total_price_usd,\n\
      \    customer_purchase_orders.retail_subtotal_price,\n    customer_purchase_orders.retail_subtotal_price_usd,\n\
      \n    -- Invoice Info (invoice aggregates are already joined to CPO)\n    customer_purchase_orders.invoice_count,\n\
      \    customer_purchase_orders.sum_invoice_retail_total_price,\n    customer_purchase_orders.sum_invoice_retail_total_price_usd,\n\
      \    customer_purchase_orders.remaining_for_invoice,\n    customer_purchase_orders.remaining_for_invoice_usd,\n\
      \    customer_purchase_orders.sum_invoice_retail_total_price / customer_purchase_orders.retail_total_price\
      \ AS retail_total_percentage_paid,\n    customer_purchase_orders.sum_invoice_retail_total_price_usd\
      \ / customer_purchase_orders.retail_total_price_usd AS retail_total_percentage_paid_usd,\n\
      \    customer_purchase_orders.sum_invoice_retail_subtotal_price / customer_purchase_orders.retail_subtotal_price\
      \ AS retail_subtotal_percentage_paid,\n    customer_purchase_orders.sum_invoice_retail_subtotal_price_usd\
      \ / customer_purchase_orders.retail_subtotal_price_usd AS retail_subtotal_percentage_paid_usd,\n\
      \n    -- Turnaround Time Info\n    turn_around_times.min AS min_turnaround_time_seconds,\
      \ -- this is measured by seconds\n    turn_around_times.max AS max_turnaround_time_seconds,\n\
      \    turn_around_times.min/3600 AS min_turnaround_time_hours,\n    turn_around_times.max/3600\
      \ AS max_turnaround_time_hours,\n    turn_around_times.max/3600 - turn_around_times.min/3600\
      \ AS max_minus_min_turnaround_time_hours,\n    -- turn_around_times.display_units\
      \ AS turnaround_display_units,\n\n    -- Shipping/Tax Info (already calculated\
      \ in CPO)\n    customer_purchase_orders.shipping_cost_usd,\n    customer_purchase_orders.retail_tax_usd,\n\
      \    proposals.tax_category,\n\n    -- Other\n    milestones.service_product_type,\n\
      \n    -- Calculated Columns\n    CASE WHEN customer_purchase_orders.fully_recognized_at\
      \ IS NULL THEN 'open' ELSE 'closed' END AS order_status,\n    (customer_purchase_orders.fully_recognized_at::date\
      \ - customer_purchase_orders.po_created_at::date) AS project_length -- NOTE:\
      \ po_submission_date (in Athena) = po_created_at\n\nFROM {{ ref('silver_provider_purchase_orders')\
      \ }} AS provider_purchase_orders\nJOIN {{ ref('silver_customer_purchase_orders')\
      \ }} AS customer_purchase_orders ON customer_purchase_orders.id = provider_purchase_orders.customer_purchase_order_id\n\
      LEFT JOIN {{ ref('silver_proposals') }} AS proposals ON proposals.id = provider_purchase_orders.proposal_id\
      \ -- PPOs can exist w/o Proposal\nLEFT JOIN {{ ref('silver_quoted_wares') }}\
      \ AS quoted_wares ON proposals.quoted_ware_id = quoted_wares.id\nLEFT JOIN {{\
      \ ref('silver_quote_groups') }} AS quote_groups ON quoted_wares.quote_group_id\
      \ = quote_groups.id\nLEFT JOIN {{ ref('bronze_turn_around_times') }} AS turn_around_times\
      \ ON turn_around_times.turnaroundable_id = provider_purchase_orders.id AND turn_around_times.turnaroundable_type='Pg::PurchaseOrderBase'\n\
      LEFT JOIN (\n    SELECT DISTINCT itemizable_id AS purchase_order_id, type AS\
      \ service_product_type\n    FROM {{ ref('silver_milestones') }}\n    WHERE itemizable_type\
      \ = 'Pg::PurchaseOrderBase'\n  ) AS milestones ON provider_purchase_orders.id\
      \ = milestones.purchase_order_id\n-- Exclusion filters\nWHERE quote_groups.organization_subdomain\
      \ NOT IN ('acme', 'biotechdemo')\nAND proposals.obsoleted = False\nAND quoted_wares.status\
      \ !='Cancelled'\nAND quoted_wares.spending_category != 'direct'\n)\n\nSELECT\
      \ * FROM transformed_data\n"
  gold_accrual_report:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/gold/gold_accrual_report.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n        {\"columns\"\
      : [\"customer_purchase_order_id\"]}\n  ])\n}}\n\nWITH transformed_data AS (\n\
      \    SELECT\n        -- IDs and References\n        customer_purchase_orders.id\
      \ AS customer_purchase_order_id,\n        customer_purchase_orders.ad_po_number\
      \ AS customer_purchase_order_ad_po_number,\n        provider_purchase_orders.project_code,\n\
      \        customer_purchase_orders.po_number AS customer_purchase_order_po_number,\n\
      \        quote_groups.organization_id,\n        -- Dates\n        customer_purchase_orders.fully_recognized_at,\n\
      \        customer_purchase_orders.latest_predicted_fully_invoiced_at,\n    \
      \    customer_purchase_orders.po_created_at,\n        quote_groups.created_at\
      \ AS quote_group_created_at,\n        -- User/Organization Info\n        users.full_name,\n\
      \        customer_purchase_orders.organization_name,\n        customer_purchase_orders.quote_group_user_email,\n\
      \        -- Report Metrics\n        customer_purchase_orders.retail_total_price\
      \ - customer_purchase_orders.sum_invoice_retail_total_price AS po_minus_invoiced,\n\
      \        customer_purchase_orders.retail_total_price_usd - customer_purchase_orders.sum_invoice_retail_total_price_usd\
      \ AS po_minus_invoiced_usd, -- GMV/Remaining PO Amount\n        customer_purchase_orders.retail_total_price\
      \ AS customer_purchase_order_retail_total_price,\n        customer_purchase_orders.retail_total_price_usd\
      \ AS customer_purchase_order_retail_total_price_usd, -- Purchase order total\n\
      \        customer_purchase_orders.sum_invoice_retail_total_price AS customer_purchase_order_sum_invoice_retail_total_price,\
      \ -- Invoice total\n        customer_purchase_orders.sum_invoice_retail_total_price_usd\
      \ AS customer_purchase_order_sum_invoice_retail_total_price_usd,\n        customer_purchase_orders.latest_predicted_fully_invoiced_amount\
      \ AS customer_purchase_order_latest_predicted_fully_invoiced_amount,\n     \
      \   customer_purchase_orders.latest_predicted_fully_invoiced_amount_usd AS customer_purchase_order_latest_predicted_fully_invoiced_amount_usd,\n\
      \        customer_purchase_orders.latest_predicted_fully_invoiced_amount - SUM(gross_revenue.recognized)\
      \ AS predicted_revenue,\n        customer_purchase_orders.latest_predicted_fully_invoiced_amount_usd\
      \ - SUM(gross_revenue.recognized_usd) AS predicted_revenue_usd, -- Future Estimated\
      \ Costs/Predicted Expense\n        SUM(gross_revenue.recognized) as sum_gross_revenue_recognized,\n\
      \        SUM(gross_revenue.recognized_usd) as sum_gross_revenue_recognized_usd,\n\
      \        SUM(gross_revenue.recognized) - customer_purchase_orders.sum_invoice_retail_total_price\
      \ AS recognized_minus_invoiced,\n        SUM(gross_revenue.recognized_usd) -\
      \ customer_purchase_orders.sum_invoice_retail_total_price_usd AS recognized_minus_invoiced_usd,\n\
      \        -- Filters\n        quote_groups.billing_site_name AS billing_site_name,\n\
      \        customer_purchase_orders.primary_category_name as category,\n     \
      \   customer_purchase_orders.cpo_price_threshold_usd AS cpo_price_threshold_usd,\n\
      \        customer_purchase_orders.completed AS completed,\n        quote_groups.filters[1]\
      \ AS quote_group_filter1,\n        quote_groups.filters[2] AS quote_group_filter2,\n\
      \        quote_groups.filters[3] AS quote_group_filter3,\n        quote_groups.filters[4]\
      \ AS quote_group_filter4,\n        quote_groups.filters[5] AS quote_group_filter5,\n\
      \        quote_groups.uuid AS quote_group_uuid,\n        quote_groups.inventory_item_purchase\
      \ AS inventory_item_purchase,\n        quoted_wares.spending_category AS quoted_ware_spending_category,\n\
      \        quote_groups.shipping_country AS shipping_country,\n        quote_groups.shipping_site_name\
      \ AS shipping_site_name,\n        quote_groups.primary_subcategory_name AS subcategory,\n\
      \        organizations.subdomain AS organization_subdomain,\n        users.email\
      \ AS user_email\n    FROM\n        {{ ref('silver_provider_purchase_orders')\
      \ }} AS provider_purchase_orders\n        LEFT JOIN {{ ref('silver_customer_purchase_orders')\
      \ }} AS customer_purchase_orders ON provider_purchase_orders.customer_purchase_order_id\
      \ = customer_purchase_orders.id\n        LEFT JOIN {{ ref('silver_quote_groups')\
      \ }} AS quote_groups ON quote_groups.id = provider_purchase_orders.quote_group_id\n\
      \        LEFT JOIN {{ ref('silver_organizations') }} AS organizations ON quote_groups.organization_id\
      \ = organizations.id\n        LEFT JOIN (SELECT id, full_name, email FROM {{\
      \ ref('bronze_users') }}) AS users ON users.id = customer_purchase_orders.quote_group_user_id\n\
      \        LEFT JOIN (SELECT id, spending_category FROM {{ ref('silver_quoted_wares')\
      \ }}) AS quoted_wares ON provider_purchase_orders.quoted_ware_id = quoted_wares.id\n\
      \        LEFT JOIN (SELECT purchase_order_id, recognized, recognized_usd FROM\
      \ {{ ref('bronze_recognized_gross_revenues_production') }}) AS gross_revenue\
      \ ON gross_revenue.purchase_order_id = customer_purchase_orders.id\n    WHERE\
      \ customer_purchase_orders.id IS NOT NULL\n        AND customer_purchase_orders.completed\
      \ IS NOT TRUE -- only show open POs\n    GROUP BY\n        customer_purchase_orders.ad_po_number,\n\
      \        customer_purchase_orders.cpo_price_threshold_usd,\n        customer_purchase_orders.completed,\n\
      \        customer_purchase_orders.fully_recognized_at,\n        customer_purchase_orders.id,\n\
      \        customer_purchase_orders.latest_predicted_fully_invoiced_amount,\n\
      \        customer_purchase_orders.latest_predicted_fully_invoiced_amount_usd,\n\
      \        customer_purchase_orders.latest_predicted_fully_invoiced_at,\n    \
      \    customer_purchase_orders.organization_id,\n        customer_purchase_orders.organization_name,\n\
      \        customer_purchase_orders.po_created_at,\n        customer_purchase_orders.po_number,\n\
      \        customer_purchase_orders.primary_category_name,\n        customer_purchase_orders.quote_group_user_email,\n\
      \        customer_purchase_orders.retail_total_price,\n        customer_purchase_orders.retail_total_price_usd,\n\
      \        customer_purchase_orders.sum_invoice_retail_total_price,\n        customer_purchase_orders.sum_invoice_retail_total_price_usd,\n\
      \        organizations.subdomain,\n        provider_purchase_orders.project_code,\n\
      \        quote_groups.billing_site_name,\n        quote_groups.created_at,\n\
      \        quote_groups.filters[1],\n        quote_groups.filters[2],\n      \
      \  quote_groups.filters[3],\n        quote_groups.filters[4],\n        quote_groups.filters[5],\n\
      \        quote_groups.inventory_item_purchase,\n        quote_groups.organization_id,\n\
      \        quote_groups.primary_subcategory_name,\n        quote_groups.shipping_country,\n\
      \        quote_groups.shipping_site_name,\n        quote_groups.uuid,\n    \
      \    quoted_wares.spending_category,\n        users.email,\n        users.full_name\n\
      )\n\nSELECT * FROM transformed_data\n"
  gold_negotiation_report:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/gold/gold_negotiation_report.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      proposal_id\"]}\n  ])\n}}\n\n-- Negotiated Savings: savings are realized when\
      \ proposal becomes purchase order\nWITH negotiated_savings AS (\n SELECT\n \
      \   proposals.id AS proposal_id,\n    provider_purchase_orders.id AS provider_purchase_order_id,\n\
      \    customer_purchase_orders.retail_total_price_usd AS retail_total_price_usd,\n\
      \    -- Check if negotiation was attempted\n    CASE\n      WHEN proposals.negotiate_note\
      \ = TRUE\n        OR provider_purchase_orders.negotiated_savings_override_usd\
      \ IS NOT NULL -- some negotiations (through messaging) can happen w/o hitting\
      \ the negotiate button\n      THEN 1\n      ELSE 0\n    END AS negotiation_attempted,\n\
      \    -- Get negotiated savings amount (override first, then computed, then 0)\n\
      \    COALESCE(\n      provider_purchase_orders.negotiated_savings_override_usd,\n\
      \      provider_purchase_orders.negotiated_savings_computed_usd,\n      0\n\
      \    ) AS negotiated_savings_usd\n  FROM {{ ref('silver_provider_purchase_orders')\
      \ }} AS provider_purchase_orders\n  JOIN {{ ref('silver_proposals') }} AS proposals\
      \ ON provider_purchase_orders.proposal_id = proposals.id\n  LEFT JOIN {{ ref('silver_customer_purchase_orders')\
      \ }} AS customer_purchase_orders ON provider_purchase_orders.customer_purchase_order_id\
      \ = customer_purchase_orders.id\n),\n\ntransformed_data AS (\n SELECT\n  --\
      \ IDs/Numbers\n  quote_groups.id AS quote_group_id,\n  proposals.id AS proposal_id,\n\
      \n  -- Proposal Information\n  proposals.negotiate_note AS negotiate_note,\n\
      \  proposals.created_at AS proposal_created_at,\n  proposals.proposal_type AS\
      \ proposal_type,\n  proposals.negotiation_delegated AS negotiation_delegated,\n\
      \n  -- Provider Information\n  providers.name AS provider_name,\n  providers.id\
      \ AS provider_id,\n\n  -- Negotiated Savings Metrics\n  savings.provider_purchase_order_id\
      \ AS provider_purchase_order_id,\n  savings.retail_total_price_usd AS retail_total_price_usd,\n\
      \  savings.negotiation_attempted AS negotiation_attempted,\n  savings.negotiated_savings_usd\
      \ AS negotiated_savings_usd,\n  savings.negotiated_savings_usd / NULLIF(savings.retail_total_price_usd,\
      \ 0) AS negotiated_savings_as_percent_of_total_spend,\n\n  -- Organization Information\n\
      \  organizations.id AS organization_id,\n  organizations.name AS organization_name,\n\
      \  organizations.subdomain AS organization_subdomain,\n\n  -- Quote Group Information\n\
      \  quote_groups.uuid AS quote_group_uuid,\n  quote_groups.identifier AS quote_group_identifier,\n\
      \  quote_groups.name AS quote_group_name,\n  quote_groups.billing_site_name\
      \ AS billing_site_name,\n  quote_groups.primary_category_name AS category,\n\
      \  quote_groups.primary_subcategory_name AS subcategory,\n  quote_groups.shipping_country\
      \ AS shipping_country,\n  quote_groups.shipping_site_name AS shipping_site_name,\n\
      \  quote_groups.inventory_item_purchase AS inventory_item_purchase,\n  quote_groups.filters[1]\
      \ AS quote_group_filter1,\n  quote_groups.filters[2] AS quote_group_filter2,\n\
      \  quote_groups.filters[3] AS quote_group_filter3,\n  quote_groups.filters[4]\
      \ AS quote_group_filter4,\n  quote_groups.filters[5] AS quote_group_filter5,\n\
      \n  -- Quoted Ware Information\n  quoted_wares.id AS quoted_ware_id,\n  quoted_wares.spending_category\
      \ AS spending_category,\n\n  -- User Information\n  users.email AS user_email,\n\
      \  users.full_name,\n\n  -- URLs\n  CONCAT('https://', organizations.subdomain,\
      \ '.scientist.com/quote_groups/', quote_groups.uuid) AS request_url\n  FROM\
      \ {{ ref('silver_proposals') }} AS proposals\n  JOIN {{ ref('silver_quoted_wares')\
      \ }} AS quoted_wares ON proposals.quoted_ware_id = quoted_wares.id\n  JOIN {{\
      \ ref('silver_quote_groups') }} AS quote_groups ON quoted_wares.quote_group_id\
      \ = quote_groups.id\n  LEFT JOIN negotiated_savings AS savings ON savings.proposal_id\
      \ = proposals.id\n  LEFT JOIN {{ ref('silver_providers') }} AS providers ON\
      \ proposals.provider_id = providers.id\n  LEFT JOIN (SELECT id, name, subdomain\
      \ FROM {{ ref('silver_organizations') }}) AS organizations ON quote_groups.organization_id\
      \ = organizations.id\n  LEFT JOIN (SELECT id, full_name, email FROM {{ ref('bronze_users')\
      \ }}) AS users ON users.id = proposals.quote_group_user_id\n  LEFT JOIN (SELECT\
      \ proposal_id, negotiated_savings_override_usd FROM {{ ref('silver_provider_purchase_orders')\
      \ }}) AS provider_purchase_orders ON provider_purchase_orders.proposal_id =\
      \ proposals.id\nWHERE proposals.negotiate_note = TRUE\nOR provider_purchase_orders.negotiated_savings_override_usd\
      \ IS NOT NULL -- include negotiations happened w/o hitting the negotiate button\
      \ (through messaging)\n)\n\nSELECT * FROM transformed_data\n"
  gold_consolidated_savings_calculated:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/gold/gold_consolidated_savings_calculated.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      proposal_id\"]},\n    {\"columns\": [\"quote_group_id\"]},\n    {\"columns\"\
      : [\"organization_id\"]},\n    {\"columns\": [\"user_email\"]},\n    {\"columns\"\
