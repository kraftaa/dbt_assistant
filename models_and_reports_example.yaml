      \ AS quote_group_id,\n    quote_groups.last_computed_status AS quote_group_last_computed_status,\n\
      \    CASE\n      WHEN quote_groups.last_computed_status in ('Work In Progress')\
      \ THEN 'Work in Progress'\n      WHEN quote_groups.last_computed_status in ('Work\
      \ Completed', 'Closed', 'Cancelled', 'Declined') THEN 'Closed/Completed'\n \
      \     ELSE 'Active'\n    END AS quote_group_last_computed_status_aggregated,\n\
      \    providers.name AS provider_name,\n    providers.contact_emails AS provider_contact_emails,\n\
      \    providers.sales_email AS provider_sales_email,\n    providers.phone_number\
      \ AS provider_phone_number,\n    quote_groups.primary_discipline_name AS discipline,\n\
      \    quote_groups.primary_category_name AS category,\n    quote_groups.primary_subcategory_name\
      \ AS subcategory,\n    customer_purchase_orders.uuid AS customer_purchase_order_uuid,\n\
      \    proposals.state AS proposal_state,\n    proposals.obsoleted AS proposal_obsoleted,\n\
      \    proposals.identifier AS proposal_identifier,\n    proposals.uuid AS proposal_uuid,\n\
      \    proposals.id AS proposal_id,\n    proposals.proposal_type AS proposal_type,\n\
      \    proposals.created_at AS proposal_created_at,\n    proposals.is_first_sow\
