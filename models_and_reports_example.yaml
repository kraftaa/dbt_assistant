      \    , purchase_justification_comment\n      , selected_customer_legal_entity\n\
      \      , selected_provider_legal_entity\n      , obsoleted_at\n      from {{\
      \ source('public', 'purchase_orders') }} where type = 'Pg::CustomerPurchaseOrder'\
      \ and quote_group_pg_id is not null\n      and po_number is not null and po_created_at\
      \ is not null ) cpo\nleft join (select exchangable_id, exchangable_type, currency,\
