      \ AS (\n       SELECT\n         \"min\"(\"provider_pg_id\") \"provider_pg_id\"\
      \n       , \"avg\"(\"value\") \"avg_rating\"\n       , \"count\"(\"id\") \"\
      rating_count\"\n       FROM\n         {{ source('public', 'ratings') }}\n  \
      \     WHERE (\"spam\" <> 'true')\n       GROUP BY \"provider_pg_id\"\n    )\n\
