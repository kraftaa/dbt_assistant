  silver_gross_revenues_daily:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_gross_revenues_daily.sql
    sql: "{{ config(\n  materialized=\"view\",\n)\n}}\n\nSELECT\n  run_at::date AS\
      \ date,\n  purchase_order_id,\n  SUM(recognized_usd) AS gross_recognized_usd,\n\
      \  SUM(reserve_usd) AS gross_reserve_usd,\n  SUM(revenue_usd) AS gross_revenue_usd\n\
      FROM {{ ref('bronze_recognized_gross_revenues_production') }} AS gross_revenues\n\
      GROUP BY run_at::date, purchase_order_id"
  silver_user_refs:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_user_refs.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      ref_id\"]},\n    {\"columns\": [\"user_id\"]}\n  ])\n}}\n\nWITH transformed_data\
      \ AS (\n  SELECT\n    refs.id AS ref_id,\n    refs.reference_of_id AS user_id,\n\
      \    COALESCE(users.email, refs.fields ->> 'email') AS user_email,\n    COALESCE(users.first_name,\
      \ refs.fields ->> 'first_name') AS user_first_name,\n    COALESCE(users.last_name,\
      \ refs.fields ->> 'last_name') AS user_last_name,\n    refs.fields ->> 'organization_name'\
      \ AS user_organization_name,\n    COALESCE(users.company, refs.fields ->> 'company')\
      \ AS user_company,\n    COALESCE(users.site, refs.fields ->> 'site') AS user_site\n\
      \  FROM {{ ref('bronze_refs') }} AS refs\n  JOIN {{ ref('bronze_users') }} AS\
      \ users\n    ON refs.reference_of_id = users.id\n    AND refs.reference_of_type\
      \ = 'Pg::User'\n)\nSELECT * FROM transformed_data\n"
  silver_default_values_inherited:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_default_values_inherited.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      organization_id\"]}\n  ])\n}}\n\n{% set fields_defaults = {\n    \"acceptable_product_currencies\"\
      : \"'{}'::varchar[]\",\n    \"accounting_contact\": \"''\",\n    \"benchmate_chatbot_id\"\
      : \"''\",\n    \"commission_fee_caps\": \"'{}'::jsonb\",\n    \"theoretical_rsa_customer_transaction_rate\"\
      : \"0.0\",\n    \"theoretical_consulting_customer_transaction_rate\": \"0.0\"\
      ,\n    \"customer_payment_terms\": \"-1\",\n    \"featured_categories\": \"\
      '{}'::varchar[]\",\n    \"filter1_title\": \"''\",\n    \"filter2_title\": \"\
      ''\",\n    \"filter3_title\": \"''\",\n    \"hbs_approver_emails\": \"'{}'::varchar[]\"\
      ,\n    \"theoretical_hbs_customer_transaction_rate\": \"0.0\",\n    \"homepage_search_content\"\
      : \"''\",\n    \"intro_video\": \"''\",\n    \"inventory_exchange_rate_padding\"\
      : \"0.0\",\n    \"invoice_contact\": \"''\",\n    \"legal_document_slug\": \"\
      ''\",\n    \"login_instructions\": \"''\",\n    \"proposal_compliance_certify_message_error\"\
      : \"''\",\n    \"proposal_compliance_certify_message_markdown\": \"''\",\n \
      \   \"proposal_compliance_form_slug\": \"''\",\n    \"proposal_next_steps\"\
      : \"''\",\n    \"provider_invoice_decimal_quantity_limit\": \"0.0\",\n    \"\
      purchase_instructions_html\": \"''\",\n    \"purchase_instructions_pdf\": \"\
      ''\",\n    \"purchase_order_contact\": \"''\",\n    \"registration_instructions\"\
      : \"''\",\n    \"registration_notice\": \"''\",\n    \"request_compliance_certify_message_error\"\
      : \"''\",\n    \"request_compliance_certify_message_markdown\": \"''\",\n  \
      \  \"request_compliance_form_slug\": \"''\",\n    \"request_compliance_multiple_form_options\"\
      : \"'{}'::varchar[]\",\n    \"request_compliance_multiple_form_text\": \"''\"\
      ,\n    \"session_timeout\": \"0.0\",\n    \"sso_url\": \"''\",\n    \"suggested_providers\"\
      : \"'{}'::varchar[]\",\n    \"suggested_wares\": \"'{}'::varchar[]\",\n    \"\
      supplier_agreements\": \"'{}'::varchar[]\",\n    \"supplier_part_id_prefix\"\
      : \"''\",\n    \"supplier_rating_emails\": \"'{}'::varchar[]\",\n    \"supplier_selection_notice\"\
      : \"''\",\n    \"third_party_buying_inventory_markup\": \"0.0\",\n    \"title\"\
      : \"''\",\n    \"theoretical_vea_customer_transaction_rate\": \"0.0\",\n   \
      \ \"vendor_payment_terms\": \"-1\"\n  }\n%}\nWITH ancestor_defaults AS (\n \
      \   SELECT\n        organizations.id as organization_id,\n        default_values.depth,\n\
      \        {% for value_name, default_value in fields_defaults.items() %}\n  \
      \      CASE\n            WHEN default_values.{{ value_name }}_use_default =\
      \ false\n            THEN default_values.{{ value_name }}\n            ELSE\
      \ NULL\n        END as {{ value_name }},\n        {% endfor %}\n        ROW_NUMBER()\
      \ OVER (\n            PARTITION BY organizations.id\n            ORDER BY default_values.depth\
      \ DESC\n        ) as ancestor_rank\n    FROM {{ ref('bronze_organizations')\
      \ }} AS organizations\n    JOIN {{ ref('silver_default_values') }} AS default_values\n\
      \        ON default_values.lft <= organizations.lft\n        AND default_values.rgt\
      \ >= organizations.rgt\n),\n\nresolved_defaults AS (\n    SELECT\n        organization_id,\n\
      \        {% for value_name, default_value in fields_defaults.items() %}\n  \
      \      COALESCE(\n            FIRST_VALUE({{ value_name }}) OVER (\n       \
      \         PARTITION BY organization_id\n                ORDER BY ancestor_rank\n\
      \                ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING\n\
      \            ),\n            {{ default_value }}\n        ) as {{ value_name\
      \ }}{% if not loop.last %},{% endif %}\n        {% endfor %}\n    FROM ancestor_defaults\n\
      )\n\nSELECT\n    rd.organization_id,\n    {% for value_name, default_value in\
      \ fields_defaults.items() %}\n    rd.{{ value_name }}{% if not loop.last %},{%\
      \ endif %}\n    {% endfor %},\n    organizations.created_at,\n    organizations.updated_at\n\
      FROM resolved_defaults rd\nJOIN {{ ref('bronze_organizations') }} AS organizations\n\
      \    ON organizations.id = rd.organization_id\n"
