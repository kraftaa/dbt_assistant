      \ AS customer_purchase_order_retail_subtotal_price_usd,\n    provider_purchase_orders.wholesale_subtotal_price_usd\
      \ AS customer_purchase_order_wholesale_subtotal_price_usd,\n    (customer_purchase_orders.retail_subtotal_price_usd\
      \ - provider_purchase_orders.wholesale_subtotal_price_usd) AS net_gmv,\n   \
      \ customer_purchase_orders.retail_tax_usd AS customer_purchase_order_retail_tax_usd,\n\
      \    customer_purchase_orders.fully_recognized_at AS customer_purchase_order_fully_recognized_at,\n\
      \    customer_purchase_orders.retail_subtotal_price AS customer_purchase_order_retail_subtotal_price,\n\
      \    customer_purchase_orders.retail_tax AS customer_purchase_order_retail_tax,\n\
      \    customer_purchase_orders.conversion_rate AS customer_purchase_order_conversion_rate,\n\
      \    customer_purchase_orders.invoice_count AS customer_purchase_order_invoice_count,\n\
      \    customer_purchase_orders.first_invoice_created_at AS customer_purchase_order_first_invoice_created_at,\n\
