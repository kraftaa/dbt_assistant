    sql: "{{ config(\n  materialized=\"materialized_view\",\n    indexes=[\n     \
      \ {'columns': ['qg_id' ], 'unique': False},\n      {'columns': ['ware_id' ],\
      \ 'unique': False},\n    ]\n\n)\n}}\n\nwith transformed_data as (\nSELECT\n\
      \  rf.*\n, qg.ware_id\n, (CASE WHEN (((category_beacon_id IN (662, 952, 1050,\
      \ 1307)) OR (discipline_beacon_id IN (662, 952, 1050, 1307))) OR (qg_subcategory_beacon_id\
      \ IN (662, 952, 1050, 1307))) THEN true ELSE false END) excluded_slug\n, COALESCE(qg_subcategory_beacon_id,\
      \ multiple_subs_id) subcategory_beacon_id\n, (CASE WHEN ((qg_subcategory_name\
      \ IS NULL) OR (qg_subcategory_name = 'Custom')) THEN multiple_beacon_name ELSE\
      \ qg_subcategory_name END) subcategory_name\n, multiple.multiple_subcategories\n\
      \n, (CASE WHEN (not (qg_subcategory_beacon_id = any((array_agg(multiple.multiple_subs_ids)\
      \ filter (where multiple.multiple_subs_ids <> '{}')))))\nTHEN array_agg(array_append(multiple.multiple_subs_ids,\
      \ qg_subcategory_beacon_id))\nELSE array_agg(multiple.multiple_subs_ids) filter\
      \ (where multiple.multiple_subs_ids <> '{}') END) multiple_subs_ids\n\n, multiple.multiple_subs_id\n\
