      \        'form' AS type\n    FROM\n         {{ ref('silver_dynamic_form_attachments_quote_group_form')\
      \ }}  dynamic_form_attachments_request_form\n    JOIN embedded_dynamic_forms\n\
      \    ON embedded_dynamic_forms.dynamic_form_attachment_id=dynamic_form_attachments_request_form.id\n\
      \    AND embedded_dynamic_forms.cleaned_key=dynamic_form_attachments_request_form.cleaned_key\n\
      \    WHERE\n        dynamic_form_attachments_request_form.dynamic_formable_id\
      \ IS NOT NULL\n        AND dynamic_form_attachments_request_form.final_value\
      \ IS NOT NULL\n),\n\ntransformed_data_form AS (\n    SELECT\n        gold_marketplace_report.quote_group_id\
      \ AS quote_group_id,\n        gold_marketplace_report.quote_group_uuid AS quote_group_uuid,\n\
      \        gold_marketplace_report.quote_group_identifier AS quote_group_identifier,\n\
      \        gold_marketplace_report.quote_group_ware_name AS ware_name,\n     \
