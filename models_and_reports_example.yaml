      FROM {{ ref('silver_invoices') }}\nWHERE cancelled = false\nGROUP BY purchase_order_id\n"
  silver_embedded_dynamic_forms:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_embedded_dynamic_forms.sql
    sql: "{{ config(\n    materialized='incremental',\n    unique_key=['id', 'key'],\n\
      \    indexes=[\n        {\"columns\": [\"id\"]},\n        {\"columns\": [\"\
      parent_dynamic_form_id\"]},\n        {\"columns\": [\"dynamic_form_attachment_id\"\
      ]},\n        {\"columns\": [\"updated_at\"]},\n        {\"columns\": [\"slug\"\
      ]},\n        {\"columns\": [\"key\"]}\n      ])\n}}\n\nWITH transformed_data\
      \ AS (\n    WITH RECURSIVE\n    -- load  2025\n    -- loading edf once with\
      \ both options and schema\n    form_data AS (\n        SELECT\n            id,\n\
      \            dynamic_form_attachment_id,\n            parent_dynamic_form_id,\n\
      \            slug,\n            schema,\n            options,\n            created_at,\n\
      \            updated_at\n        FROM {{ ref('bronze_embedded_dynamic_forms')\
      \ }}\n        WHERE 1=1\n        {% if is_incremental() %}\n          AND updated_at\
      \ > COALESCE((SELECT max(updated_at) FROM {{ this }}), '1900-01-01'::timestamp)\n\
      \        {% endif %}\n    ),\n\n    -- json tree extractions for both options\
      \ and schema\n    all_json AS (\n    -- extract from schema\n        SELECT\n\
      \            id,\n            dynamic_form_attachment_id,\n            parent_dynamic_form_id,\n\
      \            slug,\n            created_at,\n            updated_at,\n     \
      \       'root' AS path,\n            key,\n            value,\n            'schema'\
      \ AS source\n        FROM form_data, jsonb_each(schema::jsonb)\n\n        UNION\
      \ ALL\n    -- extract from options\n        SELECT\n            id,\n      \
      \      dynamic_form_attachment_id,\n            parent_dynamic_form_id,\n  \
      \          slug,\n            created_at,\n            updated_at,\n       \
      \     'root' AS path,\n            key,\n            value,\n            'options'\
      \ AS source\n        FROM form_data, jsonb_each(options::jsonb)\n    ),\n\n\
      \    json_tree AS (\n       -- add recursion depth limit for safety\n      \
      \ SELECT *, 1 AS depth FROM all_json\n\n        UNION ALL\n        -- recursive\
      \ case: nested objects/keys\n        SELECT\n            tree_data.id,\n   \
      \         tree_data.dynamic_form_attachment_id,\n            tree_data.parent_dynamic_form_id,\n\
      \            tree_data.slug,\n            tree_data.created_at,\n          \
      \  tree_data.updated_at,\n            tree_data.path || '->' || tree_data.key\
      \ AS path,\n            key_value_pairs.key,\n            key_value_pairs.value,\n\
      \            tree_data.source,\n            tree_data.depth + 1 AS depth\n \
      \       FROM json_tree tree_data, jsonb_each(tree_data.value) AS key_value_pairs\n\
      \        WHERE jsonb_typeof(tree_data.value) = 'object'\n        AND tree_data.depth\
      \ < 5  -- limit recursion depth\n    ),\n\n    cleaned_keys AS (\n        SELECT\n\
      \            *,\n            regexp_replace(\n                regexp_replace(\n\
      \                    regexp_replace(\n                        regexp_replace(\n\
      \                            regexp_replace(path || '->' || key, 'root->', '',\
      \ 'g'),\n                            'properties->', '', 'g'),\n           \
      \             'fields->', '', 'g'),\n                    '->rightLabel', '',\
      \ 'g'),\n                '->\"?type\"?', '', 'g'\n            ) AS cleaned_path,\
      \            -- removes common prefixes from schema and options\n\n        \
      \    replace(\n              regexp_replace(\n                regexp_replace(path\
      \ || '->' || key,\n                    '^(root|properties|fields)->', ''),\n\
      \                '(^|->)(properties|fields|items)(->)?', '', 'g'\n         \
      \     ),\n              '->',\n              '_'\n            ) AS fallback_key\n\
      \          FROM json_tree\n    )\n\n    -- cleaned output\n    SELECT * FROM\
      \ (\n    SELECT\n        id,\n        dynamic_form_attachment_id,\n        parent_dynamic_form_id,\n\
      \        slug,\n        created_at,\n        updated_at,\n        cleaned_path\
      \ AS key,\n--      COALESCE(value->>'title', value->>'rightLabel') AS full_title,\n\
      \        COALESCE\n        (\n            NULLIF(value->>'title', ''),\n   \
      \         NULLIF(value->>'rightLabel', ''),\n--            regexp_replace(path\
      \ || '->' || key, '^.*->', '')  -- fallback: extract last key segment\n    \
      \        fallback_key  -- combine for those whose title is ''\n        ) AS\
      \ full_title,\n        value->>'title' AS title,\n        value->>'rightLabel'\
      \ AS rightLabel,\n        ROW_NUMBER() OVER (\n              PARTITION BY id,\
      \ cleaned_path  -- same id + key\n              ORDER BY CASE WHEN source =\
      \ 'schema' THEN 1 ELSE 2 END  -- prioritize schema\n        ) AS row_num\n \
      \   FROM cleaned_keys\n    WHERE value->>'title' IS NOT NULL OR value->>'rightLabel'\
      \ IS NOT NULL  -- contains either title or rightLabel\n--    need to add also\
      \ OR value->>'placeholder' IS NOT NULL\n    ) deduped_cleaned_keys\n    WHERE\
      \ row_num = 1\n    ORDER BY id, key\n)\nSELECT * FROM transformed_data"
  silver_certifications:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_certifications.sql
    sql: "{{ config(\n  materialized=\"view\")\n}}\n\nWITH transformed_data AS (\n\
      \  SELECT\n    *,\n    CASE WHEN region = 0 THEN 'global'\n           WHEN region\
      \ = 1 THEN 'au'\n           WHEN region = 2 THEN 'br'\n           WHEN region\
      \ = 3 THEN 'ca'\n           WHEN region = 4 THEN 'eu_be'\n           WHEN region\
      \ = 5 THEN 'eu_fi'\n           WHEN region = 6 THEN 'eu_fr'\n           WHEN\
      \ region = 7 THEN 'eu_hu'\n           WHEN region = 8 THEN 'in'\n          \
      \ WHEN region = 9 THEN 'jp'\n           WHEN region = 10 THEN 'ko'\n       \
      \    WHEN region = 11 THEN 'sa'\n           WHEN region = 12 THEN 'uk'\n   \
      \        WHEN region = 13 THEN 'us'\n           WHEN region = 14 THEN 'eu' END\
      \ cert_region,\n    'Sustainability' = ANY(categories) is_sustainable,\n   \
      \ 'diversity' = ANY(categories) is_diverse,\n    'COMPLi Related' = ANY(categories)\
      \ is_compli_related,\n    'popular' = ANY(categories) is_popular,\n    'ISO'\
      \ = ANY(categories) is_iso\n  FROM {{ ref('bronze_certifications') }}\n)\n\n\
      SELECT * FROM transformed_data\n"
  silver_dynamic_form_attachments_form_page:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_dynamic_form_attachments_form_page.sql
    sql: "{{ config(\n  materialized = 'table',\n  indexes = [\n    {'columns': ['id']},\n\
      \    {'columns': ['dynamic_formable_id']},\n    {'columns': ['dynamic_formable_type']}\n\
      \  ]\n) }}\n\nWITH transformed_data AS (\n\n  WITH recursive json_tree AS (\n\
      \n    SELECT\n      dynamic_form_attachments.id,\n      dynamic_form_attachments.dynamic_formable_id,\n\
      \      dynamic_form_attachments.dynamic_formable_type,\n      dynamic_form_attachments.created_at,\n\
      \      dynamic_form_attachments.updated_at,\n      kv.key AS path_key,\n   \
      \   kv.value AS path_value,\n      kv.key AS full_key,\n      0 AS level\n \
      \   FROM {{ ref('bronze_dynamic_form_attachments') }} dynamic_form_attachments,\n\
      \         jsonb_each(dynamic_form_attachments.data::jsonb) kv\n    WHERE dynamic_form_attachments.dynamic_formable_type\
      \ = 'Pg::FormPage'\n\n    UNION ALL\n\n    -- Recursive: dive deeper into nested\
      \ objects\n    SELECT\n      jt.id,\n      jt.dynamic_formable_id,\n      jt.dynamic_formable_type,\n\
      \      jt.created_at,\n      jt.updated_at,\n      kv.key,\n      kv.value,\n\
      \      concat(jt.full_key, '->', kv.key) AS full_key,\n      jt.level + 1\n\
      \    FROM json_tree jt,\n         jsonb_each(jt.path_value) kv\n    WHERE jsonb_typeof(jt.path_value)\
      \ = 'object'\n\n  )\n\n  SELECT DISTINCT\n    id,\n    dynamic_formable_id,\n\
      \    dynamic_formable_type,\n    created_at,\n    updated_at,\n    full_key,\n\
      \    REPLACE(full_key,' ','') AS cleaned_key,\n    path_value AS final_value\n\
      \  FROM json_tree\n  WHERE jsonb_typeof(path_value) != 'object'\n  ORDER BY\
      \ id, full_key\n\n)\n\nSELECT * FROM transformed_data\n"
  silver_provider_provider_invoice_shipping_address:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_provider_provider_invoice_shipping_address.sql
    sql: "{{ config(\n  materialized=\"view\",\n  )\n}}\n\nWITH provider_shipping_address\
      \ AS (\n    SELECT\n        id,\n        TRIM(\n          COALESCE(organization_name,\
      \ '') || ' ' ||\n          COALESCE(street, '') || ' ' ||\n          COALESCE(city,\
      \ '') || ' ' ||\n          COALESCE(state, '') || ' ' ||\n          COALESCE(zipcode,\
      \ '') || ' ' ||\n          COALESCE(country, '')\n        ) AS provider_shipping_address,\n\
      \        country AS provider_shipping_country,\n        state AS provider_shipping_state,\n\
      \        addressable_id,\n        addressable_type,\n        ROW_NUMBER() OVER\
      \ (\n              PARTITION BY addressable_id\n              ORDER BY created_at\
      \ DESC\n              ) AS row_num\n    FROM {{ ref('bronze_addresses') }}\n\
      \    WHERE type = 'Pg::ProviderShippingAddress' AND addressable_type = 'Pg::ProviderBillingDocument'\n\
      )\n\nSELECT * FROM provider_shipping_address"
  silver_rfi_submitted:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_rfi_submitted.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      id\"]},\n    {\"columns\": [\"type\"]},\n    {\"columns\": [\"slug\"]}\n  ])\n\
      }}\n\nWITH transformed_data AS (\n    SELECT\n        multipage_forms.id\n \
      \     , multipage_forms.name\n      , multipage_forms.type\n      , multipage_forms.slug\n\
      \      , multipage_forms.submitted_at\n      , concat(users_created.user_first_name,\
      \ ' ', users_created.user_last_name) created_by_user\n      , concat(users_submitted.user_first_name,\
      \ ' ', users_submitted.user_last_name) submitted_by_user\n      , users_submitted.user_email\
      \ submitted_by_email\n      , CASE\n          WHEN multipage_forms.deleted_at\
      \ IS NOT NULL THEN 'Deleted'\n          WHEN multipage_forms.obsoleted_at IS\
      \ NOT NULL THEN 'Obsoleted'\n          WHEN multipage_forms.expired_at IS NOT\
      \ NULL AND multipage_forms.expired_at < localtimestamp  THEN 'Expired'\n   \
      \       WHEN multipage_forms.evaluated_at IS NOT NULL AND multipage_forms.evaluation_result\
      \ = 'positively evaluated' THEN 'Scientist.com Positively Evaluated'\n     \
      \     WHEN multipage_forms.evaluated_at IS NOT NULL AND multipage_forms.evaluation_result\
      \ = 'evaluated' THEN 'Scientist.com Evaluated'\n          WHEN multipage_forms.evaluated_at\
      \ IS NOT NULL AND  multipage_forms.evaluation_result = 'awaiting clarification'\
      \ THEN 'Awaiting Clarification'\n          WHEN multipage_forms.evaluated_at\
      \ IS NOT NULL AND  multipage_forms.evaluation_result = 'closed - supplier non-response'\
      \ THEN 'Closed - Supplier Non-response'\n          WHEN multipage_forms.evaluation_started_at\
      \ IS NOT NULL THEN 'Under Scientist Evaluation'\n          WHEN multipage_forms.submitted_at\
      \ IS NOT NULL THEN 'Submitted'\n          ELSE 'In Progress'\n      END status\n\
      \      , multipage_forms.evaluation_started_at\n      , multipage_forms.evaluated_at\n\
      \      , multipage_forms.evaluation_result\n      , concat(users_evaluated.user_first_name,'\
      \ ', users_evaluated.user_last_name) evaluated_by_user\n      , multipage_forms.provider_id\n\
      \      , providers.name supplier_name\n      , multipage_forms.days_until_expiration\n\
      \      , multipage_forms.expired_at\n      , multipage_forms.deleted_at rfi_deleted_at\n\
      \      , multipage_forms.obsoleted_at rfi_obsoleted_at\n      , multipage_forms.multipage_form_builder_id\n\
      \      , multipage_forms.uuid multipage_form_uuid\n      , form_pages.id form_id\n\
      \      , form_pages.name form_name\n      , form_pages.index form_index\n  \
      \    FROM\n        {{ ref('bronze_multipage_forms') }} multipage_forms\n   \
      \   LEFT JOIN {{ ref('bronze_form_pages') }} form_pages ON form_pages.multipage_form_id\
      \ = multipage_forms.id\n      LEFT JOIN {{ ref('bronze_providers') }} providers\
      \ ON multipage_forms.provider_id = providers.id\n      LEFT JOIN {{ ref('silver_user_refs')\
      \ }} users_submitted ON users_submitted.ref_id = multipage_forms.submitted_by_ref_id\n\
      \      LEFT JOIN {{ ref('silver_user_refs') }} users_created ON users_created.ref_id\
      \ = multipage_forms.created_by_ref_id\n      LEFT JOIN {{ ref('silver_user_refs')\
      \ }} users_evaluated ON users_evaluated.ref_id = evaluated_by_ref_id\n     \
      \ WHERE providers.name IS NOT NULL\n      ORDER BY providers.name ASC, submitted_at\
      \ DESC, name ASC\n )\n\n select * from transformed_data"
  silver_milestones:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_milestones.sql
    sql: "{{ config(\n  materialized=\"view\",\n  indexes=[\n    {\"columns\": [\"\
      id\"]},\n    {\"columns\": [\"itemizable_id\"]},\n    {\"columns\": [\"itemizable_type\"\
      ]}\n  ]\n) }}\n\nSELECT\n  milestones.*,\n  (milestones.base_unit_price / currencies.conversion_rate)\
      \ AS base_unit_price_usd,\n  (milestones.base_subtotal_price / currencies.conversion_rate)\
      \ AS base_subtotal_price_usd,\n  (milestones.retail_unit_price / currencies.conversion_rate)\
      \ AS retail_unit_price_usd,\n  (milestones.retail_subtotal_price / currencies.conversion_rate)\
      \ AS retail_subtotal_price_usd,\n  (milestones.wholesale_unit_price / currencies.conversion_rate)\
      \ AS wholesale_unit_price_usd,\n  (milestones.wholesale_subtotal_price / currencies.conversion_rate)\
      \ AS wholesale_subtotal_price_usd,\n  (milestones.list_unit_price / currencies.conversion_rate)\
      \ AS list_unit_price_usd,\n  (milestones.list_subtotal_price / currencies.conversion_rate)\
      \ AS list_subtotal_price_usd,\n  currencies.conversion_rate\nFROM {{ ref('bronze_milestones')\
      \ }} AS milestones\n  LEFT JOIN {{ ref('bronze_purchase_orders') }} AS purchase_orders\n\
      \    ON milestones.itemizable_id = purchase_orders.id\n    AND milestones.itemizable_type\
      \ = 'Pg::PurchaseOrderBase'\n  LEFT JOIN {{ ref('bronze_currencies') }} AS currencies\n\
      \    ON currencies.exchangable_id = purchase_orders.id\n    AND currencies.exchangable_type\
      \ = 'Pg::PurchaseOrderBase'\n"
  silver_beacon_refs:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_beacon_refs.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      ref_id\"]},\n    {\"columns\": [\"beacon_id\"]}\n  ])\n}}\n\nWITH transformed_data\
      \ AS (\n  SELECT\n    refs.id AS ref_id,\n    refs.reference_to_id,\n    refs.reference_to_type,\n\
      \    refs.reference_of_id AS beacon_id,\n    COALESCE(beacons.name, refs.fields\
      \ ->> 'name') AS beacon_name\n  FROM {{ ref('bronze_refs') }} AS refs\n  JOIN\
      \ {{ ref('bronze_beacons') }} AS beacons\n    ON refs.reference_of_id = beacons.id\n\
      \    AND refs.reference_of_type = 'Pg::Beacon'\n)\nSELECT * FROM transformed_data\n"
  silver_legal_document_theoretical_fees:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_legal_document_theoretical_fees.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      legal_document_id\"]},\n    {\"columns\": [\"organization_id\"]}\n  ])\n}}\n\
      \nWITH transformed_data AS (\n  SELECT\n    legal_documents.id AS legal_document_id,\n\
      \    default_values.organization_id AS organization_id,\n    CASE\n      WHEN\
      \ legal_documents.name ILIKE '%Value, Evidence and Access%' THEN default_values.theoretical_vea_customer_transaction_rate\
      \ / 100\n      WHEN legal_documents.name ILIKE '%Human Biological Samples%'\
      \ THEN default_values.theoretical_hbs_customer_transaction_rate / 100\n    \
      \  WHEN legal_documents.name ILIKE '%Consultancy%' THEN default_values.theoretical_consulting_customer_transaction_rate\
      \ / 100\n      ELSE default_values.theoretical_rsa_customer_transaction_rate\
      \ / 100\n    END AS theoretical_customer_transaction_fee\n  FROM\n    {{ ref('bronze_legal_documents')\
      \ }} AS legal_documents\n    JOIN {{ ref('bronze_signed_legal_documents') }}\
      \ AS signed_legal_documents \n      ON legal_documents.id = signed_legal_documents.legal_document_id\n\
      \      AND signed_legal_documents.signable_type = 'Pg::Organization'\n     \
      \ AND signed_legal_documents.revoked_at IS NULL\n    JOIN {{ ref('silver_default_values_inherited')\
      \ }} AS default_values \n      ON default_values.organization_id = signed_legal_documents.signable_id\n\
      )\n\nSELECT * FROM transformed_data"
  silver_customer_purchase_orders:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_customer_purchase_orders.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      id\"]},\n    {\"columns\": [\"uuid\"]},\n    {\"columns\": [\"provider_id\"\
      ]},\n    {\"columns\": [\"quote_group_id\"]},\n    {\"columns\": [\"organization_id\"\
      ]},\n    {\"columns\": [\"proposal_id\"]},\n    {\"columns\": [\"organization_id\"\
      , \"po_created_at\"]},\n    {\"columns\": [\"po_created_at\"]},\n    {\"columns\"\
      : [\"created_at\"]},\n    {\"columns\": [\"proposal_id\", \"created_at\"]}\n\
      \  ])\n}}\n\n{% set justifications = [\n    'Scientific expertise',\n    'Service\
      \ quality',\n    'Sole source',\n    'Previous relationship',\n    'Cost confidence',\n\
      \    'Time confidence',\n    'Data quality and access',\n    'Geographic location',\n\
      \    'Innovative solutions'\n] %}\n\nWITH milestone_aggregates AS (\n    SELECT\n\
      \        itemizable_id,\n        SUM(list_subtotal_price) AS list_subtotal_price,\n\
      \        SUM(CASE WHEN commission_fee_item = true THEN retail_subtotal_price\
      \ ELSE 0 END) AS fee_cap_amount\n    FROM {{ ref('bronze_milestones') }}\n \
      \   WHERE itemizable_type = 'Pg::PurchaseOrderBase'\n    GROUP BY itemizable_id\n\
      ),\n\nfirst_provider_pos AS (\n    SELECT DISTINCT ON (customer_purchase_order_id)\n\
      \        customer_purchase_order_id,\n        id,\n        provider_id,\n  \
      \      provider_name,\n        provider_billing_street,\n        provider_billing_street2,\n\
      \        provider_billing_city,\n        provider_billing_state,\n        provider_billing_zipcode,\n\
      \        provider_billing_country\n    FROM {{ ref('silver_provider_purchase_orders')\
      \ }}\n    ORDER BY customer_purchase_order_id, created_at ASC\n),\n\nlatest_revenue_predictions\
      \ AS (\n    SELECT DISTINCT ON (predictable_id)\n        predictable_id,\n \
      \       fully_invoiced_amount,\n        fully_invoiced_at\n    FROM {{ ref('bronze_predicted_revenues')\
      \ }}\n    WHERE predictable_type = 'Pg::PurchaseOrderBase'\n    ORDER BY predictable_id,\
      \ run_at DESC\n),\n\nlatest_billing_addresses AS (\n    SELECT DISTINCT ON (addressable_id)\n\
      \        addressable_id,\n        street,\n        street2,\n        city,\n\
      \        state,\n        zipcode,\n        country\n    FROM {{ ref('bronze_addresses')\
      \ }}\n    WHERE addressable_type = 'Pg::PurchaseOrderBase'\n        AND type\
      \ = 'Pg::BillingAddress'\n    ORDER BY addressable_id, created_at DESC\n),\n\
      \nlatest_shipping_addresses AS (\n    SELECT DISTINCT ON (addressable_id)\n\
      \        addressable_id,\n        country\n    FROM {{ ref('bronze_addresses')\
      \ }}\n    WHERE addressable_type = 'Pg::PurchaseOrderBase'\n        AND type\
      \ = 'Pg::ShippingAddress'\n    ORDER BY addressable_id, created_at DESC\n),\n\
      \ntax_aggregates AS (\n    SELECT\n        taxable_id,\n        SUM(amount)\
      \ AS amount\n    FROM {{ ref('bronze_taxes') }}\n    WHERE taxable_type = 'Pg::PurchaseOrderBase'\n\
      \        AND type = 'Pg::RetailTax'\n        AND category = 'sales'\n    GROUP\
      \ BY taxable_id\n),\n\nlatest_shipping AS (\n    SELECT DISTINCT ON (shipable_id)\n\
      \        shipable_id,\n        cost\n    FROM {{ ref('bronze_shippings') }}\n\
      \    WHERE shipable_type = 'Pg::PurchaseOrderBase'\n    ORDER BY shipable_id,\
      \ created_at DESC\n),\n\ntransformed_data AS (\n    SELECT\n        purchase_orders.id\
      \ AS id,\n        purchase_orders.uuid AS uuid,\n        purchase_orders.customer_purchase_order_id\
      \ AS customer_purchase_order_id,\n        purchase_orders.accepted AS accepted,\n\
      \        purchase_orders.completed AS completed,\n        purchase_orders.rejected\
      \ AS rejected,\n        purchase_orders.quote_group_pg_id AS quote_group_id,\n\
      \        quote_groups.organization_id AS organization_id,\n        quote_groups.organization_name\
      \ AS organization_name,\n        quote_groups.user_id AS quote_group_user_id,\n\
      \        quote_groups.user_email AS quote_group_user_email,\n        quote_groups.primary_discipline_id\
      \ AS primary_discipline_id,\n        quote_groups.primary_discipline_name AS\
      \ primary_discipline_name,\n        quote_groups.primary_category_id AS primary_category_id,\n\
      \        quote_groups.primary_category_name AS primary_category_name,\n    \
      \    quote_groups.primary_subcategory_id AS primary_subcategory_id,\n      \
      \  quote_groups.primary_subcategory_name AS primary_subcategory_name,\n    \
      \    quote_groups.ware_id AS ware_id,\n        quote_groups.ware_name AS ware_name,\n\
      \        purchase_orders.proposal_id AS proposal_id,\n        purchase_orders.netsuite_status\
      \ AS netsuite_status,\n        purchase_orders.last_computed_invoice_status\
      \ AS last_computed_invoice_status,\n        purchase_orders.commission_rate\
      \ AS commission_rate,\n        purchase_orders.po_adjustment_rate AS po_adjustment_rate,\n\
      \        purchase_orders.projected_po_total AS projected_po_total,\n       \
      \ purchase_orders.ad_po_number AS ad_po_number,\n        purchase_orders.po_number\
      \ AS po_number,\n        purchase_orders.standing_purchase_order_id AS standing_purchase_order_id,\n\
      \        standing_purchase_orders.number AS standing_purchase_order_number,\n\
      \        currencies.currency AS currency,\n        currencies.conversion_rate\
      \ AS conversion_rate,\n        organizations.url || '/quote_groups/' || quote_groups.uuid\
      \ || '#po-' || purchase_orders.uuid AS storefront_url,\n        purchase_orders.po_created_at\
      \ AS po_created_at,\n        purchase_orders.created_at AS created_at,\n   \
      \     purchase_orders.updated_at AS updated_at,\n        purchase_orders.fully_recognized_at\
      \ AS fully_recognized_at,\n        {% for justification in justifications %}\n\
      \        CASE\n            WHEN purchase_orders.purchase_justifications @> ARRAY['{{\
      \ justification }}']::varchar[] THEN 1\n            ELSE 0\n        END AS {{\
      \ justification | replace(\" \", \"_\") | lower }}{% if not loop.last %},{%\
      \ endif %}\n        {% endfor %},\n        billing_address.street AS customer_billing_street,\n\
      \        billing_address.street2 AS customer_billing_street2,\n        billing_address.city\
      \ AS customer_billing_city,\n        billing_address.state AS customer_billing_state,\n\
      \        billing_address.zipcode AS customer_billing_zipcode,\n        billing_address.country\
      \ AS customer_billing_country,\n        shipping_address.country AS customer_shipping_country,\n\
      \n        -- Turnaround times\n        purchase_orders.pr_to_po_business_hours,\n\
      \        purchase_orders.request_to_po_business_hours,\n\n        -- TODO: Remove\
      \ this eventually. Now using efficient JOINs instead of LATERAL\n        first_provider_purchase_order.id\
      \ AS provider_purchase_order_id,\n        first_provider_purchase_order.provider_id\
      \ AS provider_id,\n        first_provider_purchase_order.provider_name AS provider_name,\n\
      \        first_provider_purchase_order.provider_billing_street AS provider_billing_street,\n\
      \        first_provider_purchase_order.provider_billing_street2 AS provider_billing_street2,\n\
      \        first_provider_purchase_order.provider_billing_city AS provider_billing_city,\n\
      \        first_provider_purchase_order.provider_billing_state AS provider_billing_state,\n\
      \        first_provider_purchase_order.provider_billing_zipcode AS provider_billing_zipcode,\n\
      \        first_provider_purchase_order.provider_billing_country AS provider_billing_country,\n\
      \        latest_revenue_prediction.fully_invoiced_amount AS latest_predicted_fully_invoiced_amount,\n\
      \        (latest_revenue_prediction.fully_invoiced_amount / currencies.conversion_rate)\
      \ AS latest_predicted_fully_invoiced_amount_usd,\n        latest_revenue_prediction.fully_invoiced_at\
      \ AS latest_predicted_fully_invoiced_at,\n        -- END TODO\n\n        purchase_orders.retail_total_price\
      \ AS retail_total_price,\n        (purchase_orders.retail_total_price / currencies.conversion_rate)\
      \ AS retail_total_price_usd,\n        CASE\n            WHEN (purchase_orders.retail_total_price\
      \ / currencies.conversion_rate) <= 10000 THEN '1) 10k or less' -- numbering\
      \ is necessary for sorting in superset\n            WHEN (purchase_orders.retail_total_price\
      \ / currencies.conversion_rate) <= 50000 THEN '2) 10k to 50k'\n            WHEN\
      \ (purchase_orders.retail_total_price / currencies.conversion_rate) <= 100000\
      \ THEN '3) 50k to 100k'\n            WHEN (purchase_orders.retail_total_price\
      \ / currencies.conversion_rate) <= 150000 THEN '4) 100k or 150k'\n         \
      \   WHEN (purchase_orders.retail_total_price / currencies.conversion_rate) <=\
      \ 250000 THEN '5) 150k or 250k'\n            WHEN (purchase_orders.retail_total_price\
      \ / currencies.conversion_rate) > 250000 THEN '6) 250k or more'\n          \
      \  ELSE NULL\n        END AS cpo_price_threshold_usd,\n\n        purchase_orders.retail_subtotal_price\
      \ AS retail_subtotal_price,\n        milestones.list_subtotal_price AS list_subtotal_price,\n\
      \        (purchase_orders.retail_subtotal_price / currencies.conversion_rate)\
      \ AS retail_subtotal_price_usd,\n        (milestones.list_subtotal_price / currencies.conversion_rate)\
      \ AS list_subtotal_price_usd,\n        (COALESCE(milestones.fee_cap_amount,\
      \ 0) / currencies.conversion_rate) AS fee_cap_amount_usd,\n\n        COALESCE(taxes.amount,\
      \ 0) AS retail_tax,\n        (COALESCE(taxes.amount, 0) / currencies.conversion_rate)\
      \ AS retail_tax_usd,\n\n        COALESCE(invoice_aggregates.invoice_count, 0)\
      \ AS invoice_count,\n        invoice_aggregates.first_invoice_created_at AS\
      \ first_invoice_created_at,\n        invoice_aggregates.last_invoice_created_at\
      \ AS last_invoice_created_at,\n        invoice_aggregates.sum_invoice_retail_total_price\
      \ AS sum_invoice_retail_total_price,\n        invoice_aggregates.sum_invoice_retail_total_price_usd\
      \ AS sum_invoice_retail_total_price_usd,\n        invoice_aggregates.sum_invoice_retail_subtotal_price\
      \ AS sum_invoice_retail_subtotal_price,\n        invoice_aggregates.sum_invoice_retail_subtotal_price_usd\
      \ AS sum_invoice_retail_subtotal_price_usd,\n        (purchase_orders.retail_total_price\
      \ - COALESCE(invoice_aggregates.sum_invoice_retail_total_price, 0)) AS remaining_for_invoice,\n\
      \        ((purchase_orders.retail_total_price - COALESCE(invoice_aggregates.sum_invoice_retail_total_price,\
      \ 0)) / currencies.conversion_rate) AS remaining_for_invoice_usd,\n\n      \
      \  COALESCE(shipping.cost, 0) AS shipping_cost,\n        (COALESCE(shipping.cost,\
      \ 0) / currencies.conversion_rate) AS shipping_cost_usd,\n        invoice_aggregates.invoiced_subtotal_usd,\n\
      \        invoice_aggregates.invoiced_shipping_usd,\n        invoice_aggregates.invoiced_taxes_usd\n\
      \    FROM {{ ref('bronze_customer_purchase_orders') }} AS purchase_orders\n\
      \        JOIN {{ ref('silver_quote_groups') }} AS quote_groups ON purchase_orders.quote_group_pg_id\
      \ = quote_groups.id\n        JOIN {{ ref('silver_organizations') }} AS organizations\
      \ ON quote_groups.organization_id = organizations.id\n        JOIN {{ ref('bronze_currencies')\
      \ }} AS currencies\n            ON currencies.exchangable_id = purchase_orders.id\n\
      \            AND currencies.exchangable_type = 'Pg::PurchaseOrderBase'\n   \
      \     LEFT JOIN milestone_aggregates AS milestones ON purchase_orders.id = milestones.itemizable_id\n\
      \        LEFT JOIN first_provider_pos AS first_provider_purchase_order\n   \
      \         ON purchase_orders.id = first_provider_purchase_order.customer_purchase_order_id\n\
      \        LEFT JOIN latest_revenue_predictions AS latest_revenue_prediction\n\
      \            ON latest_revenue_prediction.predictable_id = purchase_orders.id\n\
      \        LEFT JOIN latest_billing_addresses AS billing_address\n           \
      \ ON billing_address.addressable_id = purchase_orders.id\n        LEFT JOIN\
      \ latest_shipping_addresses AS shipping_address\n            ON shipping_address.addressable_id\
      \ = purchase_orders.id\n        LEFT JOIN tax_aggregates AS taxes ON taxes.taxable_id\
      \ = purchase_orders.id\n        LEFT JOIN {{ ref('silver_purchase_order_invoice_amounts')\
      \ }} AS invoice_aggregates ON purchase_orders.id = invoice_aggregates.purchase_order_id\n\
      \        LEFT JOIN {{ ref('bronze_standing_purchase_orders') }} AS standing_purchase_orders\n\
      \            ON purchase_orders.standing_purchase_order_id = standing_purchase_orders.id\n\
      \        LEFT JOIN latest_shipping AS shipping\n            ON shipping.shipable_id\
      \ = purchase_orders.id\n    WHERE purchase_orders.po_created_at IS NOT NULL\n\
      )\n\nSELECT * FROM transformed_data\n"
  silver_provider_certifications:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_provider_certifications.sql
    sql: "{{ config(materialized=\"view\") }}\n\nWITH transformed_data AS (\n  SELECT\
      \  providers.id AS id,\n          providers.name AS name,\n          providers.created_at\
      \ AS created_at,\n          providers.updated_at AS updated_at,\n          certifications.name\
      \ AS certification_name,\n          certifications.id AS certification_id,\n\
      \          certifications.categories AS certification_categories,\n        \
      \  certifications.description AS certification_description,\n          certifications.requirements\
      \ AS certification_requirements,\n          certifications.cert_region AS certification_region,\n\
      \          certifications.is_sustainable,\n          certifications.is_diverse,\n\
      \          certifications.is_compli_related,\n          certifications.is_popular,\n\
      \          certifications.is_iso,\n          CASE WHEN provider_certifications.status\
      \ = 0 THEN 'unverified'\n               WHEN provider_certifications.status\
      \ = 1 THEN 'verified'\n               WHEN provider_certifications.status =\
      \ 2 THEN 'denied'\n               WHEN provider_certifications.status = 3 THEN\
      \ 'expired' END certification_status,\n          CASE WHEN provider_certifications.expiration\
      \ < now()::timestamp THEN 'expiration in past'\n               WHEN provider_certifications.expiration\
      \ >= now()::timestamp THEN 'expiration in future'\n               WHEN provider_certifications.expiration\
      \ IS NULL AND certification_id IS NOT NULL THEN  'no expiration' END certification_expiration,\n\
      \          CASE WHEN provider_certifications.certification_id IS NULL THEN 'nondiverse'\
      \ else 'diverse' END certification_diversity\n  FROM {{ ref('bronze_provider_certifications')\
      \ }} AS provider_certifications\n  JOIN {{ ref('silver_certifications') }} AS\
      \ certifications ON certifications.id = provider_certifications.certification_id\n\
      \  JOIN {{ ref('silver_providers') }} AS providers ON provider_certifications.provider_pg_id\
      \ = providers.id\n)\n\nSELECT * FROM transformed_data\n"
  silver_net_revenues_daily:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_net_revenues_daily.sql
    sql: "{{ config(\n  materialized=\"view\",\n)\n}}\n\nSELECT\n  run_at::date AS\
      \ date,\n  purchase_order_id,\n  SUM(recognized_usd) AS net_recognized_usd\n\
      FROM {{ ref('bronze_recognized_net_revenues_production') }} AS net_revenues\n\
      GROUP BY run_at::date, purchase_order_id"
  silver_timepoints:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_timepoints.sql
    sql: "{{ config(\n  materialized=\"table\",\n    indexes=[\n      {'columns':\
      \ ['quoted_ware_id' ], 'unique': True},\n    ]\n\n)\n}}\n\n{% set fields = [\n\
      \    'vendor_payment_terms',\n    'request_approval_date',\n    'vendor_review_date',\n\
      \    'request_date',\n    'quote_submission_date',\n    'estimated_completion_date',\n\
      \    'project_completion_date',\n    'sow_requested_date',\n    'sow_submitted_date',\n\
      \    'sow_acceptance_date',\n    'amendment_submitted_date'\n] %}\n\nWITH pivoted_timepoints\
      \ AS (\n    SELECT\n        quoted_ware_id,\n        {% for field in fields\
      \ %}\n        MAX(CASE WHEN name = '{{ field }}' THEN created_at END) AS {{\
      \ field }}{% if not loop.last %},{% endif %}\n        {% endfor %}\n    FROM\
      \ {{ source('public', 'timepoints') }}\n    GROUP BY quoted_ware_id\n)\n\nSELECT\
      \ * FROM pivoted_timepoints"
  silver_compliance_manifest_approvals:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_compliance_manifest_approvals.sql
    sql: "{{ config(\n  materialized=\"view\")\n}}\n\nWITH transformed_data AS (\n\
      \    SELECT\n    quote_groups.id request_id,\n    quote_groups.name request_name,\n\
      \    quote_groups.site request_site,\n    quote_groups.uuid request_uuid,\n\
      \    quote_groups.created_at request_created_at,\n    quote_groups.last_computed_status,\n\
      \    quote_groups.organization_name,\n    quote_groups.user_email requestor_email,\n\
      \    quote_groups.identifier request_identifier,\n    CONCAT('https://',quote_groups.organization_subdomain,'.scientist.com/quote_groups/',\
      \ quote_groups.uuid) request_url,\n    compliance_manifests.type compliance_manifest_type,\n\
      \    compliance_manifests.id compliance_manifest_id,\n    compliance_manifests.uuid\
      \ compliance_manifest_uuid,\n    compliance_manifests.proposal_id compliance_manifest_proposal_id,\n\
      \    compliance_manifests.submitted_at compliance_manifest_submitted_at,\n \
      \   CONCAT('https://',quote_groups.organization_subdomain,'.scientist.com/compliance_manifests/',compliance_manifests.uuid)\
      \ compliance_manifests_url,\n    request_po_count,\n    round(EXTRACT(EPOCH\
      \ FROM (approvals.status_changed_at - compliance_manifests.submitted_at)) ,2)\
      \ approval_time_seconds,\n    CASE\n        WHEN EXTRACT(EPOCH FROM (approvals.status_changed_at\
      \ - compliance_manifests.submitted_at)) < 3600 THEN\n            ROUND(EXTRACT(EPOCH\
      \ FROM (approvals.status_changed_at - compliance_manifests.submitted_at)) /\
      \ 60, 2)::float || ' minute(s)'\n\n        WHEN EXTRACT(EPOCH FROM (approvals.status_changed_at\
      \ - compliance_manifests.submitted_at)) < 86400 THEN\n            ROUND(EXTRACT(EPOCH\
      \ FROM (approvals.status_changed_at - compliance_manifests.submitted_at)) /\
      \ 3600,2)::float || ' hour(s)'\n\n        ELSE\n            ROUND(EXTRACT(EPOCH\
      \ FROM (approvals.status_changed_at - compliance_manifests.submitted_at)) /\
      \ 86400,2)::float || ' day(s)'\n    END AS approval_time,\n    approvals.approval_reason,\n\
      \    approvals.status_reason,\n    approvals.status approval_status,\n    CASE\
      \ WHEN auto_approved.id IS NOT NULL THEN TRUE ELSE FALSE END auto_approved,\n\
      \    approvals.status_changed_at,\n    approvals.status_changed_by_id ,\n  \
      \  approvals.legal_obligation_template_id,\n    users.email approver_email\n\
      \    FROM {{ ref('silver_quote_groups') }} quote_groups\n    JOIN (SELECT id,\
      \ type, uuid, proposal_id, quote_group_pg_id,cancelled_at, submitted_at FROM\
      \ {{ ref('bronze_compliance_manifests') }}\n    WHERE type IN ('Pg::RequestComplianceManifest','Pg::ProposalComplianceManifest')\
      \ ) AS compliance_manifests ON compliance_manifests.quote_group_pg_id=quote_groups.id\n\
      \    LEFT JOIN (SELECT approvable_id, approvable_type, approval_reason, status,\
      \ status_changed_at, status_changed_by_id, legal_obligation_template_id, status_reason\
      \ FROM {{ ref('bronze_approvals') }} ) AS approvals ON approvals.approvable_id=compliance_manifests.id\
      \ AND approvals.approvable_type='Pg::ComplianceManifest'\n    LEFT JOIN ( SELECT\
      \ compliance_manifests.id\n    FROM {{ ref('bronze_compliance_manifests') }}\
      \ compliance_manifests\n    LEFT JOIN (SELECT approvable_id, approvable_type,\
      \ id,legal_obligation_template_id FROM {{ ref('bronze_approvals') }} ) AS approvals\n\
      \      ON approvals.approvable_id = compliance_manifests.id\n      AND approvals.approvable_type\
      \ = 'Pg::ComplianceManifest'\n    WHERE compliance_manifests.submitted_at IS\
      \ NOT NULL\n      AND compliance_manifests.cancelled_at IS NULL\n      AND compliance_manifests.type\
      \ in ('Pg::RequestComplianceManifest','Pg::ProposalComplianceManifest')\n  \
      \  GROUP BY compliance_manifests.id\n    HAVING\n      COUNT(approvals.id) =\
      \ 0\n      OR COUNT(approvals.legal_obligation_template_id) = COUNT(approvals.id)\
      \ ) auto_approved ON auto_approved.id=compliance_manifests.id\n    LEFT JOIN\
      \ (SELECT id, email FROM {{ ref('bronze_users') }}) users ON users.id=approvals.status_changed_by_id\n\
      \    JOIN (SELECT  DISTINCT(quote_group_pg_id) request_id, COUNT(id) request_po_count\
      \ FROM (\n    SELECT id, quote_group_pg_id, po_number, po_created_at,\n    CASE\n\
      \      WHEN obsoleted THEN 'Obsoleted'\n      WHEN completed THEN 'Completed'\
      \ --x\n      WHEN version_number > 1 AND referenced_po_id IS NOT NULL THEN 'Amended'\
      \ --x\n      WHEN created_at IS NULL OR po_number IS NULL THEN 'Awaiting PO'\n\
      \      WHEN po_created_at IS NOT NULL AND po_number IS NOT NULL THEN 'Work in\
      \ Progress' --x\n        ELSE NULL END po_status\n    FROM\n    {{ ref('bronze_purchase_orders')\
      \ }} purchase_orders WHERE type='Pg::CustomerPurchaseOrder' AND quote_group_pg_id\
      \ IS NOT NULL AND po_created_at IS NOT NULL AND po_number IS NOT NULL\n    )\
      \ po_status WHERE  po_status.po_status IN ('Amended','Completed','Work in Progress')\n\
      \    GROUP BY  quote_group_pg_id\n    ) request_with_po ON request_with_po.request_id=quote_groups.id\n\
      \    WHERE compliance_manifests.submitted_at IS NOT NULL\n    AND compliance_manifests.cancelled_at\
      \ IS NULL AND\n    quote_groups.last_computed_status NOT IN ('Cancelled', 'Declined')\n\
      )\n\nSELECT * FROM transformed_data"
  silver_proposals:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_proposals.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      id\"]},\n    {\"columns\": [\"uuid\"]},\n    {\"columns\": [\"proposal_type\"\
      ]},\n    {\"columns\": [\"provider_id\"]},\n    {\"columns\": [\"quoted_ware_id\"\
      ]},\n    {\"columns\": [\"quote_group_id\"]},\n    {\"columns\": [\"organization_id\"\
      ]},\n    {\"columns\": [\"proposal_user_id\"]},\n    {\"columns\": [\"quote_group_user_id\"\
      ]},\n  ])\n}}\n\n{% set justifications = [\n    'Scientific expertise',\n  \
      \  'Service quality',\n    'Sole source',\n    'Previous relationship',\n  \
      \  'Cost confidence',\n    'Time confidence',\n    'Data quality and access',\n\
      \    'Geographic location',\n    'Innovative solutions'\n] %}\n\n\nWITH transformed_data\
      \ AS (\n  SELECT\n    proposals.id AS id,\n    proposals.uuid AS uuid,\n   \
      \ proposals.proposal_type AS proposal_type,\n    proposals.provider_pg_id AS\
      \ provider_id,\n    proposals.quoted_ware_pg_id AS quoted_ware_id,\n    proposals.state\
      \ AS state,\n    proposals.obsoleted AS obsoleted,\n    quote_groups.id AS quote_group_id,\n\
      \    quote_groups.organization_id AS organization_id,\n    quote_groups.organization_name\
      \ AS organization_name,\n    proposals.user_id AS proposal_user_id,\n    users.email\
      \ AS proposal_user_email,\n    quote_groups.user_id AS quote_group_user_id,\n\
      \    quote_groups.user_email AS quote_group_user_email,\n    quote_groups.primary_discipline_id\
      \ AS primary_discipline_id,\n    quote_groups.primary_discipline_name AS primary_discipline_name,\n\
      \    quote_groups.primary_category_id AS primary_category_id,\n    quote_groups.primary_category_name\
      \ AS primary_category_name,\n    quote_groups.primary_subcategory_id AS primary_subcategory_id,\n\
      \    quote_groups.primary_subcategory_name AS primary_subcategory_name,\n  \
      \  quote_groups.ware_id AS ware_id,\n    quote_groups.ware_name AS ware_name,\n\
      \    proposals.last_computed_storefront_status AS storefront_status,\n    proposals.last_computed_backoffice_status\
      \ AS backoffice_status,\n\n    -- Prices\n    proposals.retail_subtotal_price\
      \ AS retail_subtotal_price,\n    proposals.retail_total_price AS retail_total_price,\n\
      \    proposals.wholesale_subtotal_price AS wholesale_subtotal_price,\n    proposals.wholesale_total_price\
      \ AS wholesale_total_price,\n    (proposals.retail_subtotal_price / currencies.conversion_rate)\
      \ AS retail_subtotal_price_usd,\n    (proposals.retail_total_price / currencies.conversion_rate)\
      \ AS retail_total_price_usd,\n    (proposals.wholesale_subtotal_price / currencies.conversion_rate)\
      \ AS wholesale_subtotal_price_usd,\n    (proposals.wholesale_total_price / currencies.conversion_rate)\
      \ AS wholesale_total_price_usd,\n\n    -- Turnaround times\n    proposals.request_to_proposal_business_hours,\n\
      \    proposals.proposal_to_ready_to_purchase_business_hours,\n\n    proposals.fee_assignment\
      \ AS fee_assignment,\n    proposals.savings_percent AS savings_percent,\n  \
      \  proposals.tax_category AS tax_category,\n    proposals.theoretical_transaction_rate\
      \ AS theoretical_transaction_rate,\n    proposals.theoretical_fee_cap AS theoretical_fee_cap,\n\
      \    currencies.currency AS currency,\n    currencies.conversion_rate AS conversion_rate,\n\
      \    proposals.submitted_at AS submitted_at,\n    proposals.created_at AS created_at,\n\
      \    proposals.updated_at AS updated_at,\n    proposals.identifier AS identifier,\n\
      \    COUNT(provider_purchase_orders.id) AS purchase_order_count,\n    proposals.legal_document_id\
      \ AS legal_document_id,\n    quote_groups.storefront_url || '#proposal-' ||\
      \ proposals.uuid AS storefront_url,\n    quoted_wares.backoffice_url || '/proposals/'\
      \ || proposals.uuid AS backoffice_url,\n    quoted_wares.status AS quoted_ware_status,\n\
      \    negotiated_quote_groups.negotiate_note AS negotiate_note,\n    users_note.full_name\
      \ AS negotiator_name,\n    users_note.email AS negotiator_email,\n    proposals.negotiation_delegated,\n\
      \    CASE\n      WHEN ROW_NUMBER() OVER(PARTITION BY quote_groups.id, proposals.proposal_type\
      \ ORDER BY proposals.confirmed_at ASC) = 1 AND proposals.proposal_type = 'SOW'\n\
      \      THEN TRUE\n      ELSE FALSE\n    END AS is_first_sow,\n    CASE\n   \
      \   WHEN ROW_NUMBER() OVER(PARTITION BY quote_groups.id, proposals.proposal_type\
      \ ORDER BY proposals.confirmed_at ASC) = 1\n      AND proposals.proposal_type\
      \ = 'Estimate'\n      THEN TRUE\n    ELSE FALSE\n    END AS is_first_estimate,\n\
      \    {% for justification in justifications %}\n    CASE\n        WHEN proposals.purchase_justifications\
      \ @> ARRAY['{{ justification }}']::varchar[] THEN 1\n        ELSE 0\n    END\
      \ AS {{ justification | replace(\" \", \"_\") | lower }}{% if not loop.last\
      \ %},{% endif %}\n    {% endfor %}\n\n  FROM {{ ref('bronze_proposals') }} AS\
      \ proposals\n    JOIN {{ ref('silver_quoted_wares') }} AS quoted_wares ON proposals.quoted_ware_pg_id\
      \ = quoted_wares.id\n    JOIN {{ ref('silver_providers') }} AS providers ON\
      \ proposals.provider_pg_id = providers.id\n    JOIN {{ ref('silver_quote_groups')\
      \ }} AS quote_groups ON quoted_wares.quote_group_id = quote_groups.id\n    LEFT\
      \ JOIN {{ ref('bronze_users') }} AS users ON proposals.user_id = users.id\n\
      \    JOIN {{ ref('bronze_currencies') }} AS currencies\n      ON currencies.exchangable_id\
      \ = proposals.id\n      AND currencies.exchangable_type = 'Pg::ProposalBase'\n\
      \    LEFT JOIN {{ ref('bronze_provider_purchase_orders') }} AS provider_purchase_orders\
      \ ON provider_purchase_orders.proposal_id = proposals.id\n    LEFT JOIN {{ ref('silver_negotiated_quote_groups')\
      \ }} AS negotiated_quote_groups ON negotiated_quote_groups.quote_group_id =\
      \ quote_groups.id\n    LEFT JOIN\n        (SELECT id, email, full_name FROM\
      \ {{ ref('bronze_users') }} ) AS users_note ON negotiated_quote_groups.user_id\
      \ = users_note.id\n  WHERE proposals.draft IS NOT true AND proposals.submitted_at\
      \ IS NOT NULL\n  GROUP BY\n    proposals.id,\n    proposals.uuid,\n    proposals.proposal_type,\n\
      \    proposals.provider_pg_id,\n    proposals.quoted_ware_pg_id,\n    proposals.state,\n\
      \    proposals.obsoleted,\n    proposals.identifier,\n    quote_groups.id,\n\
      \    quote_groups.organization_id,\n    quote_groups.organization_name,\n  \
      \  proposals.user_id,\n    users.email,\n    quote_groups.user_id,\n    quote_groups.user_email,\n\
      \    quote_groups.primary_discipline_id,\n    quote_groups.primary_discipline_name,\n\
      \    quote_groups.primary_category_id,\n    quote_groups.primary_category_name,\n\
      \    quote_groups.primary_subcategory_id,\n    quote_groups.primary_subcategory_name,\n\
