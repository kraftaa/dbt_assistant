      \    -- sum_invoice_retail_total_price_usd should be calculated off provider_purshase_orders\
      \ see https://github.com/assaydepot/sparkle-dbt/issues/96\n    customer_purchase_orders.sum_invoice_retail_total_price_usd\
      \ AS customer_purchase_order_sum_invoice_retail_total_price_usd,\n    provider_purchase_orders.remaining_for_invoice_usd\
      \ AS customer_purchase_order_remaining_for_invoice_usd,\n    customer_purchase_orders.last_computed_invoice_status\
      \ AS customer_purchase_order_last_computed_invoice_status,\n    quoted_wares.suppliers_contacted_by_quote_group\
      \ AS suppliers_contacted_by_quote_group,\n    quoted_wares.suppliers_contacted_by_organization\
      \ AS suppliers_contacted_by_organization,\n    customer_purchase_orders.customer_billing_country\
      \ AS customer_purchase_order_customer_billing_country,\n    quoted_wares.proposal_count\
      \ AS quoted_wares_proposal_count,\n    quoted_wares.sow_count AS quoted_wares_sow_count,\n\
      \    quoted_wares.spending_category as quoted_wares_spending_category,\n   \
      \ quoted_wares.id AS quoted_ware_id,\n    quoted_wares.advantage_plan AS advantage_plan,\n\
      \    quoted_wares.consolidated_billing AS consolidated_billing,\n    quoted_wares.preferred\
      \ AS preferred,\n    quote_groups.distinct_provider_proposals AS quote_group_distinct_provider_proposals,\n\
      \    quote_groups.distinct_provider_sows AS savings_qg_distinct_provider_sows,\n\
      \    quote_groups.name AS quote_group_name,\n    quote_groups.description AS\
      \ quote_group_description,\n    quote_groups.ware_name AS quote_group_ware_name,\n\
      \    customer_purchase_orders.shipping_cost_usd AS customer_provider_order_shipping_cost_usd,\n\
      \    organizations.canonical_organization_id AS canonical_organization_id,\n\
      \    customer_purchase_orders.standing_purchase_order_number AS customer_standing_purchase_order_number,\n\
      \    provider_certifications.certification_names,\n    provider_certifications.certification_categories,\n\
      \    provider_certifications.sustainability_certifications,\n    provider_certifications.diversity_certifications,\n\
      \    provider_certifications.compli_certifications,\n    provider_certifications.is_sustainable,\n\
      \    provider_certifications.is_diverse,\n    provider_certifications.is_compli_related,\n\
      \    provider_certifications.is_popular,\n    provider_certifications.is_iso,\n\
      \    request_compliance_manifests.compliance_manifest_uuid request_compliance_manifest_uuid,\n\
      \    request_compliance_manifests.submitted_at request_compliance_manifest_submitted_at,\n\
      \    request_compliance_manifests.compliance_manifest_id request_compliance_manifest_id,\n\
      \    request_compliance_manifests.hbs,\n    request_compliance_manifests.cell_lines,\n\
      \    request_compliance_manifests.gmp,\n    request_compliance_manifests.email\
      \ compliance_manifest_submitted_by,\n\n    -- Turnaround times\n    proposals.request_to_proposal_business_hours/24\
      \ AS request_to_proposal_business_days,\n    proposals.proposal_to_ready_to_purchase_business_hours/24\
      \ AS proposal_to_ready_to_purchase_business_days,\n    customer_purchase_orders.pr_to_po_business_hours/24\
      \ AS pr_to_po_business_days,\n    customer_purchase_orders.request_to_po_business_hours/24\
      \ AS request_to_po_business_days,\n\n    -- Provider badges\n    COALESCE(provider_badges.has_preferred_badge,\
      \ FALSE) AS has_preferred_badge,\n    COALESCE(provider_badges.has_compli_badge,\
      \ FALSE) AS has_compli_badge,\n    COALESCE(provider_badges.has_built_in_badge,\
      \ FALSE) AS has_built_in_badge,\n\n    -- CASE WHEN fields\n    CASE\n     \
      \   WHEN customer_purchase_orders.last_computed_invoice_status = 'Not Invoiced'\
      \ THEN CONCAT('   ', customer_purchase_orders.last_computed_invoice_status)\n\
      \        WHEN customer_purchase_orders.last_computed_invoice_status = 'Partially\
      \ Invoiced' THEN CONCAT('  ', customer_purchase_orders.last_computed_invoice_status)\n\
      \        WHEN customer_purchase_orders.last_computed_invoice_status = 'Fully\
      \ Invoiced' THEN CONCAT(' ', customer_purchase_orders.last_computed_invoice_status)\n\
      \    END AS customer_purchase_order_last_computed_invoice_status_ordered, --\
      \ to order x axis on bar chart (no good solution found on superset)\n    CASE\
      \ WHEN customer_purchase_orders.po_created_at >= DATE_TRUNC('year', CURRENT_DATE)\
      \ AND customer_purchase_orders.po_created_at <= CURRENT_DATE THEN quote_groups.user_id\
      \ ELSE NULL END AS purchasing_user_id_current_ytd,     -- TODO: can we find\
      \ better ways to calculate *_ytd fields?\n    CASE WHEN customer_purchase_orders.po_created_at\
      \ >= DATE_TRUNC('year', CURRENT_DATE - INTERVAL '1 year') AND customer_purchase_orders.po_created_at\
      \ <= CURRENT_DATE - INTERVAL '1 year'THEN quote_groups.user_id ELSE NULL END\
      \ AS purchasing_user_id_last_ytd,\n    CASE WHEN quote_groups.created_at >=\
      \ DATE_TRUNC('year', CURRENT_DATE) AND quote_groups.created_at <= CURRENT_DATE\
      \ THEN quote_groups.id ELSE NULL END AS quote_group_id_current_ytd,\n    CASE\
      \ WHEN quote_groups.created_at >= DATE_TRUNC('year', CURRENT_DATE - INTERVAL\
      \ '1 year') AND quote_groups.created_at <= CURRENT_DATE - INTERVAL '1 year'\
      \ THEN quote_groups.id ELSE NULL END AS quote_group_id_last_ytd,\n    CASE WHEN\
      \ quote_groups.is_first_quote_group = TRUE AND quote_groups.created_at >= DATE_TRUNC('year',\
      \ CURRENT_DATE) AND quote_groups.created_at <= CURRENT_DATE THEN quote_groups.user_id\
      \ ELSE NULL END AS new_user_id_current_ytd,\n    CASE WHEN quote_groups.is_first_quote_group\
      \ = TRUE AND quote_groups.created_at >= DATE_TRUNC('year', CURRENT_DATE - INTERVAL\
      \ '1 year') AND quote_groups.created_at <= CURRENT_DATE - INTERVAL '1 year'\
      \ THEN quote_groups.user_id ELSE NULL END AS new_user_id_last_ytd,\n    CASE\
      \ WHEN quote_groups.multisourced = TRUE THEN 'competitive' ELSE 'non competitive'\
      \ END AS competitive_sourcing,\n    CASE WHEN quote_groups.multisourced = TRUE\
      \ THEN customer_purchase_orders.retail_total_price_usd ELSE 0 END AS competitive_spend_share_amount\n\
      \  FROM {{ ref('silver_proposals') }} AS proposals\n    JOIN {{ ref('silver_quoted_wares')\
      \ }} AS quoted_wares ON proposals.quoted_ware_id = quoted_wares.id\n    JOIN\
      \ {{ ref('silver_providers') }} AS providers ON proposals.provider_id = providers.id\n\
      \    JOIN {{ ref('silver_quote_groups') }} AS quote_groups ON quoted_wares.quote_group_id\
      \ = quote_groups.id\n    JOIN {{ ref('silver_organizations') }} AS organizations\
      \ ON quote_groups.organization_id = organizations.id\n    LEFT JOIN {{ ref('silver_provider_purchase_orders')\
      \ }} AS provider_purchase_orders ON proposals.id = provider_purchase_orders.proposal_id\n\
      \    LEFT JOIN {{ ref('silver_customer_purchase_orders') }} AS customer_purchase_orders\
      \ ON provider_purchase_orders.customer_purchase_order_id = customer_purchase_orders.id\
      \ AND customer_purchase_orders.last_computed_invoice_status <> 'Obsoleted'\n\
      \    LEFT JOIN (\n        SELECT\n            id,\n            array_agg(certification_name)\
      \ certification_names,\n            array_agg(certification_categories::text)\
      \ certification_categories,\n            array_agg(certification_name) FILTER\
      \ (WHERE certification_categories::text like '%Sustainability%') sustainability_certifications,\n\
      \            array_agg(certification_name) FILTER (WHERE certification_categories::text\
      \ like '%diversity%') diversity_certifications,\n            array_agg(certification_name)\
      \ FILTER (WHERE certification_categories::text like '%COMPLi Related%') compli_certifications,\n\
      \            array_agg(certification_name) FILTER (WHERE certification_categories::text\
      \ like '%is_popular%') popular_certifications,\n            array_agg(certification_name)\
      \ FILTER (WHERE certification_categories::text like '%is_iso%') iso_certifications,\n\
      \            CASE WHEN true = ANY(array_agg(DISTINCT is_sustainable)) THEN TRUE\
      \ ELSE FALSE END is_sustainable,\n            CASE WHEN true = ANY(array_agg(DISTINCT\
      \ is_diverse)) THEN TRUE ELSE FALSE END  is_diverse,\n            CASE WHEN\
      \ true = ANY(array_agg(DISTINCT is_compli_related)) THEN TRUE ELSE FALSE END\
      \  is_compli_related,\n            CASE WHEN true = ANY(array_agg(DISTINCT is_popular))\
      \ THEN TRUE ELSE FALSE END  is_popular,\n            CASE WHEN true = ANY(array_agg(DISTINCT\
      \ is_iso)) THEN TRUE ELSE FALSE END  is_iso\n        FROM {{ ref('silver_provider_certifications')\
      \ }}\n        GROUP BY id\n      ) provider_certifications ON provider_certifications.id\
      \ = quoted_wares.provider_id\n      LEFT JOIN {{ ref('silver_request_compliance_manifests')\
      \ }} AS request_compliance_manifests ON request_compliance_manifests.quote_group_pg_id=quote_groups.id\n\
      \      AND request_compliance_manifests.row_partition_request_compliance_manifest=1\n\
      \      LEFT JOIN {{ ref('silver_provider_badges') }} AS provider_badges ON quote_groups.organization_id\
      \ = provider_badges.organization_id AND quoted_wares.provider_id = provider_badges.provider_id\n\
      \      WHERE NOT (proposals.obsoleted = true AND provider_purchase_orders.id\
      \ IS NULL) AND quoted_wares.status !='Cancelled'\n)\n\nSELECT * FROM transformed_data\n"
  gold_rfi_report:
