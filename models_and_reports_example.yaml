      ]}\n  ])\n}}\n\nSELECT\n  default_values.*,\n  organizations.lft,\n  organizations.rgt,\n\
      \  organizations.depth\nFROM {{ ref('bronze_default_values') }} AS default_values\n\
      JOIN {{ ref('bronze_organizations') }} AS organizations\n  ON default_values.organization_id::int\
