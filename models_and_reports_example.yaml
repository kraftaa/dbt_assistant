      \    , proposal_wholesale_subtotal_price/c.conversion_rate proposal_wholesale_subtotal_price_usd\n\
      \    , table1.rt_wdays\n    , table2.rt_qw_first_sow_wdays\n    , qg_purchase_justifications\n\
      \    , qg_min_sow_wholesale_total_price_usd\n    , qg_avg_sow_wholesale_total_price_usd\n\
      \    , qg_distinct_provider_sows, qg_distinct_provider_proposals\n    -- , organizations_parents.parent_id\
      \ parent_organization_id\n    , m_final_parent_id.final_parent_id parent_organization_id\n\
      \    , qg_responses, qg_proposals, qg_sows, qg_declines, qg_orders_won, qg_provider_purchase_orders\n\
      \    , qg_proposal_count, qg_sow_count\n    , savings_avg_proposal_retail_total_price_notax_usd\n\
      \    , CASE WHEN (cpo_po_created_at = qg_first_po_date AND qg_distinct_provider_proposals\
      \ > 1 AND savings_avg_proposal_retail_total_price_notax_usd - (cpo_retail_total_price_usd\
      \ - cpo_retail_tax_usd) >0 AND cpo_id IS NOT NULL) THEN savings_avg_proposal_retail_total_price_notax_usd\
      \ - (cpo_retail_total_price_usd - cpo_retail_tax_usd) ELSE 0 END savings_usd\n\
      \    , CASE WHEN (cpo_po_created_at = qg_first_po_date AND qg_distinct_provider_proposals\
      \ > 1 AND savings_avg_proposal_retail_total_price_notax_usd - (cpo_retail_total_price_usd\
      \ - cpo_retail_tax_usd) > 0 AND cpo_id IS NOT NULL) THEN 0\n           WHEN\
      \ savings_avg_proposal_retail_total_price_notax_usd - (cpo_retail_total_price_usd\
      \ - cpo_retail_tax_usd) > 0 AND qg_distinct_provider_proposals > 1 THEN savings_avg_proposal_retail_total_price_notax_usd\
      \ - (cpo_retail_total_price_usd - cpo_retail_tax_usd) ELSE 0 END missed_savings_usd\n\
      \    FROM {{ref('m_marketplace_transactions') }} m_marketplace_transactions\n\
      \    LEFT JOIN (SELECT\n            id, contacted_at, first_response_date\n\
      \            , CASE WHEN date(first_response_date) = date(contacted_at) THEN\
      \ 0\n          WHEN count(*) = 1 THEN 1 ELSE count(*)-1 END rt_wdays\n     \
      \       FROM\n            (SELECT\n              id\n            , first_response_date\n\
      \            , contacted_at\n            FROM\n              {{ref('m_marketplace_transactions')\
      \ }}) alias\n            cross join generate_series(date(contacted_at), date(first_response_date),\
      \ interval '1 day') gs(dt)\n            where (extract(isodow from dt) < 6 AND\
      \ (extract(isodow from first_response_date)<6 OR extract(isodow from contacted_at)<6))\n\
      \            OR\n              (extract(isodow from dt) >= 6 AND extract(isodow\
      \ from first_response_date)>=6 AND extract(isodow from contacted_at) >= 6\n\
      \              AND abs(date_part('day', first_response_date) - date_part('day',\
      \ contacted_at)) < 2)\n            group by id, contacted_at, first_response_date)\
      \ table1 ON\n    m_marketplace_transactions.id  = table1.id\n    LEFT JOIN (SELECT\n\
      \            id, contacted_at, qw_first_sow\n            , CASE WHEN date(qw_first_sow)\
      \ = date(contacted_at) THEN 0\n          WHEN count(*) = 1 THEN 1 ELSE count(*)-1\
      \ END rt_qw_first_sow_wdays\n            FROM\n            (SELECT\n       \
      \       id\n            , qw_first_sow\n            , contacted_at\n       \
      \     FROM\n               {{ref('m_marketplace_transactions') }} ) alias\n\
      \            cross join generate_series(date(contacted_at), date(qw_first_sow),\
      \ interval '1 day') gs(dt)\n            where (extract(isodow from dt) < 6 AND\
      \ (extract(isodow from qw_first_sow)<6 OR extract(isodow from contacted_at)<6))\n\
      \            OR\n              (extract(isodow from dt) >= 6 AND extract(isodow\
      \ from qw_first_sow)>=6 AND extract(isodow from contacted_at) >= 6\n       \
      \       AND abs(date_part('day', qw_first_sow) - date_part('day', contacted_at))\
      \ < 2)\n            group by id, contacted_at, qw_first_sow) table2 ON\n   \
      \ m_marketplace_transactions.id  = table2.id\n    LEFT JOIN (SELECT\n    quote_group_id\n\
      \    , sum(case when qw_row_partition = 1 THEN qw_respond_yn else 0 end) qg_responses\n\
      \    , sum(case when qw_row_partition = 1 THEN qw_proposal_yn else 0 end) qg_proposals\n\
      \    , sum(case when qw_row_partition = 1 THEN qw_proposal_count else 0 end)\
      \ qg_proposal_count\n    , sum(case when qw_row_partition = 1 THEN qw_sow_yn\
      \ else 0 end) qg_sows\n    , sum(case when qw_row_partition = 1 THEN qw_sow_count\
      \ else 0 end) qg_sow_count\n    , sum(case when qw_row_partition = 1 THEN declined_yn\
      \ else 0 end) qg_declines\n    , sum(case when qw_row_partition = 1 THEN won_order_yn\
      \ else 0 end) qg_orders_won\n    , count(distinct ppo_id) qg_provider_purchase_orders\n\
      \    FROM\n     {{ref('m_marketplace_transactions') }}\n    GROUP by quote_group_id)\
      \ qg_ratios ON (m_marketplace_transactions.quote_group_id = qg_ratios.quote_group_id)\n\
      \    LEFT JOIN {{ source('public', 'currencies') }} c ON (m_marketplace_transactions.proposal_id\
      \ = c.exchangable_id AND c.exchangable_type = 'Pg::ProposalBase')\n    LEFT\
      \ JOIN {{ref('m_final_parent_id') }} m_final_parent_id ON (m_marketplace_transactions.qg_organization_id\
      \ = m_final_parent_id.id)) table1\n)\n\nselect * from transformed_data"
