  silver_quoted_wares:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_quoted_wares.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      id\"]},\n    {\"columns\": [\"provider_id\"]},\n    {\"columns\": [\"quote_group_id\"\
      ]},\n    {\"columns\": [\"organization_id\"]},\n    {\"columns\": [\"uuid\"\
      ]},\n    {\"columns\": [\"status\"]},\n    {\"columns\": [\"supplier_legal_document_id\"\
      ]},\n    {\"columns\": [\"created_at\"]},\n    {\"columns\": [\"updated_at\"\
      ]},\n    {\"columns\": [\"first_proposal_id\"]}\n  ])\n}}\n\n-- number of unique\
      \ suppliers contacted by each the quote group\nWITH suppliers_contacted_by_quote_group\
      \ AS (\n  SELECT\n      quoted_wares.quote_group_id,\n      COUNT(DISTINCT quoted_wares.provider_id)\
      \ AS suppliers_contacted_by_quote_group\n  FROM {{ ref('bronze_quoted_wares')\
      \ }} as quoted_wares\n  JOIN (SELECT quoted_ware_pg_id FROM {{ ref('bronze_proposals')\
      \ }}) as proposals ON proposals.quoted_ware_pg_id = quoted_wares.id\n  JOIN\
      \ (SELECT id FROM {{ ref('silver_providers') }}) as providers ON providers.id\
      \ = quoted_wares.provider_id\n  WHERE quoted_wares.sent IS TRUE\n  GROUP BY\n\
      \    quoted_wares.quote_group_id\n),\n\n-- number of unique suppliers contacted\
      \ by each organization\nsuppliers_contacted_by_organization AS (\n  SELECT\n\
      \      quote_groups.organization_id,\n      COUNT(DISTINCT quoted_wares.provider_id)\
      \ AS suppliers_contacted_by_organization\n  FROM {{ ref('bronze_quoted_wares')\
      \ }} as quoted_wares\n  JOIN (SELECT quoted_ware_pg_id FROM {{ ref('bronze_proposals')\
      \ }}) as proposals ON proposals.quoted_ware_pg_id = quoted_wares.id\n  JOIN\
      \ (SELECT id, organization_id FROM {{ ref('silver_quote_groups') }}) as quote_groups\
      \ ON quoted_wares.quote_group_id = quote_groups.id\n  JOIN (SELECT id FROM {{\
      \ ref('silver_providers') }}) as providers ON providers.id = quoted_wares.provider_id\n\
      \  WHERE quoted_wares.sent IS TRUE\n  GROUP BY\n      quote_groups.organization_id\n\
      ),\n\ntransformed_data AS (\n  SELECT\n    quoted_ware.id AS id,\n    quoted_ware.provider_id\
      \ AS provider_id,\n    provider.name AS provider_name,\n    quoted_ware.quote_group_id\
      \ AS quote_group_id,\n    quote_group.name AS quote_group_name,\n    quote_group.organization_id\
      \ AS organization_id,\n    quote_group.organization_name AS organization_name,\n\
      \    quote_group.primary_discipline_id AS primary_discipline_id,\n    quote_group.primary_discipline_name\
      \ AS primary_discipline_name,\n    quote_group.primary_category_id AS primary_category_id,\n\
      \    quote_group.primary_category_name AS primary_category_name,\n    quote_group.primary_subcategory_id\
      \ AS primary_subcategory_id,\n    quote_group.primary_subcategory_name AS primary_subcategory_name,\n\
      \    quote_group.uuid AS quote_group_uuid,\n    quote_group.ware_id AS ware_id,\n\
      \    quote_group.ware_name AS ware_name,\n    quote_group.user_id AS quote_group_user_id,\n\
      \    quote_group.user_email AS quote_group_user_email,\n    quoted_ware.uuid\
      \ AS uuid,\n    quoted_ware.last_computed_status AS status,\n    quoted_ware.direct_billing\
      \ AS direct_billing,\n    quoted_ware.supplier_legal_document_id AS supplier_legal_document_id,\n\
      \    quoted_ware.created_at AS created_at,\n    quoted_ware.updated_at AS updated_at,\n\
      \    vendor_reviewed_at.date AS vendor_reviewed_at,\n    first_proposal.id AS\
      \ first_proposal_id,\n    quoted_ware.preferred AS preferred,\n    quoted_ware.advantage_plan\
      \ AS advantage_plan,\n    quoted_ware.consolidated_billing AS consolidated_billing,\n\
      \    quoted_ware.sent AS sent,\n    CASE\n        WHEN quoted_ware.consolidated_billing\
      \ = FALSE THEN 'direct'\n        WHEN quoted_ware.preferred = TRUE THEN 'preferred'\n\
      \        WHEN quoted_ware.consolidated_billing = TRUE AND quoted_ware.preferred\
      \ = FALSE THEN 'tail'\n        ELSE NULL\n    END AS spending_category,\n  \
      \  COUNT(proposals.id) AS proposal_count,\n    COUNT(CASE WHEN proposals.proposal_type\
      \ = 'SOW' THEN proposals.id END) AS sow_count,\n    suppliers_contacted_by_quote_group.suppliers_contacted_by_quote_group,\n\
      \    suppliers_contacted_by_organization.suppliers_contacted_by_organization,\n\
      \    quote_group.storefront_url || '#quoted_ware-' || quoted_ware.uuid AS storefront_url,\n\
      \    'https://backoffice.scientist.com/quoted_wares/' || quoted_ware.uuid AS\
      \ backoffice_url\n  FROM {{ ref('bronze_quoted_wares') }} AS quoted_ware\n \
      \   JOIN {{ ref('silver_quote_groups') }} AS quote_group ON quoted_ware.quote_group_id\
      \ = quote_group.id\n    JOIN {{ ref('silver_providers') }} AS provider ON quoted_ware.provider_id\
      \ = provider.id\n    LEFT JOIN {{ ref('bronze_timepoints') }} AS vendor_reviewed_at\n\
      \      ON quoted_ware.id = vendor_reviewed_at.quoted_ware_id\n        AND vendor_reviewed_at.name\
      \ = 'Vendor review date'\n    LEFT JOIN LATERAL (\n      SELECT inner_proposal.id\
      \ AS id\n      FROM {{ ref('bronze_proposals') }} AS inner_proposal\n      WHERE\
      \ inner_proposal.quoted_ware_pg_id = quoted_ware.id\n        AND inner_proposal.draft\
      \ IS NOT true\n      ORDER BY inner_proposal.created_at ASC\n      LIMIT 1\n\
      \    ) AS first_proposal ON true\n    LEFT JOIN {{ ref('bronze_proposals') }}\
      \ AS proposals ON proposals.quoted_ware_pg_id = quoted_ware.id\n    LEFT JOIN\
      \ suppliers_contacted_by_quote_group ON suppliers_contacted_by_quote_group.quote_group_id\
      \ = quoted_ware.quote_group_id\n    LEFT JOIN suppliers_contacted_by_organization\
      \ ON suppliers_contacted_by_organization.organization_id = quote_group.organization_id\n\
      \    GROUP BY\n    quoted_ware.id,\n    quoted_ware.provider_id,\n    provider.name,\n\
      \    quoted_ware.quote_group_id,\n    quote_group.name,\n    quote_group.organization_id,\n\
      \    quote_group.organization_name,\n    quote_group.primary_discipline_id,\n\
      \    quote_group.primary_discipline_name,\n    quote_group.primary_category_id,\n\
      \    quote_group.primary_category_name,\n    quote_group.primary_subcategory_id,\n\
      \    quote_group.primary_subcategory_name,\n    quote_group.user_email,\n  \
      \  quote_group.user_id,\n    quote_group.uuid,\n    quote_group.ware_id,\n \
      \   quote_group.ware_name,\n    quoted_ware.uuid,\n    quoted_ware.last_computed_status,\n\
      \    quoted_ware.direct_billing,\n    quoted_ware.supplier_legal_document_id,\n\
      \    quoted_ware.created_at,\n    quoted_ware.updated_at,\n    vendor_reviewed_at.date,\n\
      \    first_proposal.id,\n    quoted_ware.preferred,\n    quoted_ware.advantage_plan,\n\
      \    quoted_ware.consolidated_billing,\n    quoted_ware.sent,\n    spending_category,\n\
      \    backoffice_url,\n    storefront_url,\n    suppliers_contacted_by_quote_group.suppliers_contacted_by_quote_group,\n\
      \    suppliers_contacted_by_organization.suppliers_contacted_by_organization\n\
      )\n\nSELECT * FROM transformed_data\n"
  silver_providers:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_providers.sql
    sql: "{{ config(materialized=\"table\") }}\n\nWITH transformed_data AS (\n  SELECT\
      \  providers.id AS id,\n          providers.name AS name,\n          providers.created_at\
      \ AS created_at,\n          providers.updated_at AS updated_at,\n          providers.contact_emails\
      \ AS contact_emails,\n          providers.sales_email AS sales_email,\n    \
      \      providers.phone_number AS phone_number,\n          (\n            SELECT\
      \ legal_entities.companyname\n            FROM {{ ref('bronze_legal_entities')\
      \ }} AS legal_entities\n            WHERE legal_entities.scientist_entity_type\
      \ = 'Pg::Provider'\n              AND legal_entities.scientist_entity_id = providers.id\n\
      \            LIMIT 1\n          ) AS legal_entity_name,\n          ( SELECT\
      \ provider_settings.instaquote\n            FROM {{ ref('bronze_provider_settings')}}\
      \ AS provider_settings\n            WHERE provider_settings.provider_id = providers.id\n\
      \            LIMIT 1\n          ) AS instaquote\n  FROM {{ ref('bronze_providers')\
      \ }} AS providers\n  WHERE providers.name NOT ILIKE '%[demo]%' OR providers.name\
      \ IS NULL\n)\n\nSELECT * FROM transformed_data"
  silver_provider_purchase_order_shipping_address:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_provider_purchase_order_shipping_address.sql
    sql: "{{ config(\n  materialized=\"view\",\n  )\n}}\n\nWITH provider_shipping_address\
      \ AS (\n    SELECT\n        id,\n        TRIM(\n          COALESCE(organization_name,\
      \ '') || ' ' ||\n          COALESCE(street, '') || ' ' ||\n          COALESCE(city,\
      \ '') || ' ' ||\n          COALESCE(state, '') || ' ' ||\n          COALESCE(zipcode,\
      \ '') || ' ' ||\n          COALESCE(country, '')\n        ) AS provider_shipping_address,\n\
      \        country AS provider_shipping_country,\n        state AS provider_shipping_state,\n\
      \        addressable_id,\n        addressable_type,\n        ROW_NUMBER() OVER\
      \ (\n              PARTITION BY addressable_id\n              ORDER BY created_at\
      \ DESC\n              ) AS row_num\n    FROM {{ ref('bronze_addresses') }}\n\
      \    WHERE type = 'Pg::ProviderShippingAddress' AND addressable_type = 'Pg::PurchaseOrderBase'\n\
      )\n\nSELECT * FROM provider_shipping_address"
  silver_predicted_revenues_daily:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_predicted_revenues_daily.sql
    sql: "{{ config(\n  materialized=\"view\",\n)\n}}\n\nWITH dates AS (\n  SELECT\n\
      \    GENERATE_SERIES(\n      CURRENT_DATE,\n      CURRENT_DATE + INTERVAL '180\
      \ days',\n      INTERVAL '1 day'\n    )::DATE AS date\n),\nrecognized_revenue\
      \ AS (\n  SELECT\n    purchase_order_id,\n    SUM(gross_recognized_usd) AS total_recognized_usd\n\
      \  FROM\n    {{ ref('silver_gross_revenues_daily') }}\n  GROUP BY\n    purchase_order_id\n\
      ),\ntransformed_data AS (\n  SELECT\n    dates.date,\n    purchase_orders.id\
      \ AS purchase_order_id,\n    CASE\n      WHEN dates.date < CURRENT_DATE THEN\
      \ 0\n      WHEN dates.date > purchase_orders.latest_predicted_fully_invoiced_at\
      \ THEN 0\n      ELSE (\n        COALESCE(purchase_orders.latest_predicted_fully_invoiced_amount_usd,\
      \ purchase_orders.invoiced_subtotal_usd + purchase_orders.invoiced_shipping_usd,\
      \ 0) - COALESCE(recognized_revenue.total_recognized_usd, 0)\n      ) / NULLIF(\n\
      \        EXTRACT(DAY FROM purchase_orders.latest_predicted_fully_invoiced_at\
      \ - CURRENT_DATE) + 1, 0\n      )\n    END AS predicted_revenue_usd\n  FROM\n\
      \    {{ ref('silver_customer_purchase_orders') }} AS purchase_orders\n  CROSS\
      \ JOIN dates\n  LEFT JOIN recognized_revenue\n    ON purchase_orders.id = recognized_revenue.purchase_order_id\n\
      \  WHERE\n    purchase_orders.fully_recognized_at IS NULL\n    AND purchase_orders.latest_predicted_fully_invoiced_at\
      \ IS NOT NULL\n    AND purchase_orders.latest_predicted_fully_invoiced_amount_usd\
      \ IS NOT NULL\n)\n\nSELECT * FROM transformed_data"
  silver_dynamic_form_attachments_quote_group_form:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_dynamic_form_attachments_quote_group_form.sql
    sql: "{{ config(\n  materialized = 'table',\n  indexes = [\n    {'columns': ['id']},\n\
      \    {'columns': ['dynamic_formable_id']},\n    {'columns': ['dynamic_formable_type']}\n\
      \  ]\n) }}\n\nWITH transformed_data AS (\n\n  WITH recursive json_tree AS (\n\
      \n    SELECT\n      dynamic_form_attachments.id,\n      dynamic_form_attachments.dynamic_formable_id,\n\
      \      dynamic_form_attachments.dynamic_formable_type,\n      dynamic_form_attachments.created_at,\n\
      \      dynamic_form_attachments.updated_at,\n      kv.key AS path_key,\n   \
      \   kv.value AS path_value,\n      kv.key AS full_key,\n      0 AS level\n \
      \   FROM {{ ref('bronze_dynamic_form_attachments') }} dynamic_form_attachments,\n\
      \         jsonb_each(dynamic_form_attachments.data::jsonb) kv\n    WHERE dynamic_form_attachments.dynamic_formable_type\
      \ = 'Pg::QuoteGroup'\n\n    UNION ALL\n\n    -- Recursive: dive deeper into\
      \ nested objects\n    SELECT\n      jt.id,\n      jt.dynamic_formable_id,\n\
      \      jt.dynamic_formable_type,\n      jt.created_at,\n      jt.updated_at,\n\
      \      kv.key,\n      kv.value,\n      concat(jt.full_key, '->', kv.key) AS\
      \ full_key,\n      jt.level + 1\n    FROM json_tree jt,\n         jsonb_each(jt.path_value)\
      \ kv\n    WHERE jsonb_typeof(jt.path_value) = 'object'\n\n  )\n\n  SELECT DISTINCT\n\
      \    id,\n    dynamic_formable_id,\n    dynamic_formable_type,\n    created_at,\n\
      \    updated_at,\n    full_key,\n    REPLACE(full_key,' ','') AS cleaned_key,\n\
      \    path_value AS final_value\n  FROM json_tree\n  WHERE jsonb_typeof(path_value)\
      \ != 'object'\n  ORDER BY id, full_key\n\n)\n\nSELECT * FROM transformed_data\n"
  silver_formpage_form:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_formpage_form.sql
    sql: "{{ config(\n  materialized=\"view\"\n  )\n}}\n\nWITH transformed_data AS\
      \ (\n  SELECT\n    dynamic_form_attachments.dynamic_formable_id,\n    dynamic_form_attachments.data\
      \ AS form_data\n  FROM {{ ref('bronze_dynamic_form_attachments')}} AS dynamic_form_attachments\n\
      \  WHERE dynamic_form_attachments.dynamic_formable_type='Pg::FormPage'\n)\n\
      SELECT * FROM transformed_data\n"
  silver_quoted_ware_provider_notes:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_quoted_ware_provider_notes.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      quoted_ware_id\"]},\n  ])\n}}\n\nWITH transformed_data AS (\n    SELECT\n  \
      \      quoted_ware_id,\n        MIN(created_at) AS first_provider_note,\n  \
      \      COUNT(provider_note) FILTER(WHERE provider_note IS TRUE ) provider_note_count\n\
      \    FROM (\n        SELECT\n        notes_quoted_wares.quoted_ware_id,\n  \
      \      notes.created_at,\n        CASE\n            WHEN notes.origin_organization_id\
      \ = 175 AND notes.title <> 'Quote Declined'\n            AND notes.title <>\
      \ 'Request Updated' AND notes.title  <> 'Request Cancelled'\n            AND\
      \  notes.title <> 'Purchase Order Work in Progress' THEN True\n        ELSE\n\
      \            False\n        END AS provider_note\n    FROM {{ ref('bronze_notes')\
      \ }} notes\n    JOIN {{ ref('bronze_notes_quoted_wares') }}  notes_quoted_wares\
      \ on notes.id=notes_quoted_wares.note_id\n    WHERE\n        notes.backoffice_internal\
      \ IS FALSE\n        AND notes.deleted IS NOT TRUE\n        AND notes.hidden\
      \ IS NOT TRUE\n    ) provider_note\n    GROUP BY quoted_ware_id\n)\n\nSELECT\
      \ * FROM transformed_data"
  silver_revenues_daily:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_revenues_daily.sql
    sql: "{{ config(\n  materialized=\"view\",\n)\n}}\n\nWITH transformed_data AS\
      \ (\nSELECT\n  COALESCE(gross_revenues.date, net_revenues.date, gmv.date, invoice_revenues.date,\
      \ predicted_revenues.date) AS date,\n  COALESCE(gross_revenues.purchase_order_id,\
      \ net_revenues.purchase_order_id, gmv.purchase_order_id, invoice_revenues.purchase_order_id,\
      \ predicted_revenues.purchase_order_id) AS purchase_order_id,\n  invoice_revenues.invoiced_retail_subtotal_price_usd\
      \ AS invoiced_usd,\n  gross_revenues.gross_recognized_usd,\n  gross_revenues.gross_reserve_usd,\n\
      \  gross_revenues.gross_revenue_usd,\n  net_revenues.net_recognized_usd,\n \
      \ gmv.gmv_usd,\n  predicted_revenues.predicted_revenue_usd\nFROM {{ ref('silver_gross_revenues_daily')\
      \ }} AS gross_revenues\nFULL OUTER JOIN {{ ref('silver_net_revenues_daily')\
      \ }} AS net_revenues\n  ON  gross_revenues.date = net_revenues.date\n  AND gross_revenues.purchase_order_id\
      \ = net_revenues.purchase_order_id\nFULL OUTER JOIN {{ ref('silver_gmv_daily')\
      \ }} AS gmv\n  ON  gross_revenues.date = gmv.date\n  AND gross_revenues.purchase_order_id\
      \ = gmv.purchase_order_id\nFULL OUTER JOIN {{ ref('silver_invoice_revenues_daily')\
      \ }} AS invoice_revenues\n  ON  gross_revenues.date = invoice_revenues.date\n\
      \  AND gross_revenues.purchase_order_id = invoice_revenues.purchase_order_id\n\
      FULL OUTER JOIN {{ ref('silver_predicted_revenues_daily') }} AS predicted_revenues\n\
      \  ON  COALESCE(gross_revenues.date, net_revenues.date, gmv.date) = predicted_revenues.date\n\
      \  AND COALESCE(gross_revenues.purchase_order_id, net_revenues.purchase_order_id,\
      \ gmv.purchase_order_id) = predicted_revenues.purchase_order_id\nORDER BY\n\
      \  COALESCE(gross_revenues.date, net_revenues.date, gmv.date, predicted_revenues.date),\n\
      \  COALESCE(gross_revenues.purchase_order_id, net_revenues.purchase_order_id,\
      \ gmv.purchase_order_id, predicted_revenues.purchase_order_id)\n)\n\nSELECT\
      \ * FROM transformed_data"
  silver_negotiated_quote_groups:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_negotiated_quote_groups.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      quote_group_id\"]}\n  ]\n)\n}}\n\nWITH transformed_data AS (\n  SELECT DISTINCT\
      \ ON (notes.quote_group_id) -- DISTINCT ON is used to ensure that we only get\
      \ the earliest note for each quote group\n    notes.quote_group_id,     \n \
      \   notes.created_at AS earliest_negotiate_date,\n    notes.negotiate_note,\n\
      \    notes.user_id\n  FROM {{ ref('bronze_notes') }} AS notes\n  WHERE notes.negotiate_note\
      \ IS true\n    AND notes.quote_group_id IS NOT NULL\n  ORDER BY notes.quote_group_id,\
      \ notes.created_at ASC\n)\n\nSELECT * FROM transformed_data"
  silver_invoice_revenues_daily:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_invoice_revenues_daily.sql
    sql: "{{ config(\n  materialized=\"view\",\n)\n}}\n\nSELECT\n  invoices.created_at::date\
      \ AS date,\n  invoices.purchase_order_id,\n  SUM(invoices.retail_subtotal_price_usd)\
      \ AS invoiced_retail_subtotal_price_usd,\n  SUM(invoices.wholesale_subtotal_price_usd)\
      \ AS invoiced_wholesale_subtotal_price_usd,\n  SUM(invoices.shipping_cost_usd)\
      \ AS invoiced_shipping_cost_usd,\n  SUM(invoices.tax_amount_usd) AS invoiced_tax_amount_usd\n\
      FROM \n  {{ ref('silver_invoices') }} AS invoices,\n  {{ ref('silver_customer_purchase_orders')\
      \ }} AS customer_purchase_orders\nWHERE \n  invoices.purchase_order_id = customer_purchase_orders.id\n\
      GROUP BY \n  invoices.created_at::date, invoices.purchase_order_id"
  silver_dynamic_forms:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_dynamic_forms.sql
    sql: "{{ config(\n    materialized='table',\n    indexes=[\n        {\"columns\"\
      : [\"id\"]},\n        {\"columns\": [\"version_number\"]},\n        {\"columns\"\
      : [\"slug\"]}\n      ])\n}}\n\nWITH transformed_data AS (\n    WITH RECURSIVE\n\
      \    -- loading df once with both options and schema\n    form_data AS (\n \
      \       SELECT\n            id,\n            slug,\n            version_number,\n\
      \            schema,\n            options,\n            created_at,\n      \
      \      updated_at\n        FROM {{ ref('bronze_dynamic_forms') }}\n    ),\n\n\
      \    -- json tree extractions for both options and schema\n    all_json AS (\n\
      \    -- extract from schema\n        SELECT\n            id,\n            slug,\n\
      \            version_number,\n            created_at,\n            updated_at,\n\
      \            'root' AS path,\n            key,\n            value,\n       \
      \     'schema' AS source\n        FROM form_data, jsonb_each(schema::jsonb)\n\
      \n        UNION ALL\n    -- extract from options\n        SELECT\n         \
      \   id,\n            slug,\n            version_number,\n            created_at,\n\
      \            updated_at,\n            'root' AS path,\n            key,\n  \
      \          value,\n            'options' AS source\n        FROM form_data,\
      \ jsonb_each(options::jsonb)\n    ),\n\n    json_tree AS (\n       -- add recursion\
      \ depth limit for safety\n       SELECT *, 1 AS depth FROM all_json\n\n    \
      \    UNION ALL\n        -- recursive case: nested objects/keys\n        SELECT\n\
      \            tree_data.id,\n            tree_data.slug,\n            tree_data.version_number,\n\
      \            tree_data.created_at,\n            tree_data.updated_at,\n    \
      \        tree_data.path || '->' || tree_data.key AS path,\n            key_value_pairs.key,\n\
      \            key_value_pairs.value,\n            tree_data.source,\n       \
      \     tree_data.depth + 1 AS depth\n        FROM json_tree tree_data, jsonb_each(tree_data.value)\
      \ AS key_value_pairs\n        WHERE jsonb_typeof(tree_data.value) = 'object'\n\
      \        AND tree_data.depth < 5  -- limit recursion depth\n    ),\n\n    cleaned_keys\
      \ AS (\n        SELECT\n            *,\n            regexp_replace(\n      \
      \          regexp_replace(\n                    regexp_replace(\n          \
      \              regexp_replace(\n                            regexp_replace(path\
      \ || '->' || key, 'root->', '', 'g'),\n                            'properties->',\
      \ '', 'g'),\n                        'fields->', '', 'g'),\n               \
      \     '->rightLabel', '', 'g'),\n                '->\"?type\"?', '', 'g'\n \
      \           ) AS cleaned_path,            -- removes common prefixes from schema\
      \ and options\n\n            replace(\n              regexp_replace(\n     \
      \           regexp_replace(path || '->' || key,\n                    '^(root|properties|fields)->',\
      \ ''),\n                '(^|->)(properties|fields|items)(->)?', '', 'g'\n  \
      \            ),\n              '->',\n              '_'\n            ) AS fallback_key\n\
      \          FROM json_tree\n    )\n\n    -- cleaned output\n    SELECT\n    \
      \    id,\n        slug,\n        version_number,\n        created_at,\n    \
      \    updated_at,\n        cleaned_path AS key,\n--      COALESCE(value->>'title',\
      \ value->>'rightLabel') AS full_title,\n        COALESCE\n        (\n      \
      \      NULLIF(value->>'title', ''),\n            NULLIF(value->>'rightLabel',\
      \ ''),\n--            regexp_replace(path || '->' || key, '^.*->', '')  -- fallback:\
      \ extract last key segment\n            fallback_key  -- combine for those whose\
      \ title is ''\n        ) AS full_title,\n        value->>'title' AS title,\n\
      \        value->>'rightLabel' AS rightLabel\n    FROM cleaned_keys\n    WHERE\
      \ value->>'title' IS NOT NULL OR value->>'rightLabel' IS NOT NULL  -- contains\
      \ either title or rightLabel\n    ORDER BY id, key\n)\nSELECT * FROM transformed_data"
  silver_provider_purchase_orders:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_provider_purchase_orders.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      id\"]},\n    {\"columns\": [\"uuid\"]},\n    {\"columns\": [\"provider_id\"\
      ]},\n    {\"columns\": [\"quoted_ware_id\"]},\n    {\"columns\": [\"quote_group_id\"\
      ]},\n    {\"columns\": [\"organization_id\"]},\n    {\"columns\": [\"proposal_id\"\
      ]}\n  ])\n}}\n\nWITH milestone_totals AS (\n  SELECT\n    itemizable_id AS purchase_order_id,\n\
      \    SUM(base_subtotal_price) AS total_base_subtotal,\n    SUM(list_subtotal_price)\
      \ AS total_list_subtotal\n  FROM {{ ref('bronze_milestones') }}\n  WHERE itemizable_type\
      \ = 'Pg::PurchaseOrderBase'\n  GROUP BY itemizable_id\n),\n\nfee_cap_milestones\
      \ AS (\n  SELECT\n    itemizable_id AS purchase_order_id,\n    SUM(wholesale_subtotal_price)\
      \ AS fee_cap_amount\n  FROM {{ ref('bronze_milestones') }}\n  WHERE itemizable_type\
      \ = 'Pg::PurchaseOrderBase'\n    AND commission_fee_item = True\n  GROUP BY\
      \ itemizable_id\n),\n\ntransformed_data AS (\n  SELECT\n    purchase_orders.id\
      \ AS id,\n    purchase_orders.uuid AS uuid,\n    purchase_orders.parent_purchase_order_id\
      \ AS parent_purchase_order_id,\n    purchase_orders.customer_purchase_order_id\
      \ AS customer_purchase_order_id,\n    purchase_orders.accepted AS accepted,\n\
      \    purchase_orders.completed AS completed,\n    purchase_orders.rejected AS\
      \ rejected,\n    purchase_orders.provider_pg_id AS provider_id,\n    -- Savings\
      \ columns\n    purchase_orders.fee_assignment_savings_computed / currencies.conversion_rate\
      \ AS fee_assignment_savings_computed_usd,\n    purchase_orders.fee_assignment_savings_override\
      \ / currencies.conversion_rate AS fee_assignment_savings_override_usd,\n   \
      \ purchase_orders.fee_cap_savings_computed / currencies.conversion_rate AS fee_cap_savings_computed_usd,\n\
      \    purchase_orders.fee_cap_savings_override / currencies.conversion_rate AS\
      \ fee_cap_savings_override_usd,\n    purchase_orders.negotiated_savings_computed_usd\
      \ AS negotiated_savings_computed_usd,\n    purchase_orders.negotiated_savings_override_usd\
      \ AS negotiated_savings_override_usd,\n    purchase_orders.rate_card_savings_computed\
      \ / currencies.conversion_rate AS rate_card_savings_computed_usd,\n    purchase_orders.rate_card_savings_override\
      \ / currencies.conversion_rate AS rate_card_savings_override_usd,\n    purchase_orders.discount_savings_computed\
      \ / currencies.conversion_rate AS discount_savings_computed_usd,\n    purchase_orders.discount_savings_override\
      \ / currencies.conversion_rate AS discount_savings_override_usd,\n    purchase_orders.competitive_savings_inclusive_computed_usd\
      \ AS competitive_savings_inclusive_computed_usd,\n    purchase_orders.competitive_savings_inclusive_override_usd\
      \ AS competitive_savings_inclusive_override_usd,\n    purchase_orders.competitive_savings_exclusive_computed_usd\
      \ AS competitive_savings_exclusive_computed_usd,\n    purchase_orders.competitive_savings_exclusive_override_usd\
      \ AS competitive_savings_exclusive_override_usd,\n    purchase_orders.missed_savings_computed_usd\
      \ AS missed_savings_computed_usd,\n    purchase_orders.missed_savings_override_usd\
      \ AS missed_savings_override_usd,\n    purchase_orders.savings_updated_by_id\
      \ AS savings_updated_by_id,\n    purchase_orders.savings_updated_at AS savings_updated_at,\n\
      \    purchase_orders.savings_updated_reason AS savings_updated_reason,\n   \
      \ providers.name AS provider_name,\n    purchase_orders.quote_group_pg_id AS\
      \ quote_group_id,\n    purchase_orders.quoted_ware_pg_id AS quoted_ware_id,\n\
      \    quote_groups.organization_id AS organization_id,\n    quote_groups.organization_name\
      \ AS organization_name,\n    quote_groups.user_id AS quote_group_user_id,\n\
      \    quote_groups.user_email AS quote_group_user_email,\n    quote_groups.primary_discipline_id\
      \ AS primary_discipline_id,\n    quote_groups.primary_discipline_name AS primary_discipline_name,\n\
      \    quote_groups.primary_category_id AS primary_category_id,\n    quote_groups.primary_category_name\
      \ AS primary_category_name,\n    quote_groups.primary_subcategory_id AS primary_subcategory_id,\n\
      \    quote_groups.primary_subcategory_name AS primary_subcategory_name,\n  \
      \  quote_groups.project_code AS project_code,\n    quote_groups.ware_id AS ware_id,\n\
      \    quote_groups.ware_name AS ware_name,\n    purchase_orders.proposal_id AS\
      \ proposal_id,\n    purchase_orders.netsuite_status AS netsuite_status,\n  \
      \  purchase_orders.last_computed_invoice_status AS last_computed_invoice_status,\n\
      \    proposals.theoretical_transaction_rate AS theoretical_transaction_rate,\n\
      \    purchase_orders.po_adjustment_rate AS po_adjustment_rate,\n    purchase_orders.projected_po_total\
      \ AS projected_po_total,\n    purchase_orders.ad_po_number AS ad_po_number,\n\
      \    purchase_orders.po_number AS po_number,\n    purchase_orders.standing_purchase_order_id\
      \ AS standing_purchase_order_id,\n    purchase_orders.wholesale_total_price\
      \ AS wholesale_total_price,\n    (purchase_orders.wholesale_total_price / currencies.conversion_rate)\
      \ AS wholesale_total_price_usd,\n    purchase_orders.wholesale_subtotal_price\
      \ AS wholesale_subtotal_price,\n    (purchase_orders.wholesale_subtotal_price\
      \ / currencies.conversion_rate) AS wholesale_subtotal_price_usd,\n    standing_purchase_orders.number\
      \ AS standing_purchase_order_number,\n    currencies.currency AS currency,\n\
      \    currencies.conversion_rate AS conversion_rate,\n    quoted_wares.backoffice_url\
      \ || '/purchase_orders/' || purchase_orders.uuid AS backoffice_url,\n    purchase_orders.po_created_at\
      \ AS po_created_at,\n    purchase_orders.created_at AS created_at,\n    purchase_orders.updated_at\
      \ AS updated_at,\n    purchase_orders.fully_recognized_at AS fully_recognized_at,\n\
      \    billing_address.street AS provider_billing_street,\n    billing_address.street2\
      \ AS provider_billing_street2,\n    billing_address.city AS provider_billing_city,\n\
      \    billing_address.state AS provider_billing_state,\n    billing_address.zipcode\
      \ AS provider_billing_zipcode,\n    billing_address.country AS provider_billing_country,\n\
      \    milestone_totals.total_base_subtotal AS base_subtotal_price,\n    milestone_totals.total_list_subtotal\
      \ AS list_subtotal_price,\n    (milestone_totals.total_base_subtotal / currencies.conversion_rate)\
      \ AS base_subtotal_price_usd,\n    (milestone_totals.total_list_subtotal / currencies.conversion_rate)\
      \ AS list_subtotal_price_usd,\n    (COALESCE(fee_cap_milestones.fee_cap_amount,\
      \ 0) / currencies.conversion_rate) AS fee_cap_amount_usd,\n    legal_document_theoretical_fees.theoretical_customer_transaction_fee\
      \ AS theoretical_customer_transaction_fee,\n    (purchase_orders.wholesale_subtotal_price\
      \ / currencies.conversion_rate) * legal_document_theoretical_fees.theoretical_customer_transaction_fee\
      \ AS theoretical_customer_fee,\n    COALESCE(taxes.amount, 0) AS wholesale_tax,\n\
      \    (COALESCE(taxes.amount, 0) / currencies.conversion_rate) AS wholesale_tax_usd,\n\
      \    COALESCE(shipping.cost, 0) AS shipping_cost,\n    (COALESCE(shipping.cost,\
      \ 0) / currencies.conversion_rate) AS shipping_cost_usd,\n    COALESCE(invoice_counts.invoice_count,\
      \ 0) AS invoice_count,\n    invoice_counts.first_invoice_created_at AS first_invoice_created_at,\n\
      \    invoice_counts.last_invoice_created_at AS last_invoice_created_at,\n  \
      \  invoice_counts.sum_invoice_wholesale_total_price AS sum_invoice_wholesale_total_price,\n\
      \    (invoice_counts.sum_invoice_wholesale_total_price / currencies.conversion_rate)\
      \ AS sum_invoice_wholesale_total_price_usd,\n    (purchase_orders.wholesale_subtotal_price\
      \ - COALESCE(invoice_counts.sum_invoice_wholesale_total_price, 0)) AS remaining_for_invoice,\n\
      \    ((purchase_orders.wholesale_subtotal_price - COALESCE(invoice_counts.sum_invoice_wholesale_total_price,\
      \ 0)) / currencies.conversion_rate) AS remaining_for_invoice_usd\n  FROM {{\
      \ ref('bronze_provider_purchase_orders') }} AS purchase_orders\n    JOIN {{\
      \ ref('silver_quoted_wares') }} AS quoted_wares ON purchase_orders.quoted_ware_pg_id\
      \ = quoted_wares.id\n    JOIN {{ ref('silver_providers') }} AS providers ON\
      \ purchase_orders.provider_pg_id = providers.id\n    JOIN {{ ref('silver_quote_groups')\
      \ }} AS quote_groups ON quoted_wares.quote_group_id = quote_groups.id\n    JOIN\
      \ {{ ref('silver_organizations') }} AS organizations ON quote_groups.organization_id\
      \ = organizations.id\n    JOIN {{ ref('bronze_currencies') }} AS currencies\n\
      \      ON currencies.exchangable_id = purchase_orders.id\n      AND currencies.exchangable_type\
      \ = 'Pg::PurchaseOrderBase'\n    LEFT JOIN milestone_totals ON milestone_totals.purchase_order_id\
      \ = purchase_orders.id\n    LEFT JOIN fee_cap_milestones ON fee_cap_milestones.purchase_order_id\
      \ = purchase_orders.id\n    LEFT JOIN (\n      SELECT DISTINCT ON (addressable_id)\n\
      \        *\n      FROM {{ ref('bronze_addresses') }}\n      WHERE addressable_type\
      \ = 'Pg::PurchaseOrderBase'\n        AND type = 'Pg::ProviderBillingAddress'\n\
      \      ORDER BY addressable_id, created_at DESC\n    ) AS billing_address ON\
      \ billing_address.addressable_id = purchase_orders.id\n    LEFT JOIN {{ ref('silver_proposals')\
      \ }} AS proposals ON purchase_orders.proposal_id = proposals.id\n    LEFT JOIN\
      \ {{ ref('silver_legal_document_theoretical_fees') }} AS legal_document_theoretical_fees\n\
      \      ON (\n        proposals.legal_document_id = legal_document_theoretical_fees.legal_document_id\
      \ AND\n        quote_groups.organization_id = legal_document_theoretical_fees.organization_id\n\
      \      )\n    LEFT JOIN {{ ref('bronze_standing_purchase_orders') }} AS standing_purchase_orders\n\
      \      ON purchase_orders.standing_purchase_order_id = standing_purchase_orders.id\n\
      \    LEFT JOIN (\n      SELECT\n        shipable_id,\n        cost\n      FROM\
      \ {{ ref('bronze_shippings') }}\n      WHERE shipable_type = 'Pg::PurchaseOrderBase'\n\
      \    ) AS shipping ON shipping.shipable_id = purchase_orders.id\n    LEFT JOIN\
      \ (\n      SELECT\n        taxable_id,\n        SUM(amount) AS amount\n    \
      \  FROM {{ ref('bronze_taxes') }}\n      WHERE taxable_type = 'Pg::PurchaseOrderBase'\n\
      \        AND type = 'Pg::WholesaleTax'\n      GROUP BY taxable_id\n    ) AS\
      \ taxes ON taxes.taxable_id = purchase_orders.id\n    LEFT JOIN LATERAL (\n\
      \      SELECT\n        purchase_order_id,\n        COUNT(id) AS invoice_count,\n\
      \        MIN(created_at) AS first_invoice_created_at,\n        MAX(created_at)\
      \ AS last_invoice_created_at,\n        SUM(\n            CASE\n            \
      \    WHEN type = 'Pg::ProviderCredit' THEN -wholesale_total_price\n        \
      \        ELSE wholesale_total_price\n            END\n        ) AS sum_invoice_wholesale_total_price\n\
      \      FROM {{ ref('bronze_provider_billing_documents') }}\n      WHERE status\
      \ != 3\n      GROUP BY purchase_order_id\n    ) AS invoice_counts ON purchase_orders.id\
      \ = invoice_counts.purchase_order_id\n  WHERE\n    purchase_orders.po_created_at\
      \ IS NOT NULL\n)\n\nSELECT * FROM transformed_data\n"
  silver_gmv_daily:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_gmv_daily.sql
    sql: "{{ config(\n  materialized=\"view\",\n)\n}}\n\nSELECT\n  po_created_at::date\
      \ AS date,\n  purchase_orders.id AS purchase_order_id,\n  retail_subtotal_price_usd\
      \ AS gmv_usd\nFROM {{ ref('silver_customer_purchase_orders') }} AS purchase_orders\n\
      \  JOIN {{ ref('bronze_organizations') }} AS organizations\n    ON purchase_orders.organization_id\
      \ = organizations.id\nWHERE po_created_at IS NOT NULL"
  silver_provider_proposal_shipping_address:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_provider_proposal_shipping_address.sql
    sql: "{{ config(\n  materialized=\"view\",\n  )\n}}\n\nWITH provider_shipping_address\
      \ AS (\n    SELECT\n        id,\n        TRIM(\n          COALESCE(organization_name,\
      \ '') || ' ' ||\n          COALESCE(street, '') || ' ' ||\n          COALESCE(city,\
      \ '') || ' ' ||\n          COALESCE(state, '') || ' ' ||\n          COALESCE(zipcode,\
      \ '') || ' ' ||\n          COALESCE(country, '')\n        ) AS provider_shipping_address,\n\
      \        country AS provider_shipping_country,\n        state AS provider_shipping_state,\n\
      \        addressable_id,\n        addressable_type,\n        ROW_NUMBER() OVER\
      \ (\n              PARTITION BY addressable_id\n              ORDER BY created_at\
      \ DESC\n              ) AS row_num\n    FROM {{ ref('bronze_addresses') }}\n\
      \    WHERE type = 'Pg::ProviderShippingAddress' AND addressable_type = 'Pg::ProposalBase'\n\
      )\n\nSELECT * FROM provider_shipping_address"
  silver_ware_provider_configuration_inherited:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_ware_provider_configuration_inherited.sql
    sql: "{{ config(\n  materialized=\"table\",\n)\n}}\n\nWITH transformed_data AS\
      \ (\n    SELECT\n        organization_associations.organization_id,\n      \
      \  organization_associations.associatable_id AS ware_provider_configuration_id,\n\
      \        ware_provider_configurations.ware_id,\n        ware_provider_configurations.provider_id,\n\
      \        organization_providers.published,\n        organization_providers.purchasable\n\
      \    FROM {{ ref('bronze_organization_associations') }} AS organization_associations\n\
      \    INNER JOIN {{ ref('bronze_ware_provider_configurations') }} AS ware_provider_configurations\n\
      \      ON ware_provider_configurations.id=organization_associations.associatable_id\n\
      \    INNER JOIN {{ ref('bronze_organization_providers')}} AS organization_providers\n\
      \      ON organization_providers.provider_id=ware_provider_configurations.provider_id\n\
      \      AND organization_providers.organization_id=organization_associations.organization_id\n\
      \    WHERE\n        organization_associations.associatable_type='Pg::WareProviderConfiguration'\n\
      \        AND organization_associations.removed=false\n        AND organization_associations.overridden=false\n\
      \        AND ware_provider_configurations.provider_id IS NOT NULL\n        AND\
      \ ware_provider_configurations.organization_id IS NOT NULL\n        AND ware_provider_configurations.ware_id\
      \ IS NOT NULL\n)\n\nSELECT * FROM transformed_data\n"
  silver_provider_signed_legal_documents:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/silver/silver_provider_signed_legal_documents.sql
    sql: "{{ config(materialized=\"table\",\n    indexes=[\n        {\"columns\":\
      \ [\"provider_id\"]},\n    ])\n}}\n\nWITH transformed_data AS (\n    select\n\
      \    signable_id provider_id,\n    MAX(CASE WHEN legal_document_id = 1  THEN\
      \ 1 ELSE 0 END)::boolean AS \"clinical-laboratory-services-agreement\",\n  \
      \  MAX(CASE WHEN legal_document_id = 2  THEN 1 ELSE 0 END)::boolean AS \"supplier-agreement\"\
      ,\n    MAX(CASE WHEN legal_document_id = 4  THEN 1 ELSE 0 END)::boolean AS \"\
      rwe\",\n    MAX(CASE WHEN legal_document_id = 5  THEN 1 ELSE 0 END)::boolean\
      \ AS \"human-biological-samples-supply-agreement\",\n    MAX(CASE WHEN legal_document_id\
      \ = 6  THEN 1 ELSE 0 END)::boolean AS \"research-services-agreement\",\n   \
