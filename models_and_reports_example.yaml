      \    ) AS involvement_confirmation,\n    dynamic_form_attachments.data ->> 'message'\
      \ AS message,\n    dynamic_form_attachments.data ->> 'euthanasia' AS euthanasia,\n\
      \    dynamic_form_attachments.data ->> 'euthanized_number' AS euthanized_number,\n\
      \    dynamic_form_attachments.data ->> 'number_of_animals' AS number_of_animals,\n\
      \    dynamic_form_attachments.data ->> 'couriers_audited' AS couriers_audited,\n\
