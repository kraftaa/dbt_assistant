      \ = compliance_manifests.submitted_by_id\n  JOIN {{ ref('bronze_dynamic_form_attachments')}}\
      \ AS dynamic_form_attachments\n  ON dynamic_form_attachments.dynamic_formable_id\
      \ = compliance_manifests.id\n  AND dynamic_form_attachments.dynamic_formable_type='Pg::ComplianceManifest'\n\
      \  WHERE compliance_manifests.submitted_at IS NOT NULL\n  AND compliance_manifests.type\
      \ = 'Pg::RequestComplianceManifest' AND compliance_manifests.quote_group_pg_id\
      \ IS NOT NULL\n  AND compliance_manifests.obsoleted_at IS NULL  AND compliance_manifests.cancelled_at\
      \ IS NULL AND compliance_manifests.submitted_at IS NOT NULL\n)\nSELECT * FROM\
      \ transformed_data\n"
