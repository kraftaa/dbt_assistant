      \ AS \"Please provide details (government)\",\n       formpage_form.form_data\
      \  -> 'employment_object'->'public_official' AS \"Do you employ directly or\
      \ indirectly a Government or Public Official?\",\n       formpage_form.form_data\
      \  -> 'employment_object'->'public_official_details' AS \"Please provide details\
      \ (public officciall)\",\n       formpage_form.form_data  -> 'employment_object'->'disqualified'\
      \ AS \"Do you employ directly or indirectly any individual who is listed in\
      \ Disqualified\",\n       formpage_form.form_data  -> 'employment_object'->'disqualified_details'\
      \ AS \"Please provide details (disqualified)\"\n    FROM\n        {{ ref('silver_rfi_submitted')}}\
      \ rfi_submitted\n    LEFT JOIN\n        {{ ref('silver_formpage_form') }} formpage_form\n\
      \        ON rfi_submitted.form_id=formpage_form.dynamic_formable_id\n    WHERE\
      \ rfi_submitted.form_index = 7 and rfi_submitted.form_name = 'Payment Transparency'\n\
      )\n\nSELECT * FROM transformed_data"
  gold_instaquote_report:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/gold/gold_instaquote_report.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      proposal_id\"]}\n  ]\n)\n}}\n\n-- this table contains instaquotes, instaquotes\
      \ that turned into SOW (sow_id not null),\n-- and purchased instaquotes (sow_id\
      \ not null and customer_purchase_order_created_at not null)\nWITH transformed_data\
      \ AS (SELECT\n  customer_purchase_orders.created_at AS customer_purchase_order_created_at,\n\
      \  customer_purchase_orders.id AS customer_purchase_order_id,\n  proposals.proposal_id\
      \ AS proposal_id,\n  proposals.proposal_created_at AS proposal_created_at,\n\
      \  proposals.instaquote_proposal_template_id AS instaquote_proposal_template_id,\n\
      \  proposals.proposal_type AS proposal_type,\n  proposals.quoted_ware_pg_id\
      \ AS quoted_ware_pg_id,\n  proposals.quote_group_id AS quote_group_id,\n  proposals.sow_id\
      \ AS sow_id,\n  proposals.sow_created_at AS sow_created_at,\n  proposals.sow_obsoleted\
      \ AS sow_obsoleted,\n  provider_purchase_orders.id AS provider_purchase_order_id,\n\
      \  -- filters\n  providers.name AS provider_name,\n  providers.id AS provider_id,\n\
      \  customer_purchase_orders.cpo_price_threshold_usd AS cpo_price_threshold_usd,\n\
      \  customer_purchase_orders.completed AS completed,\n  proposals.quote_group_billing_site_name\
      \ AS billing_site_name,\n  proposals.quote_group_filter1 AS quote_group_filter1,\n\
      \  proposals.quote_group_filter2 AS quote_group_filter2,\n  proposals.quote_group_filter3\
      \ AS quote_group_filter3,\n  proposals.quote_group_filter4 AS quote_group_filter4,\n\
      \  proposals.quote_group_filter5 AS quote_group_filter5,\n  proposals.quote_group_uuid\
      \ AS quote_group_uuid,\n  proposals.quote_group_inventory_item_purchase AS inventory_item_purchase,\n\
      \  proposals.quote_group_name AS quote_group_name,\n  proposals.quote_group_shipping_country\
      \ AS shipping_country,\n  proposals.quote_group_shipping_site_name AS shipping_site_name,\n\
      \  proposals.quote_group_primary_category_name AS category,\n  proposals.quote_group_primary_subcategory_name\
      \ AS subcategory,\n  proposals.quoted_ware_spending_category AS spending_category,\n\
      \  proposals.organization_id AS organization_id,\n  proposals.organization_name\
      \ AS organization_name,\n  proposals.organization_subdomain AS organization_subdomain,\n\
      \  proposals.quote_group_identifier AS quote_group_identifier,\n  users.email\
      \ AS user_email,\n  users.full_name,\n  CONCAT('https://',proposals.organization_subdomain,'.scientist.com/quote_groups/',\
      \ proposals.quote_group_uuid) AS request_url\nFROM {{ ref('silver_instaquote_proposals')\
      \ }} AS proposals\nLEFT JOIN {{ ref('silver_providers') }} AS providers ON proposals.provider_pg_id\
      \ = providers.id\nLEFT JOIN {{ ref('silver_provider_purchase_orders') }} AS\
      \ provider_purchase_orders ON proposals.sow_id = provider_purchase_orders.proposal_id\
      \  -- only SOWs can turn into POs\nLEFT JOIN {{ ref('silver_customer_purchase_orders')\
      \ }} AS customer_purchase_orders ON provider_purchase_orders.customer_purchase_order_id\
      \ = customer_purchase_orders.id\nLEFT JOIN (SELECT id, full_name, email FROM\
      \ {{ ref('bronze_users') }}) AS users ON users.id = customer_purchase_orders.quote_group_user_id\n\
      \n)\n\nSELECT * FROM transformed_data\n"
  gold_proposal_itemizable_report:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/gold/gold_proposal_itemizable_report.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      organization_id\"]},\n    {\"columns\": [\"quote_group_id\"]},\n    {\"columns\"\
      : [\"provider_id\"]},\n    {\"columns\": [\"proposal_id\"]}\n  ]\n  )\n}}\n\n\
      WITH gold_marketplace_report AS (\n        SELECT\n            gold_marketplace_report.organization_id,\n\
      \            gold_marketplace_report.organization_name,\n            gold_marketplace_report.quote_group_id,\n\
      \            gold_marketplace_report.discipline,\n            gold_marketplace_report.category,\n\
      \            gold_marketplace_report.subcategory,\n            gold_marketplace_report.quote_group_identifier,\n\
      \            gold_marketplace_report.quote_group_last_computed_status,\n   \
      \         'https://' || organization_subdomain || '.scientist.com/quote_groups/'\
      \ || quote_group_uuid AS quote_group_url,\n            'https://' || organization_subdomain\
      \ || '.scientist.com/quote_groups/' || quote_group_uuid || '#proposal-' || proposal_uuid\
      \ AS proposal_storefront_url,\n            gold_marketplace_report.provider_id,\n\
      \            gold_marketplace_report.provider_name provider_name,\n        \
      \    gold_marketplace_report.shipping_country request_shipping_country,\n  \
      \          gold_marketplace_report.shipping_site_name request_shipping_site_name,\n\
      \            gold_marketplace_report.shipping_organization_name request_shipping_organization_name,\n\
      \            gold_marketplace_report.user_email,\n            gold_marketplace_report.user_full_name,\n\
      \            gold_marketplace_report.quote_group_created_at,\n            EXTRACT(YEAR\
      \ FROM gold_marketplace_report.quote_group_created_at) quote_group_year,\n \
      \           gold_marketplace_report.quoted_ware_id,\n    --        gold_marketplace_report.quoted_ware_tax_by_line_item,\n\
      \            gold_marketplace_report.proposal_id,\n            gold_marketplace_report.proposal_identifier\n\
      \        FROM {{ ref('gold_marketplace_report')}} gold_marketplace_report\n\
      \        WHERE EXTRACT(YEAR FROM gold_marketplace_report.quote_group_created_at)\
      \ > 2022\n        GROUP BY\n            gold_marketplace_report.organization_id,\n\
      \            gold_marketplace_report.organization_name,\n            gold_marketplace_report.quote_group_id,\n\
      \            gold_marketplace_report.discipline,\n            gold_marketplace_report.category,\n\
      \            gold_marketplace_report.subcategory,\n            gold_marketplace_report.quote_group_identifier,\n\
      \            gold_marketplace_report.quote_group_last_computed_status,\n   \
      \         'https://' || organization_subdomain || '.scientist.com/quote_groups/'\
      \ || quote_group_uuid ,\n            'https://' || organization_subdomain ||\
      \ '.scientist.com/quote_groups/' || quote_group_uuid || '#proposal-' || proposal_uuid,\n\
      \            gold_marketplace_report.provider_id,\n            gold_marketplace_report.provider_name,\n\
      \            gold_marketplace_report.shipping_country,\n            gold_marketplace_report.shipping_site_name,\n\
      \            gold_marketplace_report.shipping_organization_name,\n         \
      \   gold_marketplace_report.user_email,\n            gold_marketplace_report.user_full_name,\n\
      \            gold_marketplace_report.quote_group_created_at,\n            EXTRACT(YEAR\
      \ FROM gold_marketplace_report.quote_group_created_at) ,\n            gold_marketplace_report.quoted_ware_id,\n\
      \    --        gold_marketplace_report.quoted_ware_tax_by_line_item,\n     \
      \       gold_marketplace_report.proposal_id,\n            gold_marketplace_report.proposal_identifier\n\
      ),\n\ntransformed_data AS (\n    SELECT\n        gold_marketplace_report.*,\n\
      \        provider_shipping_address.provider_shipping_address,\n        provider_shipping_address.provider_shipping_country,\n\
      \        proposal_milestones.itemizable_id,\n        proposal_milestones.itemizable_type,\n\
      \        proposal_milestones.line_number,\n        proposal_milestones.quantity,\n\
      \        proposal_milestones.name,\n        proposal_milestones.state,\n   \
      \     proposal_milestones.status,\n        proposal_milestones.type,\n     \
      \   proposal_milestones.list_unit_price,\n        proposal_milestones.retail_unit_price\
      \ ,\n        proposal_milestones.retail_subtotal_price,\n        proposal_milestones.sli_list_price,\n\
      \        proposal_milestones.sli_previous_rate_card_price,\n        proposal_milestones.sli_rate_card_price,\n\
      \        proposal_milestones.sli_scientist_price\n\n        FROM gold_marketplace_report\n\
      \        LEFT JOIN (\n            SELECT itemizable_id,\n            itemizable_type,\n\
      \            line_number,\n            quantity,\n            name,\n      \
      \      state,\n            status,\n            type,\n            list_unit_price,\n\
      \            retail_unit_price ,\n            retail_subtotal_price,\n     \
      \       sli_list_price,\n            sli_previous_rate_card_price,\n       \
      \     sli_rate_card_price,\n            sli_scientist_price\n        FROM {{\
      \ ref('bronze_milestones') }} WHERE itemizable_type='Pg::ProposalBase'\n   \
      \     ORDER BY itemizable_id, line_number ) proposal_milestones\n        ON\
      \ proposal_milestones.itemizable_id=gold_marketplace_report.proposal_id\n  \
      \      LEFT JOIN {{ ref('silver_provider_proposal_shipping_address') }} provider_shipping_address\n\
      \            ON provider_shipping_address.addressable_id =  gold_marketplace_report.proposal_id\n\
      \            AND provider_shipping_address.row_num = 1\n        WHERE EXTRACT(YEAR\
      \ FROM gold_marketplace_report.quote_group_created_at) > 2022\n\n)\n\nSELECT\
      \ * FROM transformed_data"
  gold_wpc_disc_cat_subcat_published_purchasable:
    description: SQL model at /Users/maria/Documents/GitHub/sparkle-dbt/models/gold/gold_wpc_disc_cat_subcat_published_purchasable.sql
    sql: "{{ config(\n  materialized=\"table\",\n  indexes=[\n    {\"columns\": [\"\
      ware_id\"]},\n    {\"columns\": [\"organization_id\"]},\n    {\"columns\": [\"\
      provider_id\"]},\n  ]\n)\n}}\n\nWITH transformed_data AS (\n    SELECT\n   \
      \     ware_provider_configuration.ware_provider_configuration_id AS ware_provider_configuration_id,\n\
      \        wares.id AS ware_id,\n        wares.name AS ware_name,\n        wares.slug\
      \ AS ware_slug,\n        organizations.id AS organization_id,\n        organizations.name\
      \ AS organization_name,\n        providers.id AS provider_id,\n        providers.name\
      \ AS provider_name,\n        ware_provider_configuration.published AS provider_published,\n\
      \        ware_provider_configuration.purchasable AS provider_purchasable,\n\
      \        canonical_organizations.id AS canonical_organization_id,\n        canonical_organizations.name\
      \ AS canonical_organization_name,\n        subdomain_default_organizations.id\
      \ AS subdomain_default_organization_id,\n        subdomain_default_organizations.name\
      \ AS subdomain_default_organization_name,\n        wares.primary_discipline_name\
      \ AS discipline_name,\n        wares.primary_category_name AS category_name,\n\
      \        CASE \n            WHEN wares.primary_subcategory_name IS NOT NULL\
      \ THEN ARRAY[wares.primary_subcategory_name]\n            ELSE beacon_subcategories.subcategory_names\n\
      \        END AS subcategory_names,\n        CASE\n            WHEN ware_provider_configuration.ware_id\
      \ IS NOT NULL THEN TRUE\n            ELSE FALSE\n        END AS service_settings,\n\
      \        provider_legal_signed_documents.\"clinical-laboratory-services-agreement\"\
      ,\n        provider_legal_signed_documents.\"supplier-agreement\",\n       \
      \ provider_legal_signed_documents.\"rwe\",\n        provider_legal_signed_documents.\"\
      human-biological-samples-supply-agreement\",\n        provider_legal_signed_documents.\"\
      research-services-agreement\",\n        provider_legal_signed_documents.\"academic-supplier-agreement\"\
      ,\n        provider_legal_signed_documents.\"consulting-agreement\",\n     \
      \   provider_legal_signed_documents.\"model-listing-agreement\",\n        provider_legal_signed_documents.\"\
      scientist-com-client-marketplace-agreement\",\n        provider_legal_signed_documents.\"\
      consultancy-services-agreement\",\n        provider_legal_signed_documents.\"\
      advantage-program-basic-supplier-terms\",\n        provider_legal_signed_documents.\"\
      advantage-program-plus-supplier-terms\",\n        provider_legal_signed_documents.\"\
      product-hub-terms-and-conditions-of-purchase\",\n        provider_legal_signed_documents.\"\
      hbs-listing-agreement\",\n        provider_legal_signed_documents.\"direct-billing-amendment-to-supplier-terms-of-use\"\
      \n    FROM {{ ref ('silver_wares')}} AS wares\n    LEFT JOIN {{ ref ('silver_ware_provider_configuration_inherited')}}\
      \ AS ware_provider_configuration\n      ON wares.id=ware_provider_configuration.ware_id\n\
      \    LEFT JOIN {{ ref ('silver_providers')}} AS providers\n      ON providers.id=ware_provider_configuration.provider_id\n\
      \    LEFT JOIN {{ ref ('silver_organizations')}} AS organizations\n      ON\
      \ organizations.id=ware_provider_configuration.organization_id\n    LEFT JOIN\
      \ {{ ref ('silver_organizations')}} AS subdomain_default_organizations\n   \
      \   ON subdomain_default_organizations.id=organizations.subdomain_default_organization_id\n\
      \    LEFT JOIN {{ ref ('silver_organizations')}} AS canonical_organizations\n\
      \      ON canonical_organizations.id=organizations.canonical_organization_id\n\
      \    LEFT JOIN {{ ref('silver_provider_signed_legal_documents') }} AS provider_legal_signed_documents\
      \ ON provider_legal_signed_documents.provider_id=ware_provider_configuration.provider_id\n\
      \    LEFT JOIN (\n        SELECT \n            beacon_wares.ware_id,\n     \
      \       array_agg(beacons.name) AS subcategory_names\n        FROM {{ ref('bronze_beacon_wares')\
      \ }} AS beacon_wares\n        JOIN {{ ref('bronze_beacons') }} AS beacons\n\
      \          ON beacons.id = beacon_wares.beacon_id\n        WHERE CARDINALITY(beacons.ancestor_slugs)\
      \ = 3\n        GROUP BY beacon_wares.ware_id\n    ) AS beacon_subcategories\n\
      \      ON beacon_subcategories.ware_id = wares.id\n)\n\nSELECT * FROM transformed_data\n"
  gold_proposal_dynamic_forms_report:
