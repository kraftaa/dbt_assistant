      \   ->>  'site_biopharma_unit_neuroscience_group' AS site_biopharma_unit_neuroscience_group,\n\
      \     dynamic_form_attachments.data  ->>  'site_biopharma_unit_adpe_group' AS\
      \ site_biopharma_unit_adpe_group,\n     dynamic_form_attachments.data   ->>\
      \  'site_biopharma_unit_discovery_sciences_group' AS site_biopharma_unit_discovery_sciences_group,\n\
      \     dynamic_form_attachments.data   ->>  'site_biopharma_unit_biopharmaceuticals_development_group'\
      \ AS site_biopharma_unit_biopharmaceuticals_development_group,\n     dynamic_form_attachments.data\
      \  ->>  'site_biopharma_unit_pharmaceutical_sciences_group' AS site_biopharma_unit_pharmaceutical_sciences_group,\n\
      \     dynamic_form_attachments.data  ->>  'site_biopharma_unit_clinical_pharmacology_and_safety_sciences_group'\
