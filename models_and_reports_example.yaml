      \ (not (qg_subcategory_name = any((array_agg(multiple.beacon_names) filter (where\
      \ multiple.beacon_names <> '{}'))))) THEN array_agg(array_append(multiple.beacon_names,\
      \ qg_subcategory_name))\nELSE array_agg(multiple.beacon_names) filter (where\
      \ multiple.beacon_names <> '{}') END) multiple_subs_names\nFROM\n  (((\n  (\n\
      \   SELECT\n     qg_id\n   , (CASE WHEN ((discipline_name IS NULL) OR (discipline_beacon_id\
      \ IN (662, 952, 1050, 1307))) THEN 'Custom' ELSE rtrim(discipline_name) END)\
      \ discipline_name\n   , primary_discipline_id\n   , (CASE WHEN ((category_name\
      \ IS NULL) OR (category_beacon_id IN (662, 952, 1050, 1307))) THEN 'Custom'\
      \ ELSE rtrim(category_name) END) category_name\n   , primary_category_id\n \
      \  , (CASE WHEN ((qg_subcategory_name IS NULL) OR (qg_subcategory_beacon_id\
      \ IN (662, 952, 1050, 1307))) THEN 'Custom' ELSE rtrim(qg_subcategory_name)\
      \ END)  qg_subcategory_name\n   , primary_subcategory_id\n   , rtrim(rw.fields_name)\
      \ ware_name\n--   , rw.fields_name fields_name\n   , ware_ref_id\n   , discipline_beacon_id\n\
      \   , category_beacon_id\n   , qg_subcategory_beacon_id\n   , primary_qg_subcategory_none\n\
      \   FROM\n     ((\n      SELECT\n        qg_id\n      , discipline_name\n  \
      \    , primary_discipline_id\n      , category_name\n      , primary_category_id\n\
      \      , rb3.fields_name qg_subcategory_name\n      , primary_subcategory_id\n\
      \      , (CASE WHEN (primary_subcategory_id IS NULL) THEN true ELSE false END)\
      \ primary_qg_subcategory_none\n      , ware_ref_id\n      , reference_of_id\
      \ qg_subcategory_beacon_id\n      , discipline_beacon_id\n      , category_beacon_id\n\
      \      FROM\n        ((\n         SELECT\n           qg_id\n         , discipline_name\n\
      \         , primary_discipline_id\n         , primary_category_id\n        \
      \ , rb2.fields_name category_name\n         , primary_subcategory_id\n     \
      \    , ware_ref_id\n         , reference_of_id category_beacon_id\n        \
      \ , discipline_beacon_id\n         FROM\n           ((\n            SELECT\n\
      \              qg.id qg_id\n            , primary_category_id\n            ,\
      \ primary_discipline_id\n            , rb.fields_name discipline_name\n    \
      \        , primary_subcategory_id\n            , ware_ref_id\n            ,\
      \ reference_of_id discipline_beacon_id\n            FROM\n              ( (select\
      \ * from {{ source('public', 'quote_groups') }}  ) qg\n            LEFT JOIN\
      \ {{ ref('m_refs_beacons') }} rb ON ((primary_discipline_id = rb.id) AND (rb.type\
      \ = 'Pg::BeaconRef')))\n         ) alias1\n         LEFT JOIN {{ ref('m_refs_beacons')\
      \ }} rb2 ON ((primary_category_id = rb2.id) AND (rb2.type = 'Pg::BeaconRef')))\n\
      \      ) alias2\n      LEFT JOIN {{ ref('m_refs_beacons') }} rb3 ON ((primary_subcategory_id\
      \ = rb3.id) AND (rb3.type = 'Pg::BeaconRef')))\n   ) alias3\n   LEFT JOIN {{\
      \ ref('m_refs_wares') }} rw ON ((ware_ref_id = rw.id) AND (rw.type = 'Pg::WareRef')))\n\
      )  rf\nINNER JOIN (\n   SELECT\n     year\n   , quote_group_id\n   FROM\n  \
      \   (\n      SELECT\n        max(date_part('year', created_at)) as year\n  \
      \    , quote_group_id\n      FROM\n        quoted_wares\n      GROUP BY quote_group_id\n\
      \   ) alias4\n   WHERE (year > 2017)\n)  qw ON (qw.quote_group_id = qg_id))\n\
      LEFT JOIN quote_groups qg ON (qg.id = qg_id))\nLEFT JOIN (\n   SELECT\n    \
      \ ware_id\n   , array_agg(beacon_id) multiple_subs_ids\n   , (array_agg(beacon_id))[1]\
      \ multiple_subs_id\n   , (array_agg(name)) beacon_names\n   , (array_agg(name))[1]\
      \ multiple_beacon_name\n   , (array_agg(slug))[1] multiple_beacon_slug\n   ,\
      \ (CASE WHEN (cardinality(array_agg(beacon_id)) > 1) THEN true ELSE false END)\
      \ multiple_subcategories\n   FROM\n     (\n      SELECT\n        bw.ware_id\n\
      \      , bw.beacon_id\n      , beacons.slug\n      , beacons.ancestor_slugs\n\
      \      , beacons.name\n      FROM\n        ({{ source('public', 'beacons_wares')\
      \ }} bw\n      LEFT JOIN beacons ON (beacons.id = bw.beacon_id))\n      WHERE\
      \ (NOT (bw.beacon_id IN (662, 952, 1050, 1307)))\n   )  aw\n   GROUP BY ware_id\n\
      )  multiple ON (multiple.ware_id = qg.ware_id))\nGROUP BY rf.qg_id, rf.discipline_name,\
      \ rf.primary_discipline_id, rf.category_name, rf.primary_category_id, rf.qg_subcategory_name,\
      \ rf.primary_subcategory_id, rf.ware_name --, rf.fields_name\n, rf.ware_ref_id,\
      \ rf.discipline_beacon_id, rf.category_beacon_id, rf.qg_subcategory_beacon_id,\
      \ rf.primary_qg_subcategory_none, qg.ware_id\n, multiple.multiple_subs_id, multiple.multiple_beacon_name,\
      \ multiple.multiple_subcategories, multiple.multiple_beacon_slug\n)\n\nselect\
      \ *\nfrom transformed_data"
