version: 2

sources:
  - name: raw
    description: "Raw source tables loaded from external systems"
    schema: raw                # change if your warehouse uses a different schema
    tables:
      - name: customers
        description: "Raw customer data from CRM"
        columns:
          - name: id
            tests: [not_null]
          - name: name
          - name: email
          - name: created_at

      - name: orders
        description: "Raw orders data from e-commerce platform"
        columns:
          - name: id
            tests: [not_null]
          - name: customer_id
          - name: order_date
          - name: total_amount

      - name: products
        description: "Raw products data from product catalog"
        columns:
          - name: id
            tests: [not_null]
          - name: product_name
          - name: category
          - name: price
          
      - name: refunds
        description: "Raw refunds data from refunds data"
        columns:
          - name: order_id
            tests: [not_null]
          - name: customer_id
            tests: [not_null]
          - name: refund_date
          - name: refund_amount
