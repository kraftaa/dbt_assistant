version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: embedding_api
    ports:
      - "5000:5000"

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: embedding_nginx
    ports:
      - "80:80"
#    volumes:
#      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
